p&gt;\n&lt;p&gt;Image is of a Sankey chart, a type of flow diagram where the width of an arrow is proportional to the flow quantity. This chart shows how emissions from the production of goods and services (from the emissions production account) shown on the left side of chart, align (flow) to consumption emissions (emissions generated as a result of what we consume), on the right side. The industries that produce emissions are listed on the left: agriculture, forestry, and fishing; mining; manufacturing; electricity, gas, water, and waste services; construction; transport, postal, and warehousing; services excluding transport, postal, and warehousing. Households also produce emissions directly, for example, through cars burning fuel, and are also included on the production side. We also consume imports. Imports are included on the left as an input to consumption emissions. Final users\/consumers of what we produce and import are listed on the right: households; government; non-profit institutions serving households, gross capital formation; and exports\/foreign consumers.&lt;\/p&gt;\n&lt;p&gt;ISBN&amp;nbsp;978-1-99-003204-2&lt;\/p&gt;\n&lt;h2&gt;Enquiries&lt;\/h2&gt;\n&lt;p&gt;Adam Tipper&lt;br&gt;&lt;a href=\&quot;tel:+6449314944\&quot;&gt;04 931 4944&amp;nbsp;&lt;\/a&gt;&lt;br&gt;&lt;a href=\&quot;mailto:info@stats.govt.nz?subject=Enquiries%20%E2%80%93%20Approaches%20to%20measuring%20New%20Zealand&amp;#039;s%20greenhouse%20gas%20emissions\&quot;&gt;info@stats.govt.nz&lt;\/a&gt;&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&quot;}],&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;PageBlockSortOrder&quot;:{&quot;43242&quot;:1,&quot;43578&quot;:2,&quot;43236&quot;:3,&quot;43316&quot;:4,&quot;43239&quot;:5},&quot;EnableTopDivider&quot;:{&quot;43242&quot;:&quot;No&quot;,&quot;43578&quot;:&quot;No&quot;,&quot;43236&quot;:&quot;No&quot;,&quot;43316&quot;:&quot;No&quot;,&quot;43239&quot;:&quot;No&quot;},&quot;PageBlockWidths&quot;:{&quot;43242&quot;:0,&quot;43578&quot;:0,&quot;43236&quot;:0,&quot;43316&quot;:0,&quot;43239&quot;:0},&quot;PageTerms&quot;:[{&quot;ID&quot;:1899,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/air\&quot;,\&quot;Title\&quot;:\&quot;Air\&quot;}&quot;},{&quot;ID&quot;:157,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/atmosphere-and-climate\&quot;,\&quot;Title\&quot;:\&quot;Atmosphere and climate\&quot;}&quot;},{&quot;ID&quot;:1572,&quot;ClassName&quot;:&quot;Stats\\CategoryTaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:null,\&quot;Title\&quot;:null}&quot;},{&quot;ID&quot;:141,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/economy\&quot;,\&quot;Title\&quot;:\&quot;Economy\&quot;}&quot;},{&quot;ID&quot;:130,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/environment\&quot;,\&quot;Title\&quot;:\&quot;Environment\&quot;}&quot;}],&quot;PagesRelated&quot;:[{&quot;ID&quot;:43274,&quot;Title&quot;:&quot;Greenhouse gas emissions (consumption-based): Year ended 2017&quot;,&quot;Link&quot;:&quot;\/information-releases\/greenhouse-gas-emissions-consumption-based-year-ended-2017\/&quot;,&quot;PageDate&quot;:&quot;2020-08-27 12:00:00&quot;,&quot;IsPublished&quot;:&quot;2025-12-22 16:31:51&quot;},{&quot;ID&quot;:43575,&quot;Title&quot;:&quot;About consumption-based greenhouse gas emissions statistics&quot;,&quot;Link&quot;:&quot;\/methods\/about-consumption-based-greenhouse-gas-emissions-statistics\/&quot;,&quot;PageDate&quot;:&quot;2020-08-27 12:00:00&quot;,&quot;IsPublished&quot;:&quot;2025-07-03 11:31:13&quot;}],&quot;Category&quot;:{&quot;ID&quot;:1572,&quot;DisplayName&quot;:&quot;Methods&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;methods\&quot;,\&quot;Title\&quot;:\&quot;Methods\&quot;}&quot;,&quot;FilterName&quot;:null},&quot;TermsReleases&quot;:[],&quot;TermsTopics&quot;:[{&quot;ID&quot;:1899,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Air&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/air\&quot;,\&quot;Title\&quot;:\&quot;Air\&quot;}&quot;,&quot;FilterName&quot;:null},{&quot;ID&quot;:157,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Atmosphere and climate&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/atmosphere-and-climate\&quot;,\&quot;Title\&quot;:\&quot;Atmosphere and climate\&quot;}&quot;,&quot;FilterName&quot;:null},{&quot;ID&quot;:141,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Economy&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/economy\&quot;,\&quot;Title\&quot;:\&quot;Economy\&quot;}&quot;,&quot;FilterName&quot;:null},{&quot;ID&quot;:130,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Environment&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/environment\&quot;,\&quot;Title\&quot;:\&quot;Environment\&quot;}&quot;,&quot;FilterName&quot;:null}]}"></div>

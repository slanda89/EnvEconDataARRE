uot;:16,&quot;Title&quot;:&quot;Careers&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;https:\/\/jobs.stats.govt.nz\/?source=CP&quot;},{&quot;ID&quot;:27,&quot;Title&quot;:&quot;Archive website&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;https:\/\/www.stats.govt.nz\/about-us\/stats-nz-archive-website\/&quot;}]}],&quot;SocialMedia&quot;:[{&quot;Type&quot;:&quot;facebook&quot;,&quot;Title&quot;:&quot;Facebook&quot;,&quot;Target&quot;:1,&quot;Link&quot;:&quot;https:\/\/www.facebook.com\/StatisticsNZ&quot;},{&quot;Type&quot;:&quot;twitter&quot;,&quot;Title&quot;:&quot;Twitter&quot;,&quot;Targert&quot;:1,&quot;Link&quot;:&quot;https:\/\/twitter.com\/Stats_NZ&quot;},{&quot;Type&quot;:&quot;youtube-play&quot;,&quot;Title&quot;:&quot;YouTube&quot;,&quot;Targert&quot;:1,&quot;Link&quot;:&quot;https:\/\/www.youtube.com\/user\/StatisticsNZ&quot;},{&quot;Type&quot;:&quot;linkedin&quot;,&quot;Title&quot;:&quot;LinkedIn&quot;,&quot;Targert&quot;:1,&quot;Link&quot;:&quot;https:\/\/www.linkedin.com\/company\/statistics-new-zealand&quot;}],&quot;Legal&quot;:[{&quot;Title&quot;:&quot;Terms and conditions&quot;,&quot;Link&quot;:&quot;\/about-us\/terms-and-conditions\/&quot;,&quot;Targert&quot;:0},{&quot;Title&quot;:&quot;Privacy&quot;,&quot;Link&quot;:&quot;\/about-us\/privacy-statement\/&quot;,&quot;Targert&quot;:0},{&quot;Title&quot;:&quot;Copyright&quot;,&quot;Link&quot;:&quot;\/about-us\/copyright\/&quot;,&quot;Targert&quot;:0}],&quot;Newsletter&quot;:{&quot;Title&quot;:&quot;Subscribe to newsletters&quot;,&quot;Link&quot;:&quot;\/services\/subscribe-to-newsletters&quot;,&quot;Targert&quot;:0},&quot;Sublinks&quot;:[{&quot;Type&quot;:&quot;Government&quot;,&quot;Title&quot;:&quot;Government&quot;,&quot;Link&quot;:{&quot;Title&quot;:&quot;https:\/\/www.govt.nz\/&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;https:\/\/www.govt.nz\/&quot;},&quot;ImagePath&quot;:&quot;\/_resources\/themes\/stats\/dist\/img\/new-zealand-government-logo.svg&quot;},{&quot;Type&quot;:&quot;Cre     <div id="pageViewData" data-value="{&quot;DateTaxonomyTerm&quot;:[],&quot;ID&quot;:&quot;42896&quot;,&quot;Title&quot;:&quot;Approaches to measuring New Zealand\u2019s greenhouse gas emissions&quot;,&quot;ClassName&quot;:&quot;BlockPage&quot;,&quot;BackgroundColor&quot;:&quot;white&quot;,&quot;FeaturedMedia&quot;:[],&quot;FeaturedText&quot;:&quot;&lt;p&gt;Provides an overview of greenhouse gas emissions statistics in New Zealand and how they relate to each other. The emissions statistics discussed here include those commonly compiled by countries and produced as official statistics covering multiple source processes at the national level.&lt;\/p&gt;&quot;,&quot;IsPublishing&quot;:false,&quot;MediaPosition&quot;:&quot;&quot;,&quot;PageLayout&quot;:&quot;info&quot;,&quot;PageLink&quot;:&quot;\/methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions\/&quot;,&quot;PageDate&quot;:&quot;2020-08-27 12:00:00&quot;,&quot;TagPosition&quot;:&quot;bottom&quot;,&quot;MetaDescription&quot;:&quot;Read about greenhouse gas emissions statistics in New Zealand and how they relate to each other.&quot;,&quot;PageBreadcrumbs&quot;:[{&quot;Title&quot;:&quot;Home&quot;,&quot;MenuTitle&quot;:&quot;Home&quot;,&quot;Link&quot;:&quot;\/&quot;},{&quot;Title&quot;:&quot;Methods&quot;,&quot;MenuTitle&quot;:&quot;Methods&quot;,&quot;Link&quot;:&quot;\/methods\/&quot;},{&quot;Title&quot;:&quot;Approaches to measuring New Zealand\u2019s greenhouse gas emissions&quot;,&quot;MenuTitle&quot;:&quot;Approaches to measuring New Zealand\u2019s greenhouse gas emissions&quot;,&quot;Link&quot;:&quot;\/methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions\/&quot;}],&quot;SiteBanner&quot;:{&quot;ID&quot;:47,&quot;Title&quot;:&quot;www3.stats.govt.nz planned maintenance&quot;,&quot;BannerHeading&quot;:&quot;Planned maintenance: Monday 9 March from 5pm - 6pm &quot;,&quot;BannerType&quot;:&quot;interesting-information&quot;,&quot;Description&quot;:&quot;&lt;p&gt;During this time, the small number of files and applications that are hosted on www3.stats.govt.nz may be temporarily unavailable. The Stats NZ website will remain accessible throughout this time.&lt;\/p&gt;&quot;,&quot;ActionText&quot;:&quot;Find out more&quot;,&quot;Action&quot;:null,&quot;ActionTarget&quot;:&quot;&quot;,&quot;AllPages&quot;:1,&quot;Expires&quot;:&quot;2026-03-09 17:48:00&quot;,&quot;LastEdited&quot;:&quot;2026-03-09 17:45:40&quot;},&quot;PageBlocks&quot;:[{&quot;ID&quot;:&quot;43242&quot;,&quot;Title&quot;:&quot;Approaches to measuring New Zealand\u2019s greenhouse gas emissions \u2013 1&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;span class=\&quot;intro\&quot;&gt;&lt;em&gt;Approaches to measuring New Zealand\u2019s greenhouse gas emissions&lt;\/em&gt; provides an overview of emissions statistics in New Zealand and how they relate to each other. The emissions statistics discussed here include those commonly compiled by countries and produced as official statistics covering multiple source processes at the national level.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;We summarise the different approaches countries use to compile emissions statistics and the underlying principles and concepts of each approach, and provide guidance on which approach is appropriate to use and when.&lt;\/p&gt;&lt;p&gt;Read this paper online or download the PDF below.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;43578&quot;,&quot;Title&quot;:&quot;Download document&quot;,&quot;ClassName&quot;:&quot;DocumentBlock&quot;,&quot;ShowBlockTitle&quot;:true,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;BlockDocuments&quot;:[{&quot;ID&quot;:&quot;49707&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions-Stats-NZ.pdf&quot;,&quot;FileName&quot;:&quot;Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions-Stats-NZ.pdf&quot;,&quot;Title&quot;:&quot;Approaches to measuring New Zealand&#039;s greenhouse gas emissions&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:49899,&quot;OwnerID&quot;:37,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Methods\/Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions\/Download-data\/Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions-Stats-NZ.pdf&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;pdf&quot;,&quot;DocumentFileType&quot;:&quot;Adobe Acrobat PDF file&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483646&quot;,&quot;DocumentSize&quot;:&quot;1.8 MB&quot;,&quot;DocumentPreviewImage&quot;:false}],&quot;Heading&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}},&quot;Presentation&quot;:null},{&quot;ID&quot;:&quot;43236&quot;,&quot;Title&quot;:&quot;Approaches to measuring New Zealand\u2019s greenhouse gas emissions \u2013 2&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Contents&lt;\/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#summary\&quot;&gt;Summary of key points&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#production\&quot;&gt;Production and consumption approaches to measuring emissions&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#understanding\&quot;&gt;Understanding the differences in approaches&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#references\&quot;&gt;References&lt;\/a&gt;&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;h2&gt;&lt;span style=\&quot;font-size: 1.8rem; font-weight: 600; letter-spacing: 0.01rem;\&quot;&gt;&lt;a name=\&quot;summary\&quot;&gt;&lt;\/a&gt;Summary of key points&lt;\/span&gt;&lt;\/h2&gt;\n&lt;p&gt;Greenhouse gas emissions statistics are produced using different approaches to meet different demands and applications, and to capture the breadth of factors driving emissions.&lt;\/p&gt;\n&lt;p&gt;For national statistical reporting, countries can measure their emissions using either a production or a consumption approach.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;The production approach records emissions at the point at which emissions pass from human activity to the environment. It has two variations: the territory-based approach and the residency-based approach (see figure 1).&lt;\/li&gt;\n&lt;li&gt;The consumption approach accounts for emissions \u2018embodied\u2019 in a good or service that result from activity across the entire supply chain.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p class=\&quot;Bulletintroduction\&quot;&gt;New Zealand\u2019s current greenhouse gas emissions statistics are:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;greenhouse gas inventory (GHG inventory) \u2013 emissions and removals on the territory (produced by Ministry for the Environment (MfE))&lt;\/li&gt;\n&lt;li&gt;greenhouse gases by industries and households (emissions account) \u2013 emissions on a production basis by economic residents (Stats NZ)&lt;\/li&gt;\n&lt;li&gt;consumption-based emissions \u2013 emissions embodied in goods and services consumed by economic residents (Stats NZ).&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;It is common for countries to report on emissions in these three ways (Department of Energy and Climate Change, 2015; European Environment Agency, 2013). However, countries use only the GHG inventory to report against greenhouse gas emissions reduction targets.&lt;\/p&gt;\n&lt;p&gt;For more information on the data and methods Stats NZ uses to estimate emissions&amp;nbsp; by industries and households and on a consumption-basis, see &lt;a href=\&quot;methods\/environmental-economic-accounts-sources-and-methods\&quot;&gt;Environmental-economic accounts: Sources and methods&lt;\/a&gt;. For emissions and removals data produced by the Ministry for the Environment, see &lt;a title=\&quot;Link to Ministry for the Environment\&quot; href=\&quot;https:\/\/www.mfe.govt.nz\/publications\/climate-change\/new-zealands-greenhouse-gas-inventory-1990-2018\&quot;&gt;New Zealand&#039;s greenhouse gas inventory&lt;\/a&gt;.&amp;nbsp;&lt;\/p&gt;\n&lt;p class=\&quot;Figureandtablenumbers\&quot;&gt;&lt;strong&gt;Figure 1&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;&lt;img width=\&quot;2955\&quot; height=\&quot;1754\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Methods\/Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions\/Download-data\/fig-1-approaches-to-measuring-greenhouse-gas-emissions-statistics.PNG\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#fig-1\&quot;&gt;Text alternative for figure 1, Approaches to measuring greenhouse gas emissions statistics&lt;\/a&gt;.&lt;\/p&gt;\n&lt;h2&gt;GHG inventory&lt;\/h2&gt;\n&lt;p&gt;The GHG inventory is based on the territory principle. It is best suited for understanding New Zealand\u2019s greenhouse gas profile (in both gross and net terms) and identifying the source processes that generate emissions within the territory.&lt;\/p&gt;\n&lt;p&gt;Gross emissions are New Zealand\u2019s total emissions from the sectors of agriculture, energy, industrial processes and product use (IPPU), and waste, as well as gross emissions from Tokelau.&lt;\/p&gt;\n&lt;p&gt;Net emissions are gross emissions combined with emissions and removals from the land use, land use change, and forestry (LULUCF) sector. The GHG inventory is the official annual estimate of all human-generated greenhouse gas emissions and removals in New Zealand, and is used for international reporting and reporting progress against targets (MfE, nd).&lt;\/p&gt;\n&lt;h2&gt;Emissions account&lt;\/h2&gt;\n&lt;p&gt;The emissions account (greenhouse gases by industries and households) is based on the residence of the emitter. It reconfigures inventory data to provide information on \u2018who\u2019 within the economy is emitting, and is designed to understand the economic and social context of emissions. The account emphasises that an economic unit may emit from multiple processes. It distinguishes households from industries, and New Zealand residents from non-residents. The account covers only gross emissions from New Zealand\u2019s agriculture, energy, IPPU, and waste sectors.&lt;\/p&gt;\n&lt;p&gt;A key feature of the emissions account is its use of a standard industrial classification. This facilitates the integration of emissions data with economic, population, or other environmental-economic statistics. Using industry classifications recategorises inventory data while the application of the residency principle leads to differences in total estimates.&lt;\/p&gt;\n&lt;h2&gt;&lt;a name=\&quot;production\&quot;&gt;&lt;\/a&gt;Production and consumption approaches to measuring emissions&lt;\/h2&gt;\n&lt;p&gt;In broad terms, emissions can be measured using either a production approach or a consumption approach.&lt;\/p&gt;\n&lt;p&gt;The production approach focuses on the flow of gases at the point they pass from either human activity or economic activity to the environment. It is often referred to as a \u2018supply-side\u2019 approach. The production approach has two variations \u2013 the territory-based approach and the residency-based approach.&lt;\/p&gt;\n&lt;p&gt;The consumption approach is often referred to as a \u2018demand-side\u2019 approach because it focuses on the use of goods and services and the emissions embodied in their production process.&lt;\/p&gt;\n&lt;p&gt;Greenhouse gas emissions statistics are produced using different approaches to meet different demands and applications, and to capture the breadth of factors driving emissions. A single approach will not adequately capture all emissions-related questions and perspectives, hence the need for different approaches.&lt;\/p&gt;\n&lt;p&gt;Below are New Zealand\u2019s current greenhouse gas emissions statistics.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Greenhouse gas inventory, produced by MfE, is the official annual estimate of all human-generated greenhouse gas emissions and removals in New Zealand. It is prepared according to United Nations Framework Convention on Climate Change (UNFCCC) guidelines using Intergovernmental Panel on Climate Change (IPCC) 2006 methodologies. MfE compiles the greenhouse gas inventory using the production approach (territory principle). From this point, we refer to greenhouse gas inventory as either the \u2018GHG inventory\u2019 or the \u2018inventory\u2019.&lt;\/li&gt;\n&lt;li&gt;Greenhouse gas emissions by industries and households, produced by Stats NZ, is based on the United Nations System of Environmental-Economic Accounting (SEEA) framework. Stats NZ compiles these statistics using the production approach (residency principle). From this point, we refer to this as the \u2018emissions account\u2019.&lt;\/li&gt;\n&lt;li&gt;Consumption-based emissions are produced by Stats NZ as an extension of the SEEA framework using the residency principle.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;It is common for countries to report on emissions in these three ways (Department of Energy &amp;amp; Climate Change, 2015; European Environment Agency, 2013). However, countries use only the GHG inventory to report against greenhouse gas emissions reduction targets.&lt;\/p&gt;\n&lt;h3&gt;Overview of frameworks for measuring greenhouse gases&lt;\/h3&gt;\n&lt;h4&gt;GHG inventory&lt;\/h4&gt;\n&lt;p&gt;New Zealand produces emissions statistics under the inventory approach for international reporting encompassing the United Nations Framework Convention on Climate Change (UNFCCC), the Kyoto Protocol and, from 2023, the Paris Agreement. The GHG inventory produced by MfE measures all human-caused emissions and removals that occur within a geographic territory.&lt;\/p&gt;\n&lt;p&gt;The GHG inventory is the official source of New Zealand\u2019s emissions and removals data and is reported annually to the UNFCCC. It is also the basis by which progress towards targets is determined. Data is available from 1990, in line with international reporting requirements. Emissions and removals projections are also produced and reported every two years.&lt;\/p&gt;\n&lt;p&gt;From a statistical perspective, the inventory is \u2018stand alone\u2019, that is, it is not part of a broader suite of statistics, but it uses many data sources, such as the Ministry of Business, Innovation and Employment (MBIE), Ministry for Primary Industries (MPI), Environmental Protection Agency (EPA), Stats NZ, and businesses. Further detail on the data sources, methods, emissions factors used, and data quality can be found in the annual &lt;a href=\&quot;https:\/\/www.mfe.govt.nz\/climate-change\/state-of-our-atmosphere-and-climate\/new-zealands-greenhouse-gas-inventory\&quot;&gt;New Zealand\u2019s greenhouse gas inventory&lt;\/a&gt; report.&lt;\/p&gt;\n&lt;h4&gt;Emissions account&lt;\/h4&gt;\n&lt;p&gt;The emissions accounting approach is based on the United Nations System of Environmental-Economic Accounting (SEEA) framework. It aligns the measurement of emissions with economic production by attributing emissions to the resident economic unit, including activity that takes place overseas, at the point of emission.&lt;\/p&gt;\n&lt;h5&gt;SEEA framework&lt;\/h5&gt;\n&lt;p&gt;The SEEA Central Framework was adopted by the United Nations Statistical Commission in 2012 as the international standard for measuring the interactions between the environment and the economy. It uses the concepts, definitions, and classifications consistent with those in the System of National Accounts (SNA), which Stats NZ uses to produce economic statistics such as gross domestic product (GDP).&lt;\/p&gt;\n&lt;p&gt;The SEEA framework allows us to make direct comparisons between environmental and economic information, so that we have a clearer understanding of environmental-economic trade-offs and a more complete picture of our country\u2019s economic and environmental performance. The estimates of greenhouse gases by industries and households are therefore part of a broader framework of environmental-economic considerations. For example, emissions to air (such as particulate matter), energy, material use, water, or waste, can also be produced under the SEEA framework and integrated with the estimates of greenhouse gases by industry.&lt;\/p&gt;\n&lt;p&gt;The SEEA is suited to analytical extensions as it is designed to be integrated with other statistics. This includes comparisons of industry output (or other economic data) and emissions, measurement of emissions intensity (emissions per unit of GDP), tracking emissions in relation to economic growth, and identifying relative or absolute decoupling.&lt;\/p&gt;\n&lt;p&gt;Stats NZ\u2019s emissions accounts are released as Greenhouse gas emissions (industry and household), and are part of the &lt;a href=\&quot;https:\/\/seea.un.org\/content\/air-emissions-accounts\&quot;&gt;air emissions accounts&lt;\/a&gt; in the SEEA framework (United Nations, 2012). However, we do not call them \u2018air emissions accounts\u2019 because the framework used for an air emissions account includes all emissions to air (for example, particulate matter) and the Stats NZ account includes only emissions of greenhouse gases.&lt;\/p&gt;\n&lt;h5&gt;Energy-first or inventory-first approaches&lt;\/h5&gt;\n&lt;p&gt;Emissions accounts can be developed using either an energy-first or inventory-first approach (Eurostat, 2015). The energy-first approach uses energy statistics\/balances as the starting point for compiling emissions accounts, while the inventory-first approach uses the inventory as the main input data source.&lt;\/p&gt;\n&lt;p&gt;New Zealand\u2019s emissions accounts are based on an inventory-first approach given the significance of non-energy sources in its emissions profile. Emissions accounts therefore are subject to the same uncertainties in the inventory as well as additional uncertainties from the assumptions made to convert industry data to specific classes of industry.&lt;\/p&gt;\n&lt;h4&gt;Consumption-based emissions&lt;\/h4&gt;\n&lt;p&gt;The consumption approach provides estimates of a country\u2019s carbon footprint. It associates a \u2018carbon footprint\u2019 to the consumption of final goods and services, such as household consumption, government expenditure, and investment in physical assets. This is done by measuring the emissions \u2018embodied\u2019 in a good or service throughout the entire supply chain required to produce that good or service for final use. The consumption approach is also estimated using the SEEA framework.&lt;\/p&gt;\n&lt;p&gt;The consumption approach builds upon the residence-based emissions estimates. It seeks to measure the emissions \u2018embodied\u2019 in a good or service throughout the entire supply chain required to produce that good or service for final use, so it requires the final user (household, business, or government) to be identified. This requires a link between industry supply of products and final user to be established, which requires the use of the industry-based production estimates.&lt;\/p&gt;\n&lt;p&gt;As with emissions accounts, the consumption-based emissions statistics are suited to analytical extensions as it is designed to be integrated with other statistics. This includes deriving estimates of consumption of emissions per capita or in relation to expenditure and investment.&lt;\/p&gt;\n&lt;p&gt;Unlike the production approaches, there are no international standards for measuring emissions on a consumption basis or reporting requirements. Eurostat provides methodological guidance and tools for countries to produce consumption estimates consistent with the SEEA framework (Eurostat, 2011; Eurostat, 2017).&lt;\/p&gt;\n&lt;p&gt;The quality of consumption-based emissions is dependent on the emissions accounts as the primary input data, additional assumptions regarding the structure of the economy over time, and emissions intensities of industries in other countries.&lt;\/p&gt;\n&lt;h5&gt;Accounting for imports and exports&lt;\/h5&gt;\n&lt;p&gt;The consumption approach also identifies the emissions embodied in outputs produced by an industry that are exported (and thus not consumed domestically) and the emissions embodied in imports.&lt;\/p&gt;\n&lt;p&gt;The consumption approach can show significantly different estimates (in terms of levels and trends) to emissions accounts depending on the role of trade and the types of products imported and exported.&lt;\/p&gt;\n&lt;p&gt;While the emissions accounts show New Zealand produces a significant amount of emissions from dairy manufacturing, the consumption approach highlights that these emissions are embodied in exports. Embodied emissions from New Zealand\u2019s imports of manufactured goods are not recorded in the inventory or the emissions account, but are in the consumption approach. Both approaches include the emissions from fuel used for driving cars in New Zealand.&lt;\/p&gt;\n&lt;p&gt;Figure 2 shows how consumption-based emissions can be accounted for after factoring in the role of emissions embodied in exports and imports to emissions produced and consumed domestically.&lt;\/p&gt;\n&lt;p class=\&quot;Figureandtablenumbers\&quot;&gt;&lt;strong&gt;&lt;span style=\&quot;font-size: 1rem;\&quot;&gt;Figure 2&lt;\/span&gt;&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p class=\&quot;Figureandtablenumbers\&quot;&gt;&lt;img width=\&quot;2578\&quot; height=\&quot;1557\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Methods\/Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions\/Download-data\/fig-2-relationship-between-domestic-and-consumption-of-emissions-approaches.PNG\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p class=\&quot;Figureandtablenumbers\&quot;&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#fig-2\&quot;&gt;Text alternative for figure 2, Relationship between domestic production and consumption of emissions approaches&lt;\/a&gt;.&lt;\/p&gt;\n&lt;h2&gt;&lt;a name=\&quot;understanding\&quot;&gt;&lt;\/a&gt;Understanding the differences in approaches&lt;\/h2&gt;\n&lt;p&gt;The production and consumption approaches to measuring emissions both offer important insights into the factors contributing to New Zealand\u2019s emissions. Understanding the statistical basis for how each approach is compiled is important for interpreting the estimates and for analytical applications. This includes identifying the scope, the means by which emissions are attributed to a source or unit, and the appropriate classifications for each approach.&lt;\/p&gt;\n&lt;p&gt;The information that follows is suitable for readers interested in more technical details behind the different approaches.&lt;\/p&gt;\n&lt;p&gt;Table 1 summarises the key features of each measurement approach in relation to various aspects such as the main purpose, underlying accounting principle, classifications, recording of flows, and coverage of pollutants.&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Table 1&lt;\/strong&gt;&lt;\/p&gt;\n&lt;table class=\&quot;stats-striped\&quot; style=\&quot;width: 100%;\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Features of three approaches to measuring emissions&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;th scope=\&quot;col\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;GHG inventory&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Accounts (production)&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Accounts (consumption)&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;Purpose&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;Provides official estimates, used for international reporting and for tracking and targets&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;Enhancing comparability of emissions data to economic statistics (for example, emissions intensity and decoupling). International comparisons.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;Accounting for final use, and role of trade in emissions. Carbon footprinting and analytical indicators.&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;\n&lt;p&gt;Accounting principle&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;Territory&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;Residency&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;Residency&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Classification&lt;\/td&gt;\n&lt;td&gt;Source\/sink categories&lt;\/td&gt;\n&lt;td&gt;Industries and households&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;Final use categories&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Recording of flows&lt;\/td&gt;\n&lt;td&gt;Gross and net&lt;\/td&gt;\n&lt;td&gt;Gross&lt;\/td&gt;\n&lt;td&gt;Gross&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Framework&lt;\/td&gt;\n&lt;td&gt;Stand alone (UNFCCC and IPCC)&lt;\/td&gt;\n&lt;td&gt;Part of broader suite of environmental-economic accounts that aligns to the System of National Accounts&lt;\/td&gt;\n&lt;td&gt;Extension to environmental-economic accounts&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Pollutants&lt;\/td&gt;\n&lt;td&gt;Greenhouse gases&lt;\/td&gt;\n&lt;td&gt;Greenhouse gases, ambient air pollutants&lt;\/td&gt;\n&lt;td&gt;Greenhouse gases, ambient air pollutants&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Carbon dioxide from biomass used for energy&lt;\/td&gt;\n&lt;td&gt;Memo item; not included in totals as emissions already counted at forest harvest&lt;\/td&gt;\n&lt;td&gt;Recorded as a separate substance&lt;\/td&gt;\n&lt;td&gt;Recorded as a separate substance&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;4\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Note&lt;\/strong&gt;: UNFCCC \u2013 United Nations Framework Convention on Climate Change; IPCC \u2013 Intergovernmental Panel on Climate Change&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Source&lt;\/strong&gt;: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;h3&gt;Scope: Gross and net emissions&lt;\/h3&gt;\n&lt;p&gt;The territory and residence perspectives differ in relation to the treatment of removals of emissions from the atmosphere (sequestration) and therefore whether they include gross or net emissions.&lt;\/p&gt;\n&lt;p&gt;Recording GHG emissions under the SEEA is based on the national accounting supply-use framework. This approach records the generation and release of emissions from economic units and households to the environment as a transaction between a unit and the environment. In practice, data for each economic unit is not readily available, but industry-level data is (which contains groups of units that undertake similar activities), so allocations are made at the industry rather than unit level. In this framework, the sequestering of emissions does not accrue to an economic unit so there is no corresponding use to be recorded. As a result, the SEEA framework only records gross emissions. The GHG inventory, however, is not constructed in the same supply-use framework so it can record both the generation and removals of emissions, that is, gross and net.&lt;\/p&gt;\n&lt;p&gt;The land use, land use change, and forestry (LULUCF) sector of the inventory covers the emissions and removals of greenhouse gases resulting from direct human-induced land use, land-use change, and forestry activities. LULUCF includes the emissions that arise from the changes in carbon stocks in soils and vegetation as a result of these activities, in addition to other non-carbon dioxide emissions such as methane and nitrous oxide.&lt;\/p&gt;\n&lt;p&gt;The LULUCF sector of the inventory is generally excluded from SEEA emissions accounts. Emissions in the LULUCF sector can be recorded in the emissions accounts if data is available to allocate to industry, but because of the challenges in aligning the LULUCF sector to industry, it is excluded from emissions account estimates (Eurostat, 2015). This also means LULUCF cannot be incorporated into consumption-based emissions.&lt;\/p&gt;\n&lt;h3&gt;Scope: Coverage of greenhouse gases and other emissions&lt;\/h3&gt;\n&lt;p&gt;The production and consumption statistics both include emissions of carbon dioxide, methane, and nitrous oxide. The production statistics include emissions of hydrofluorocarbons, perfluorocarbons, and sulphur hexafluoride separately, while these are combined in reporting consumption-based emissions.&lt;\/p&gt;\n&lt;p&gt;The supply-use framing of the SEEA also means carbon dioxide emissions from burning biomass (that is, living or recently dead organic material) for energy purposes can be recorded, in principle, as a separate substance (however, they are not yet recorded in New Zealand\u2019s emissions accounts). This is different from the inventory where carbon dioxide emissions from biomass are excluded from the energy sector in order to avoid double counting. These emissions are instead reported in the LULUCF sector of the inventory.&lt;\/p&gt;\n&lt;p&gt;The SEEA is a framework for recording a range of environmental-economic flows, so apart from greenhouse gases, the air emissions account can also include ambient air pollutants (for example, particulate matter). However, Stats NZ has yet to include ambient air pollutants in its air emissions accounts.&lt;\/p&gt;\n&lt;h3&gt;Scope: Territory and residence principles&lt;\/h3&gt;\n&lt;p&gt;The territory principle allocates emissions taking place within national territory and offshore areas over which the country has jurisdiction. The inventory is prepared using the territory principle so it covers New Zealand\u2019s geographic zone, and therefore the Chatham Islands, and includes emissions from Tokelau. Hence, the territory principle allocates the emissions to the territory where the activity takes place.&lt;\/p&gt;\n&lt;p&gt;An alternative to the territory principle is the residency principle. The SEEA emissions account and consumption emissions are based on the residency principle. The residency principle allocates the activity to where the unit (that is, operator) undertaking the activity is resident, even though that activity may happen in a region other than where they are resident. The emitting unit may be a business or household.&lt;\/p&gt;\n&lt;p&gt;For example, if a New Zealand fishing vessel purchases fuel in New Zealand, the associated emissions would be recorded in both the inventory and emissions accounts. If a non-New Zealand vessel purchases fuel in New Zealand, then the associated emissions would only be recorded in the inventory. If a New Zealand vessel lands catch overseas and refuels to return to New Zealand, then the emissions associated with those purchases would be recorded in the emissions accounts but not in the inventory.&lt;\/p&gt;\n&lt;p&gt;The rationale for the residency principle is to maintain consistency with the national accounts. For determining whether a unit is resident, it is assessed whether it has a \u2018centre of economic interest\u2019 in New Zealand.&lt;\/p&gt;\n&lt;p&gt;A foreign-owned company may still have a centre of economic interest in New Zealand if it has made significant investment in fixed capital and provides employment. Banks are an example where ownership is foreign, but the operation of the bank is focused on providing services for New Zealand, and therefore contributes to the economy. Foreign-owned banks in New Zealand would therefore also contribute to emissions under both the inventory and emissions accounting approaches.&lt;\/p&gt;\n&lt;p&gt;In contrast, cruise ships are an example of foreign-owned and operated units that undertake activities in New Zealand\u2019s geographic zone but are not considered economic residents because their centre of economic interest is not in New Zealand.&lt;\/p&gt;\n&lt;p&gt;To convert from the territory-based production emissions to residence-based emissions, estimates of emissions are required for residents operating overseas and non-residents on the territory. Non-resident emissions are deducted while residents operating overseas are added to inventory estimates to obtain SEEA estimates. These adjustments are made, where data permits, for fishing vessels, international shipping, international aviation, and land transport. Adjustments may also be required for geographic scope. Units in Tokelau have no centre of economic interest in New Zealand, so they are excluded from the emissions accounts.&lt;\/p&gt;\n&lt;p&gt;As a remote island nation, the role of international aviation and shipping are important in maintaining New Zealand\u2019s economic ties. While New Zealand does not have the \u2018fuel hopping\u2019 problem many European countries have (where residents of a country cross borders to purchase fuel if it is cheaper), significant emissions from non-residents on the territory using land transport need to be accounted for. International tourists using vehicles in New Zealand are deducted from the SEEA estimates as they are non-resident operators.&lt;\/p&gt;\n&lt;p&gt;Consumption-based emissions are based on the residency principle (given the definition of final consumption). They include emissions produced overseas from non-resident producers (emissions embodied in imports) in order to determine consumption from residents. The consumption-based emissions estimates also record the emissions produced by resident economic units consumed by non-residents (emissions embodied in exports).&lt;\/p&gt;\n&lt;p&gt;The consumption-based emissions estimates can be reconciled with the emissions account through the emissions associated with imports and exports. However, they cannot be directly compared with the GHG inventory given the application of the residency principle, and the classifications used.&lt;\/p&gt;\n&lt;div style=\&quot;background-color: #f6f6f6; padding: 30px;\&quot;&gt;\n&lt;h3 class=\&quot;Boxedtextheading\&quot;&gt;The spatial dimension: measuring emissions at the regional scale&lt;\/h3&gt;\n&lt;p class=\&quot;Boxedtext\&quot;&gt;In principle, emissions can be measured at any spatial scale using either the inventory approach or emissions accounting approach, so long as a clear spatial boundary is defined. Canada for example, produces emissions on a provincial scale using the inventory approach while Sweden produces regional estimates on an emissions accounting basis.&lt;\/p&gt;\n&lt;p class=\&quot;Boxedtext\&quot;&gt;Not all datasets used to compile the GHG inventory have a spatial dimension (for example, fuel use is only available at the national level), so regional estimates for New Zealand are compiled using the SEEA framework by apportioning the emissions accounts using datasets that can link industry or households to region.&lt;\/p&gt;\n&lt;p class=\&quot;Boxedtext\&quot;&gt;Stats NZ produces emissions estimates for 15 regions (based on regional district boundaries, with Nelson and Tasman combined) using data on agricultural production, economic output, population, transport movements, and data from other sources.&lt;\/p&gt;\n&lt;p class=\&quot;Boxedtext\&quot;&gt;As with the national estimates, the regional estimates focus on the production of emissions by all resident economic units and households of a region. It thereby uses the same accounting principles, such as attribution to the operator, residency, gross accounting, and same industry classification. These estimates are reconciled to the national emissions account.&lt;\/p&gt;\n&lt;p&gt;For accounting coherency, indirect emissions (emissions that are a consequence of the activities of the reporting entity but occur at sources owned or controlled by another entity, such as purchased electricity) are excluded, as are direct emissions by non-economic resident units (for example, international tourists). These exclusions reflect the production approach to measuring regional emissions and enable comparisons with regional GDP. Stats NZ is exploring the possibility of measuring regional emissions on a consumption basis.&lt;\/p&gt;\n&lt;\/div&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Across regions in a country, the territory and residence principles may either lead to the same allocation to a region or a different allocation. Emissions from the GHG inventory\u2019s agriculture, industrial processes and product use (IPPU), and waste sectors are largely from stationary sources, given the fixed nature of capital used in their generation. Emissions from these sectors measured under either a residence or territory approach may be broadly similar.&lt;\/p&gt;\n&lt;p&gt;However, in the case of energy, where emissions can be from stationary or mobile sources, emissions measured using the residency principle or geographic\/territorial principle may differ substantially. This is observable in the national estimates where total emissions are greater than those of the GHG inventory (which is based on the territory principle) because emissions by residents overseas are greater than non-residents on the territory. At a regional level, this situation may arise due to firms purchasing fuel in other regions, or fuel in a region being purchased by international tourists.&lt;\/p&gt;\n&lt;h4&gt;Significance of differences in approaches&lt;\/h4&gt;\n&lt;p&gt;Table 2 shows the difference between the GHG inventory estimate and emissions accounts estimate for 2018, after applying the residency principle and differences in geographic scope.&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Table 2&lt;\/strong&gt;&lt;\/p&gt;\n&lt;table class=\&quot;stats-striped\&quot; style=\&quot;width: 100%;\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Difference between GHG inventory and emissions account, 2018&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Item&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Carbon dioxide equivalents (kilotonnes)&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;GHG inventory total \u2013 excluding LULUCF&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;78,862&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Less non-residents operating on domestic territory&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;-609&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Plus residents operating overseas&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;3,106&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Plus\/minus other differences&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;-4&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Equals SEEA greenhouse gas by industries and households, account total (emissions account estimate)&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;81,355&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Note&lt;\/strong&gt;: LULUCF \u2013 land use, land use change, and forestry; SEEA \u2013 System of Environmental-Economic Accounting&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Source&lt;\/strong&gt;: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Figure 3 shows that the emissions account has a similar trend to the gross emissions in the inventory. Emissions as measured under the SEEA were 3.2 percent (2,493 kilotonnes CO2-e) higher than those under the inventory in 2018. This is because emissions from New Zealand\u2019s activities overseas exceeded those by non-residents on domestic territory (residence adjustments).&lt;\/p&gt;\n&lt;p&gt;Consumption-based emissions are lower than the emissions account as emissions embodied in exports exceed emissions embodied in imports across the time series.&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Figure 3&lt;\/strong&gt;&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;43316&quot;,&quot;Title&quot;:&quot;GGE consumption-based YE 2017 \u2013 GHG inventory production and consumption-based emissions&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Kilotonnes (CO2-e)&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:&quot;&lt;p&gt;CO2-e \u2013 carbon dioxide equivalent. LULUCF \u2013 land use, land-use change, and forestry. SEEA \u2013 System of Environmental-Economic Accounting. The greenhouse gas inventory excludes Tokelau emissions. Not applicable shown as NaN in table.&amp;nbsp;&lt;\/p&gt;&quot;,&quot;SeriesData&quot;:[{&quot;ID&quot;:13148,&quot;Title&quot;:&quot;GGE consumption-based YE 2017-GHG inventory produc&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year ended December,1990,1991,1992,1993,1994,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017,2018\r\nGHG inventory - excluding LULUCF,63588,64450,65666,65430,66676,67423,69546,72256,70218,72057,74100,77102,77471,79640,79291,81270,81451,79411,79522,76767,77263,76971,79397,78801,79446,79490,77620,79637,78859\r\nProduction emissions (SEEA basis),,,,,,,,,,,,,,,,,,82243,82300,79061,79404,79059,81548,80904,81544,81728,79972,82009,81355\r\nConsumption-based emissions,,,,,,,,,,,,,,,,,,60279,58157,56316,54996,52884,55567,55528,56839,59186,59200,60024,\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Greenhouse gas inventory, production- and consumption-based emissions, 1990\u20132018&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;See metadata tab for notes about the data in this graph.&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;43239&quot;,&quot;Title&quot;:&quot;Approaches to measuring New Zealand\u2019s greenhouse gas emissions \u2013 3&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Other differences between emissions under the GHG inventory approach and the SEEA approach are due to Tokelau\u2019s inclusion in the inventory, while the emissions accounts exclude it. The emissions accounting series begins in 2007, as the introduction of the Australian and New Zealand Standard Industrial Classification (ANZSIC) 2006 affected the availability of input data by industry. Consumption-based emissions contain an additional lag due to the lack of national accounts information that covers the full 2018 year.&lt;\/p&gt;\n&lt;h3&gt;Attribution: Allocating emissions based on the source process, operator, and final user&lt;\/h3&gt;\n&lt;p&gt;A further distinction between the inventory and emissions accounting approaches is the notion of the operator. The emissions accounts allocate emissions to the operator, whereas the operator is not defined in the GHG inventory. The notion of the operator is also significant for distinguishing production from consumption.&lt;\/p&gt;\n&lt;p&gt;As an example, consider an Air New Zealand flight from Auckland to Wellington with New Zealand residents and international tourists on board. The operator (that is, the unit that employs and controls the technology that generates the emission) is Air New Zealand. From both production perspectives, the flight is allocated to New Zealand because what is taken into consideration is the residence of the operator, not the passengers. That some of the passengers are international tourists is significant only from a consumption perspective, in which the share of emissions attributable to international tourists is counted as an export and the share from New Zealanders are included in the estimate of consumption-based emissions.&lt;\/p&gt;\n&lt;p&gt;The distinction between operator and source process (in conjunction with the use of the territory or residence principle) has significant implications for measuring emissions as it drives the underlying classification used.&lt;\/p&gt;\n&lt;h4&gt;Classifications&lt;\/h4&gt;\n&lt;p&gt;With the residence principle comes a requirement to allocate emissions to a \u2018industry\u2019. For consistency with economic statistics, units for estimating emissions by industry are allocated using a standard industrial classification. For New Zealand, this is the &lt;a href=\&quot;http:\/\/aria.stats.govt.nz\/aria\/#ClassificationView:uri=http:\/\/stats.govt.nz\/cms\/ClassificationVersion\/CARS5587\&quot;&gt;Australian New Zealand Standard Industrial Classification 2006&lt;\/a&gt; (ANZSIC).&lt;\/p&gt;\n&lt;p class=\&quot;Bulletintroduction\&quot;&gt;The territorial approach does not require a standard industrial classification. Instead, it focuses on the processes generating emissions, and groups emissions by the following categories:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;energy&lt;\/li&gt;\n&lt;li&gt;industrial processes and product use (IPPU)&lt;\/li&gt;\n&lt;li&gt;agriculture&lt;\/li&gt;\n&lt;li&gt;land use, land-use change, and forestry (LULUCF)&lt;\/li&gt;\n&lt;li&gt;waste.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p class=\&quot;Bulletintroduction\&quot;&gt;By contrast, the ANZSIC classification groups units according to the predominant economic activity of the operator and assumes all units within an industry convert inputs to outputs in the same way. Industrial groups used in the emissions accounts include:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;agriculture, forestry, fishing&lt;\/li&gt;\n&lt;li&gt;mining&lt;\/li&gt;\n&lt;li&gt;manufacturing&lt;\/li&gt;\n&lt;li&gt;electricity, gas, water, and waste services&lt;\/li&gt;\n&lt;li&gt;construction&lt;\/li&gt;\n&lt;li&gt;retail and wholesale trade&lt;\/li&gt;\n&lt;li&gt;telecommunications, financial, rental, professional, and administrative services&lt;\/li&gt;\n&lt;li&gt;government and defence&lt;\/li&gt;\n&lt;li&gt;health care and social assistance&lt;\/li&gt;\n&lt;li&gt;education and training&lt;\/li&gt;\n&lt;li&gt;arts, recreation, and other services.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;Both classification systems are compiled at a more detailed level and aggregated up for data release. The emissions accounting estimates for New Zealand, for example, are available for 114 industries.&amp;nbsp;See &lt;a href=\&quot;http:\/\/aria.stats.govt.nz\/aria\/#ClassificationView:uri=http:\/\/stats.govt.nz\/cms\/ClassificationVersion\/CARS5851\&quot;&gt;Ari\u0101&lt;\/a&gt; for more information on the classifications used.&lt;\/p&gt;\n&lt;p&gt;The difference in perspectives, and therefore classifications, means similar terms in both the inventory and emissions accounts have different interpretations. For example, the term \u2018manufacturing industry\u2019 in the GHG inventory reflects the energy component in the manufacturing industries only, while manufacturing in the emissions accounts includes other sectors (for example, industrial processes and product use) and source categories. \u2018Road transport\u2019 in the inventory includes all forms of road transport (cars, light and heavy duty trucks, buses, and motorcycles) used on the territory while the \u2018road transport industry\u2019 in the emissions accounts incudes road freight, bus, and taxi companies (with household use of cars allocated to households and other industries\u2019 direct use of vehicles allocated to the relevant industry). Similarly, in the consumption-based emissions estimates, household transport emissions include indirect emissions (those from across the supply chain to produce fuel used in private vehicles and from purchases related to use of other modes) as well as direct emissions from household use of vehicles, which is therefore broader than \u2018transport\u2019 by households in the emissions account.&lt;\/p&gt;\n&lt;p&gt;Economic classifications can give additional insight into data that is not readily visible in the inventory. Examples include retail or wholesale trade, government and defence, health care and social assistance, and education and training. These industries are included in the \u2018commercial\u2019 sector of the inventory but can be identified in the emissions accounts where additional information allows for them to be estimated.&lt;\/p&gt;\n&lt;p&gt;The consumption-based emissions approach allocates emissions depending on the final user: households, business, or government. The consumption-based estimates are broken down to show the factors contributing to total consumption emissions. This includes a breakdown by final user and emissions embodied in the goods and services consumed by the final use category.&lt;\/p&gt;\n&lt;p&gt;The concept of the final user stems from the national accounts, in which the uses of resources are described either as intermediate or final. Intermediate uses consist of goods and services that are consumed (\u2018used-up\u2019 or transformed) in a production process within the economy and during the accounting period. Final uses comprise all other uses of goods and services , such as by households, government, or investment in physical assets.&lt;\/p&gt;\n&lt;p&gt;In the consumption-based approach, emissions associated with all the production processes, transport, storage, and retailing are associated with getting a product to the final user. To reallocate these emissions to the final user, use is made of the conceptual framing of the national accounts, particularly input-output tables, where the domestic final users make up the components of a nation\u2019s consumption-based emissions, which is equal to production after accounting for trade. The link between industry (defined using ANZSIC) and final user is central to this process.&lt;\/p&gt;\n&lt;p&gt;Table 3 shows how applying both residency or territory principles and classifications are important for understanding the steps taken from the production estimates on a territory basis to those on a residence basis, to consumption.&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Table 3&lt;\/strong&gt;&lt;\/p&gt;\n&lt;table class=\&quot;stats-striped\&quot; style=\&quot;width: 100%;\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Formula for deriving consumption emissions from territorial production emissions&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Item&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Classification&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Allocation principle&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Net emissions&lt;\/td&gt;\n&lt;td&gt;Process&lt;\/td&gt;\n&lt;td&gt;Territory&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Less LULUCF&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Equals gross emissions produced on the territory (GHG inventory \u2013 excluding LULUCF)&lt;\/td&gt;\n&lt;td&gt;Process&lt;\/td&gt;\n&lt;td&gt;Territory&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Plus resident emissions overseas&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Less non-residents on the domestic territory&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Plus\/minus other differences&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Equals production of emissions by residents&lt;\/td&gt;\n&lt;td&gt;Economic (industry)&lt;\/td&gt;\n&lt;td&gt;Residency&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Less emissions embodied in exports&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Plus emissions embodied in imports&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Equals consumption of emissions by residents&lt;\/td&gt;\n&lt;td&gt;Economic (final user)&lt;\/td&gt;\n&lt;td&gt;Residency&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;3\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Note&lt;\/strong&gt;: LULUCF \u2013 land use, land use change, and forestry&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Source&lt;\/strong&gt;: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;div style=\&quot;background-color: #f6f6f6; padding: 30px;\&quot;&gt;\n&lt;h3&gt;Tourism emissions&lt;\/h3&gt;\n&lt;p&gt;Tourism, unlike \u2018conventional\u2019 industries such as agriculture or manufacturing which are classified in accordance with the goods and services they produce, is defined by the characteristics of the customer demanding tourism products. As such, tourism cuts across standard industry definitions (that is, spans multiple industries). This means that tourism emissions are not readily available from either emissions inventories or accounts. However, emissions related to tourism activity can be estimated by using the Tourism Satellite Account framework (United Nations World Tourism Organisation, 2008), thereby giving a more complete picture of the tourism carbon footprint.&lt;\/p&gt;\n&lt;p&gt;&lt;em&gt;Linking the TSA and the SEEA: A technical note&lt;\/em&gt; (United Nations World Tourism Organization, 2019) outlines how emissions accounts can be linked to the Tourism Satellite Account (TSA) to show the contribution of tourism to environmental outcomes and resource use. The SEEA and TSA share the same accounting principles and industry definitions which allow for the integration of the two frameworks.&lt;\/p&gt;\n&lt;p&gt;The physical supply and use table for flows of emissions (as described in table 3.7 of the &lt;a title=\&quot;Link to SEAA UN website, opens a PDF\&quot; href=\&quot;https:\/\/seea.un.org\/sites\/seea.un.org\/files\/seea_cf_final_en.pdf\&quot;&gt;SEEA 2012 central framework&lt;\/a&gt;) can be adapted to present information on the generation of emissions by tourism industries. The attribution of emissions to tourism assumes that the relationship between economic activity and emissions does not depend on whether the outputs are sold to tourists or residents. For example, a unit of emissions is generated in the same manner in the accommodation industry for an international tourist or a New Zealand resident (even if most of the output of accommodation is dependent on international tourists).&lt;\/p&gt;\n&lt;p&gt;The link between the SEEA and TSA enables an estimate of the carbon tourism footprint of international visitors and domestic tourism on the territory to be developed. The bridging table for tourism emissions (see table 4) shows how the emissions from tourism on the territory can be derived from the SEEA estimate. The SEEA estimate can be used to compare the contribution of tourism with the economy and employment, while emissions from tourism on the territory can be compared to gross emissions in the GHG inventory. Tourism consumption emissions are available from the consumption-based emissions estimates. These are broader than the production estimates as they account for emissions embodied in imports and emissions across the supply chain.&lt;\/p&gt;\n&lt;p&gt;The scope of emissions related to international aviation differs across production approaches and other perspectives on international tourism (for example, origin of visitor focus). The emissions account includes emissions from resident airlines but does not identify the residency of the passenger. The GHG inventory, on the other hand, only records fuel sales for international aviation (that is, departures). Neither approach fully captures emissions for international visitors arriving and departing New Zealand (see table 5).&lt;\/p&gt;\n&lt;\/div&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Table 4&lt;\/strong&gt;&lt;\/p&gt;\n&lt;table class=\&quot;stats-striped\&quot; style=\&quot;width: 100%;\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Bridging table for tourism emissions, carbon dioxide equivalents (kilotonnes), 2018&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Carbon dioxide equivalents (kilotonnes)&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Emissions attributable to tourism (SEEA basis)&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;6,026&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Less resident emissions attributable to tourism overseas&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;-2,838&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;padding-left: 30px;\&quot;&gt;Plus non-residents (international tourists) on the territory&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;609&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Emissions attributable to tourism (territory basis)&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;3,796&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&lt;strong&gt;Note&lt;\/strong&gt;: Figures may not sum due to rounding. SEEA \u2013 System of Environmental-Economic Accounting.&lt;\/span&gt;&lt;\/p&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&lt;strong&gt;Source&lt;\/strong&gt;: Stats NZ&lt;\/span&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Table 5&lt;\/strong&gt;&lt;\/p&gt;\n&lt;table class=\&quot;stats-striped\&quot; style=\&quot;width: 100%;\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Coverage of international aviation emissions under different approaches&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Carrier&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Passenger&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Arrival&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Departure&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td rowspan=\&quot;2\&quot;&gt;National&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;NZ passenger&lt;\/td&gt;\n&lt;td&gt;SEEA&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;SEEA&lt;\/p&gt;\n&lt;p&gt;GHG inventory&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;International passenger&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;SEEA&lt;\/p&gt;\n&lt;p&gt;International visitor focus&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;SEEA&lt;\/p&gt;\n&lt;p&gt;GHG inventory&lt;\/p&gt;\n&lt;p&gt;International visitor focus&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;background-color: #f6f6f6;\&quot; rowspan=\&quot;2\&quot;&gt;International&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;NZ passenger&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;GHG inventory&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;International passenger&lt;\/td&gt;\n&lt;td&gt;International visitor focus&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;GHG inventory&lt;\/p&gt;\n&lt;p&gt;International visitor focus&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;4\&quot;&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&lt;strong&gt;Note&lt;\/strong&gt;: SEEA \u2013 System of Environmental-Economic Accounting&lt;\/span&gt;&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&lt;strong&gt;Source&lt;\/strong&gt;: Stats NZ&lt;\/span&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;h3&gt;Alignment between GHG inventory sectors and economic classifications&lt;\/h3&gt;\n&lt;p&gt;For consistency with economic statistics, the emissions accounting approach and consumption-based emissions approach use the same principles, classifications, and concepts used in compiling the national accounts. In the national accounts, for recording economic production, units are allocated to an industry based on their primary activity. However, a unit may undertake secondary activities and involve multiple emissions-producing processes.&lt;\/p&gt;\n&lt;p&gt;As such, the emissions profile of an industry consists of multiple sources stemming from either different source processes used for its main activity or the different processes used for its different activities.&lt;\/p&gt;\n&lt;p&gt;For example, consider a farm that has sheep, poultry, deer, and beef cattle, and grows barley and wheat crops. This farm applies fertiliser, has a small farm fill, and has a tractor and other vehicles for transporting goods and undertaking its activities.&lt;\/p&gt;\n&lt;p&gt;The GHG inventory allocates the emissions from livestock, fertiliser, and crops to the agricultural sector; the associated direct energy emissions to energy; and the farm-fill emissions to waste.&lt;\/p&gt;\n&lt;p&gt;However, the SEEA approach allocates these emission sources to the same economic unit. If most of the outputs of the industry are from sheep and beef farming, then the emissions would be allocated to the sheep, beef cattle, and grain farming industry as defined under ANZSIC, despite the industry undertaking activities related to horticulture or deer, poultry, and other livestock farming. Table 6 shows an example of how sector-based data from the inventory are allocated across agricultural sub-industries.&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Table 6&lt;\/strong&gt;&lt;\/p&gt;\n&lt;table class=\&quot;stats-striped\&quot; style=\&quot;width: 100%;\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Process source emissions for agricultural industries, carbon dioxide equivalents (kilotonnes), 2018&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;th rowspan=\&quot;2\&quot; scope=\&quot;col\&quot;&gt;&amp;nbsp;Inventory sector&lt;\/th&gt;\n&lt;th rowspan=\&quot;2\&quot; scope=\&quot;col\&quot;&gt;&amp;nbsp;Production process&lt;\/th&gt;\n&lt;th style=\&quot;text-align: center;\&quot; colspan=\&quot;5\&quot; scope=\&quot;col\&quot;&gt;Industry&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Horticulture&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Sheep, beef cattle, and grain farming&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Dairy cattle farming&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Poultry, deer, and other livestock farming&lt;\/th&gt;\n&lt;th scope=\&quot;col\&quot;&gt;Total&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td rowspan=\&quot;5\&quot;&gt;Agriculture&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;th style=\&quot;text-align: center;\&quot; colspan=\&quot;5\&quot; scope=\&quot;col\&quot;&gt;Carbon dioxide equivalents (kilotonnes)&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Cropping&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;12.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;76.1&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;5.5&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;0.5&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;94.5&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Livestock and manure management&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;287.2&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;19,211.9&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;14,159.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;815.6&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;34,474.0&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Fertilisers&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;55.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;1,087.5&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;1,806.0&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;38.1&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;2,986.9&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Soils&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;0.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;17.7&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;11.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;0.8&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;30.0&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;Energy&amp;nbsp;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;452.8&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;422.4&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;399.0&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;77.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;1,351.5&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;Industrial processes and products use&amp;nbsp;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;0.8&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;1.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;1.4&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;0.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;3.7&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;Waste&amp;nbsp;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;189.9&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;702.4&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;278.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;14.3&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;1,184.9&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;Total emissions by industry&amp;nbsp;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;998.6&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;21,519.2&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;16,660.9&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;947.0&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;40,125.7&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;6\&quot;&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&lt;strong&gt;Note&lt;\/strong&gt;: Figures may not sum due to rounding.&lt;\/span&gt;&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-small\&quot;&gt;&lt;strong&gt;Source&lt;\/strong&gt;: Stats NZ&lt;\/span&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: right;\&quot;&gt;&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;Estimates of greenhouse gases from the inventory are allocated to industries for use in the emissions accounts in one of two ways. First, inventory emissions can be allocated directly to an industry. For example, emissions from public electricity (that is, grid electricity) and heat production are allocated to electricity, gas, water, and waste services. Second, inventory categories are allocated to multiple industries using additional data sources. This approach is used for road transport and for disaggregating high-level allocations (for example, commercial sector emissions to services excluding transport, postal, and warehousing) to lower-level industries (for example, retail or wholesale trade).&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;Figure 4 shows how sectors from the GHG inventory are allocated to an industry. It shows the relative contribution of both sectors and industries to total carbon dioxide equivalent emissions and that emissions from an industry can arise from several source categories. Energy emissions, for example, span activities throughout the economy.&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Figure 4&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;img width=\&quot;1280\&quot; height=\&quot;720\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Methods\/Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions\/Download-data\/Fig-4-flow-of-ghg-emissions-from-greenhouse-gas-inventory-sectors-to-prod-2017.png\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;span style=\&quot;font-size: 1rem;\&quot;&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#fig-4\&quot;&gt;Text alternative for figure 4, Flow of greenhouse gas emissions from the greenhouse gas inventory sectors to production, 2017&lt;\/a&gt;.&lt;\/span&gt;&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;span style=\&quot;font-size: 1rem;\&quot;&gt;The consumption-based emissions approach links emissions by industry and household to final user by using the statistical infrastructure of the national accounts. To show how emissions flow through the economy, into commodities, and to final use, the consumption-based emissions estimates use the input-output tables as their main data source along with residence-based emissions. Input-output tables describe the interactions between industries in an economy by showing the input requirements of industries to produce their outputs.&lt;\/span&gt;&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;Figure 5 extends this analysis by showing emissions from production by industries and households to consumption. It shows that to estimate consumption, additional information on emissions embodied in imports is combined with emissions produced by New Zealand\u2019s industries and households. Domestic consumption-based emissions come mainly from households, followed by gross capital formation, government, and non-profit institutions serving households. Emissions embodied in exports are also shown on the consumption side as these are generated from domestic production and use of imports.&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Figure 5&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;img width=\&quot;1280\&quot; height=\&quot;720\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Methods\/Approaches-to-measuring-New-Zealands-greenhouse-gas-emissions\/Download-data\/Fig-5-Flow-of-ghg-emissions-from-production-to-consumption-2017.png\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions#fig-5\&quot;&gt;Text alternative for figure 5, Flow of greenhouse gas emissions from production to consumption, 2017&lt;\/a&gt;.&lt;\/p&gt;\n&lt;h2&gt;&lt;span style=\&quot;font-size: 1.8rem; letter-spacing: 0.01rem;\&quot;&gt;&lt;a name=\&quot;references\&quot;&gt;&lt;\/a&gt;References&lt;\/span&gt;&lt;\/h2&gt;\n&lt;p&gt;Department of Energy &amp;amp; Climate Change (2015). &lt;a href=\&quot;https:\/\/assets.publishing.service.gov.uk\/government\/uploads\/system\/uploads\/attachment_data\/file\/450542\/Alternative_approaches_to_reporting_greenhouse_gas_emissions_report.pdf\&quot;&gt;Alternative approaches to reporting UK greenhouse gas emissions&lt;\/a&gt; (PDF, 253kB).&lt;\/p&gt;\n&lt;p&gt;European Environment Agency (2013). &lt;a href=\&quot;https:\/\/www.eea.europa.eu\/publications\/european-union-co2-emissions-accounting\&quot;&gt;European Union CO&lt;sub&gt;2&lt;\/sub&gt; emissions: different accounting perspectives&lt;\/a&gt;. Retrieved from www.eea.europa.eu.&lt;\/p&gt;\n&lt;p&gt;Eurostat (2011). &lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/documents\/51957\/6070597\/technical-documention.pdf\&quot;&gt;Creating consolidated and aggregated EU27 supply, use and input-output tables, adding environmental extensions (air emissions), and conducting Leontief-type modelling to approximate carbon and other &#039;footprints&#039; of EU27 consumption for 2000 to 2006&lt;\/a&gt; (PDF, 574kB).&lt;\/p&gt;\n&lt;p&gt;Eurostat (2015). &lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/web\/products-manuals-and-guidelines\/-\/KS-GQ-15-009\&quot;&gt;Manual for air emissions accounts&lt;\/a&gt;. Retrieved from https:\/\/ec.europa.eu.&lt;\/p&gt;\n&lt;p&gt;Eurostat (2017). &lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/web\/environment\/methodology\&quot;&gt;Consumption-based accounting tool \u2013 June 2017&lt;\/a&gt;. Retrieved&amp;nbsp; from https:\/\/ec.europa.eu.&lt;\/p&gt;\n&lt;p&gt;Ministry for the Environment (MfE) (nd). &lt;a href=\&quot;https:\/\/www.mfe.govt.nz\/climate-change\/climate-change-and-government\/emissions-reduction-targets\/reporting-our-targets-0\&quot;&gt;Latest update on New Zealand\u2019s 2020 net position&lt;\/a&gt;. Retrieved 5 August 2020 from www.mfe.govt.nz.&lt;\/p&gt;\n&lt;p&gt;United Nations (2012). &lt;a href=\&quot;https:\/\/seea.un.org\/content\/air-emissions-accounts\&quot;&gt;Air emissions accounts&lt;\/a&gt;. Retrieved from https:\/\/seea.un.org.&lt;\/p&gt;\n&lt;p&gt;United Nations World Tourism Organization (2008). &lt;a href=\&quot;https:\/\/www.unwto.org\/methodology\&quot;&gt;International recommendations for tourism statistics 2008&lt;\/a&gt;. Retrieved from www.unwto.org.&lt;\/p&gt;\n&lt;p&gt;United Nations World Tourism Organization (2019). &lt;a href=\&quot;https:\/\/unstats.un.org\/unsd\/statcom\/50th-session\/documents\/BG-Item3l-TSA-SEEA-Technical-Note-E.pdf\&quot;&gt;Linking the TSA and the SEAA: A technical note&lt;\/a&gt;. Retrieved from https:\/\/unstats.un.org.&lt;\/p&gt;\n&lt;h2&gt;Text alternatives&lt;\/h2&gt;\n&lt;p&gt;&lt;strong&gt;&lt;a name=\&quot;fig-1\&quot;&gt;&lt;\/a&gt;Text alternative for figure 1, Approaches to measuring greenhouse gas emissions statistics&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;A flow diagram shows the two broad approaches to measuring emissions statistics. The production (supply approach) can be measured using the territory principle. The Ministry for the Environment uses the territory principle to produce the greenhouse gas inventory. Stats NZ also uses the territory principle to produce greenhouse gas emissions by industries and households. The second approach is the consumption (demand approach), which uses the residency principle and is produced by Stats NZ.&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;&lt;a name=\&quot;fig-2\&quot;&gt;&lt;\/a&gt;Text alternative for figure 2, Relationship between domestic production and consumption of emissions approaches&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;A flow diagram shows the relationship between domestic production and consumption of emissions approaches. Domestic production of emissions depends on inputs to production and imports of fuel and other substances that are burnt domestically. Emissions from domestic production then go into emissions embodied in exports or emissions consumed domestically. Domestic consumption of emissions comes from emissions consumed domestically or imports of goods with embodied emissions. Domestic consumption of emissions can be allocated to households, investment, or government.&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;&lt;a name=\&quot;fig-4\&quot;&gt;&lt;\/a&gt;Text alternative for figure 4, Flow of greenhouse gas emissions from the greenhouse gas inventory sectors to production, 2017&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;Image is of a Sankey chart, a type of flow diagram where the width of an arrow is proportional to the flow quantity. This chart shows how emissions from the greenhouse gas inventory sectors (left side of chart) align (flow) to industry emissions (right side) under the system of environmental-economic accounting (SEEA) production-based approach in 2018. The greenhouse gas inventory sectors are listed on the left: agriculture, energy, industrial processes and product use, and waste. Residence adjustments are shown below the greenhouse gas inventory sectors. Industries under SEEA approach are listed on the right: agriculture, forestry, and fishing; mining; manufacturing; electricity, gas, water, and waste services; construction; transport, postal, and warehousing; services excluding transport, postal, and warehousing.&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;&lt;a name=\&quot;fig-5\&quot;&gt;&lt;\/a&gt;Text alternative for figure 5, Flow of greenhouse gas emissions from production to consumption, 2017&lt;\/strong&gt;&lt;\/

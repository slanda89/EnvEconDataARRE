lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MPI&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1990 to 2050&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;New Zealand\u2019s Greenhouse Gas Inventory&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;annual&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MfE&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1990 to latest benchmark year&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Total NZ Livestock slaughtering numbers, kill by animal type&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;quarterly&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MPI &lt;em&gt;(available via StatsNZ infoshare)&lt;\/em&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1981 Q4 to present&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;QGDP livestock models&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;quarterly&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1985 to present&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td rowspan=\&quot;3\&quot; width=\&quot;133\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Nitrous oxide (N&lt;sub&gt;2&lt;\/sub&gt;O) \u2013 manure &amp;nbsp;management and soils&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Agricultural emissions annual inventory projections for MfE&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;annual&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MPI&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1990 to 2050&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Nitrous oxide research series (for selected livestock categories)&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;monthly&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MPI&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;2019 (updated intermittently)&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;New Zealand\u2019s Greenhouse Gas Inventory&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;annual&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MfE&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1990 to latest benchmark year&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td rowspan=\&quot;3\&quot; width=\&quot;133\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Carbon dioxide (CO&lt;sub&gt;2&lt;\/sub&gt;) \u2013 soil applications&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Agricultural emissions inventory projections for MfE&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;annual&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MPI&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1990 to 2050&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;New Zealand\u2019s Greenhouse Gas Inventory&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;annual&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MfE&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;1990 to latest benchmark year&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Research and expert advice&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; ongoing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; various&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;5\&quot; width=\&quot;643\&quot;&gt;\n&lt;p&gt;Note: Not all indicator series\/models used are publicly available. As new research becomes available, indicators will be updated and\/or added. MPI \u2013 Ministry of Primary Industries. MfE \u2013 Ministry for the Environment.&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Source: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Estimating a quarterly time series for agriculture&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Enteric methane and methane resulting from manure management accounted for 78 percent of agricultural emissions in 2018 and are related to the total amount of dry matter eaten by livestock. These two types of methane emissions are estimated together using a model that extends the logic presented in MPI\u2019s detailed methodology document (MPI, 2020). The method is based on livestock numbers by livestock type and class, and their implied emissions factors as found in New Zealand\u2019s Greenhouse Gas Inventory tables (MfE, 2020). Given that the emissions factors are largely stable, animal numbers are the main driver and therefore have been used as an indicator of methane emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;To break annual methane estimates into quarters, a monthly methane series for key livestock types was used as a guide. A quarterly series was directly calculated for each methane source (enteric fermentation and manure management) and benchmarked to annual Greenhouse Gas Inventory estimates. Quarterly estimates were then proportionately allocated across industries based on the latest available industry greenhouse gas account. All agricultural sector methane emissions were directly estimated in this way.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Nitrous oxide emissions resulting from manure management and agricultural soils depends on the total amount of nitrogen going through a farm via feed and fertiliser. Total annual nitrous oxide emissions from manure management and agricultural soils are estimated within the Greenhouse Gas Inventory and projected out by MPI. A monthly research series provided monthly proportional splits for selected livestock categories. Using these monthly proportions and annual projections, we estimated quarterly nitrous oxide emissions for key livestock types. Residual nitrous oxide emissions (for non-key livestock types) were interpolated within the system and added to agricultural emissions. Total quarterly nitrous oxide emissions from agriculture were benchmarked to annual Greenhouse Gas Inventory estimates and projections. The quarterly estimates were then proportionately allocated across industries based on the latest available annual industry greenhouse gas account.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Carbon dioxide from soil applications (urea and lime) quarterly estimates are reliant on several factors. The timing of urea and lime applications on New Zealand farms depends on farm type, climate, soil condition, livestock birthing seasons, and location. No single quarterly indicator could be found for these emissions sources. Using research and expert opinion, quarterly series for carbon dioxide emissions from urea and from lime were separately calculated and benchmarked to annual Greenhouse Gas Inventory estimates. Because not all farm types apply urea and\/or lime, the quarterly emissions estimates were further assigned to particular industries using the latest published annual greenhouse gas account as a guide. Directly estimated carbon dioxide accounted for 3 percent of all agricultural sector emissions.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;Waste&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;Waste is the smallest of the sectors. Methane is the dominant gas emitted from waste sources.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Landfill emissions from the waste sector are unlike other gross emissions sources, as they reflect emissions resulting from past, as well as present, waste disposal. Landfill emissions in the inventory are estimated using first order decay methods, so that emissions each year are dependent on the total amount of accumulated waste, including that disposed in the current period. For example, large and sudden changes in waste to landfill will have a less-than-proportionate impact on emissions now but will have their effect spread over time. Another effect of this is that there may not be any significant seasonal pattern related to waste emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Given the nature of waste sector emissions and lack of any relevant quarterly indicators for non-landfill emissions, waste sector emissions are interpolated between benchmark years and forecasted for quarters in post-benchmark years. Statistics Sweden (2016) also noted the difficulty in estimating waste sector emissions and used forecasting techniques for post-benchmark years.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;As waste accounts for a small fraction of emissions for the agriculture industry, the use of interpolation and forecasting is not expected to lead to any material impact on agriculture emissions. However, there is likely to be a greater impact on the estimate for electricity, gas, water, and waste services where waste sector emissions are more significant.&lt;\/span&gt;&amp;nbsp;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Industry and household compilation&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;Quarterly estimates were compiled using information on both industry and source category and aggregated to industry for publication. Table 5 summarises the composition of industry estimates in terms of indicator types. &lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Table 5&lt;\/strong&gt;&lt;\/p&gt;&lt;table class=\&quot;stats-bordered\&quot; width=\&quot;100\&quot;&gt;&lt;caption&gt;\n&lt;p&gt;&lt;strong&gt;Summary of estimation methods for each industry&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Industry&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Summary of estimation methods&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Agriculture, forestry, and fishing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Biogenic methane estimated using direct methods.&lt;\/p&gt;\n&lt;p&gt;Direct indicator available for majority of emissions from soils and crops.&lt;\/p&gt;\n&lt;p&gt;Direct indicators used for energy component, no indicator for farm fills.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Mining&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Approximately 60 percent based on direct indicators and approximately 40 percent based on estimation without indicators.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Manufacturing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Direct indicators used for majority of emissions from energy sources.&lt;\/p&gt;\n&lt;p&gt;Key industrial process emissions estimated using both direct and indirect indicators.&lt;\/p&gt;\n&lt;p&gt;Estimation without an indicator used for the remaining industrial process and product use emissions, and waste.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Electricity, gas, water, and waste services&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Combination of direct indicators (based on emissions) and estimation without indicators (for waste component and some energy sources).&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Construction&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Direct indicators used that are apportioned to construction.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Services excluding transport, postal, and warehousing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Combination of direct indicators applied directly from energy sources and estimation. Without indicators for industrial product use.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Transport, postal, and warehousing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Utilises several indicators and accounts for main transport modes independently, and residency adjustments based on direct indicators. Minor use of estimation without indicators.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;189\&quot;&gt;\n&lt;p&gt;Households&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;454\&quot;&gt;\n&lt;p&gt;Road transport (main component of household emissions) is estimated using a direct indicator.&lt;\/p&gt;\n&lt;p&gt;Direct indicators also used for other energy sources.&lt;\/p&gt;\n&lt;p&gt;No indicator available for industrial product use or waste emissions.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot; width=\&quot;643\&quot;&gt;\n&lt;p&gt;Note: For all industries, indirect indicators are used for road transport emissions.&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Source: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;&lt;a id=\&quot;seasonal-adj\&quot;&gt;&lt;\/a&gt;Seasonal adjustment \u2013 industry and household&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;Table 6 shows the industries and aggregations which showed statistically significant seasonal patterns for carbon dioxide equivalents and were therefore seasonally adjusted. For those series that did not show a seasonal pattern, the seasonally adjusted series are equal to the actual series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Table 6&lt;\/strong&gt;&lt;\/p&gt;&lt;table class=\&quot;stats-bordered\&quot; width=\&quot;100\&quot;&gt;&lt;caption&gt;\n&lt;p&gt;&lt;strong&gt;Presence of seasonality across industry and households&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Industry&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Presence of seasonality&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Peak quarter(s)&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;Primary industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;March\/December&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Agriculture, forestry, and fishing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;March\/December&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Mining&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;No&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;\u2013&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;Goods-producing industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;December\/March&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Manufacturing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;December&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Electricity, gas, water, and waste services&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;No&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;\u2013&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Construction&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;No&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;\u2013&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;Service industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;September&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Services excluding transport, postal, and warehousing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;September&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Transport, postal, and warehousing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;September\/March&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;Total industry&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;March\/December&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;Households&lt;sup&gt;(1)&lt;\/sup&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Transport&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;December&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Heating\/cooling&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;September&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&amp;nbsp; Other&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;No&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;\u2013&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;323\&quot;&gt;\n&lt;p&gt;Total (industry and households)&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;131\&quot;&gt;\n&lt;p&gt;Yes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;147\&quot;&gt;\n&lt;p&gt;March\/December&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;3\&quot; width=\&quot;601\&quot;&gt;\n&lt;p&gt;1.&amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp; Household emissions are seasonally adjusted at the component level and then aggregated.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;3\&quot; width=\&quot;601\&quot;&gt;\n&lt;p&gt;Symbol: \u2013 no peak quarters&lt;\/p&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Source: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Seasonal adjustment is also undertaken at the gas type level. The presence of seasonal patterns may change over time due to technology changes or changes in industry composition. In addition, as the time series grows the ability to accurately identify the seasonal patterns increases. This may either lead to revisions (that is, a more accurate detection of the seasonal pattern) or lead to changes in whether the series is seasonally adjusted or not.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Emissions from the electricity, gas, water, and waste services industry do not have a significant seasonal pattern. Non-seasonal variability in this industry is due to changes in the generation mix for public electricity and heat production.&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;&lt;span&gt;&lt;a id=\&quot;glossary\&quot;&gt;&lt;\/a&gt;Glossary&lt;\/span&gt;&lt;\/h2&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;ANZSIC:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; Australian and New Zealand Standard Industrial Classification.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;benchmarking:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; refers to the case where there are two sources of data for the same target variable, with different frequencies, and is concerned with correcting inconsistencies between the different estimates, for example, quarterly and annual estimates of value-added from different sources.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;common reporting format (crf): &lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt;a classification of anthropogenic greenhouse gas emissions by sources and removals by sinks. Used in the preparation of standardised emissions data tables for international inventory reporting.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;decoupling:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; common analysis that entails examining the degree of decoupling between natural inputs or residual flows and economic variables. Decoupling occurs when the growth rate of an environmental pressure is less than that of its economic driving force (for example, real GDP) over a given period.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;Denton method:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; method for benchmarking. Its aim is to achieve consistency between time series on the same target variables that are measured at different frequencies (for instance annual data with quarterly data) with a different reliability.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;emissions intensity: &lt;\/span&gt;&lt;\/strong&gt;measures the volume of emissions produced against some other relevant unit. Examples include emissions per person, or emissions per unit of economic activity\/GDP.&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;enteric fermentation:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; the digestion process of multi-stomach ruminant animals (such as cattle, sheep, goats) that produces enteric methane (CH4) emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;extrapolation:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; statistical technique aimed at inferring the unknown from the known. It attempts to predict future data by relying on historical data, such as estimating the size of a population into the future based on the current population size and past rate of growth.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;flow:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; statistical series presented as flow series\/data are accumulated during the reference period, for example, passenger car registrations, where the figure for the reference period is the sum of daily registrations.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;gross domestic product (GDP):&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; a monetary measure of the market value of all the final goods and services produced in a country during one year. GDP can be measured using either the production, income, or expenditure method. The production method, which aligns to the production approach to measuring emissions, is based on the concept of value added. This is calculated as the value of output (the value of goods and services produced) less the value of intermediate consumption (the value of goods and services used to produce that output). GDP is measured as the value added from production by industry, where GDP equals the sum of value added for all producers, plus taxes on production and imports.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;interpolation:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; use of a formula to estimate an intermediate data value.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;irregular:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; irregular component of a time series is the residual time series after the trend-cycle and the seasonal components (including calendar effects) have been removed. It corresponds to the high frequency fluctuations of the series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;kilotonnes:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; 1 kilotonne or metric kiloton (unit of mass) is equal to 1,000 metric tons. A metric tonne is exactly 1,000 kilograms (SI base unit) making a kilotonne equal to 1,000,000 kilograms.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;New Zealand\u2019s exclusive economic zone (EEZ):&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; within its exclusive economic zone, which extends 200 nautical miles from the coast, New Zealand has sovereign rights over the management of the resources of the sea, seabed and subsoil. &lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;producing unit:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; New Zealand resident unit operating within the economy and classified to an industry or household.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;production boundary:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; includes only emissions relating to New Zealand\u2019s economic residents, for example, tourists\u2019 emissions are excluded; this differs from the \u2018territorial\u2019 approach used in the inventory.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;seasonal:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; in time series, that part of the movement which is assigned to the effect of the seasons on the year, for example, seasonal variation in rainfall.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;seasonal adjustment: &lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt;a statistical technique to remove the effects of seasonal calendar influences operating on a series. Seasonal effects usually reflect the influence of the seasons themselves either directly or through production series related to them, or social conventions.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;source category:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; source of emissions. In the inventory this refers to a process or industry and generally covers a grouping of common reporting format (crf) class codes.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;statistical noise:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; random irregularity, or unexplained variability found in data.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;stock:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; stock of an asset; the level of the resource available. Can be measured in both physical and monetary units.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;System of Environmental-Economic Accounts (SEEA):&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; developed by the United Nations Statistical Division as a satellite system to the System of National Accounts (SNA), to&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;incorporate environmental concerns (costs, benefits, and assets) in the national accounts. SEEA is the international standard for measuring the links between the environment and the economy.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;System of National Accounts (SNA):&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; international accounting framework consisting of a coherent, consistent, and integrated set of macro-economic accounts, balance sheets, and tables. SNA is based on agreed concepts, definitions, classifications, and accounting rules. It provides a framework within which economic data can be compiled and presented for the purposes of economic analysis, and decision and policy making.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;&lt;span&gt;trend:&lt;\/span&gt;&lt;\/strong&gt;&lt;span&gt; steady underlying long-term movement and shorter-term movements in a series.&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;&lt;span&gt;&lt;a id=\&quot;references\&quot;&gt;&lt;\/a&gt;References&lt;\/span&gt;&lt;\/h2&gt;&lt;p&gt;&lt;span&gt;Bloem, AM, Dippelsman, RJ, &amp;amp; Maehle, NO (2001). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.imf.org\/external\/pubs\/ft\/qna\/2000\/Textbook\/index.htm\&quot;&gt;&lt;span&gt;Quarterly National Accounts Manual Concepts, Data Sources, and Compilation&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.imf.org.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;European Commission and Eurostat (2001). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/documents\/3859598\/5855193\/KS-34-00-536-EN.PDF.pdf\/411cd453-6d11-40a0-b65a-a33805327616?t=1414780409000\&quot;&gt;&lt;span&gt;Economy-wide material flow accounts and derived indicators: A methodological guide, 2000 ed&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from http:\/\/epp.eurostat.ec.europa.eu\/portal\/page\/portal\/environmental_accounts\/documents\/3.pdf.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Eurostat (2014). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/web\/products-manuals-and-guidelines\/-\/ks-gq-14-011\&quot;&gt;&lt;span&gt;Towards a harmonised methodology for statistical indicators \u2014 Part 1: Indicator typologies and terminologies&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from https:\/\/ec.europa.eu.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Eurostat (2015). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/documents\/3859598\/7077248\/KS-GQ-15-009-EN-N.pdf\/ce75a7d2-4f3a-4f04-a4b1-747a6614eeb3?t=1447948110000\&quot;&gt;&lt;span&gt;Manual for air emissions accounts&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from https:\/\/ec.europa.eu.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Eurostat (2018). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/documents\/3859598\/8939616\/KS-GQ-18-001-EN-N.pdf\&quot;&gt;&lt;span&gt;Handbook on Seasonal Adjustment&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from https:\/\/ec.europa.eu.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Intergovernmental Panel on Climate Change (IPCC) (2006). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.ipcc.ch\/report\/2006-ipcc-guidelines-for-national-greenhouse-gas-inventories\/\&quot;&gt;&lt;span&gt;IPCC Guidelines for National Greenhouse Gas Inventories&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.ipcc-nggip.iges.or.jp.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Intergovernmental Panel on Climate Change (IPCC) (2007). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.ipcc.ch\/assessment-report\/ar4\/\&quot;&gt;&lt;span&gt;Fourth Assessment Report&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.ipcc.ch.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;LaViola Jr, J (2003). &lt;\/span&gt;&lt;a href=\&quot;http:\/\/cs.brown.edu\/people\/jlaviola\/pubs\/kfvsexp_final_laviola.pdf\&quot;&gt;&lt;span&gt;Double exponential smoothing: An alternative to Kalman Filter-Based Predictive Tracking&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from http:\/\/cs.brown.edu.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Ministry of Business, Innovation and Employment (MBIE) (2021). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.mbie.govt.nz\/assets\/Energy-statistics-sources-and-methods.pdf\&quot;&gt;&lt;span&gt;Energy statistics sources and methods. Version 1.2&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.mbie.govt.nz.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Ministry for the Environment (MfE) (2020). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/environment.govt.nz\/publications\/new-zealands-greenhouse-gas-inventory-1990-2018\/\&quot;&gt;&lt;span&gt;New Zealand\u2019s Greenhouse Gas Inventory (1990\u20132018)&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.mfe.govt.nz.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Ministry for Primary Industries (MPI) (2020). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.mpi.govt.nz\/dmsdocument\/13906\/direct\&quot;&gt;&lt;span&gt;Methodology for calculation of New Zealand\u2019s agricultural greenhouse gas emissions. Version 7&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.mpi.govt.nz.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Stats NZ (2020). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.stats.govt.nz\/information-releases\/greenhouse-gas-emissions-industry-and-household-year-ended-2018\&quot;&gt;&lt;span&gt;Greenhouse gas emissions (industry and household): Year ended 2018&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.stats.govt.nz.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Stats NZ (2020a). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.stats.govt.nz\/methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions\&quot;&gt;&lt;span&gt;Approaches to measuring New Zealand\u2019s greenhouse gas emissions&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.stats.govt.nz.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Stats NZ (2020b). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.stats.govt.nz\/methods\/environmental-economic-accounts-sources-and-methods\&quot;&gt;&lt;span&gt;Environmental-economic accounts: Sources and methods (third edition)&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.stats.govt.nz.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Statistics Sweden (2016). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.scb.se\/en\/finding-statistics\/statistics-by-subject-area\/environment\/environmental-accounts-and-sustainable-development\/system-of-environmental-and-economic-accounts\/pong\/publications\/new-method-for-up-to-date-environmental-accounts--quarterly-emissions-to-air\/\&quot;&gt;&lt;span&gt;New method for up-to-date environmental accounts: - quarterly emissions to air&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.scb.se.&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Further reading&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;Department of the Environment and Energy (2019). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/www.industry.gov.au\/data-and-publications\/national-greenhouse-gas-inventory-june-2019\&quot;&gt;&lt;span&gt;Quarterly update of Australia\u2019s national Greenhouse Gas Inventory: June 2019&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.industry.gov.au.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Office for National Statistics (2019). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/assets.publishing.service.gov.uk\/government\/uploads\/system\/uploads\/attachment_data\/file\/789856\/provisional-greenhouse-gas-emissions-statistics-methodology-summary.pdf\&quot;&gt;&lt;span&gt;UK Greenhouse gas emissions: provisional estimates \u2013 Methodology summary&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from www.assets.publishing.service.gov.uk.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Statistics Netherlands (2010). &lt;\/span&gt;&lt;a href=\&quot;https:\/\/circabc.europa.eu\/sd\/a\/23965bfb-785d-47a5-b35f-02931faed7be\/09%20NL%20259%20AEA.pdf\&quot;&gt;&lt;span&gt;CO2 emissions on quarterly basis \u2013 final report&lt;\/span&gt;&lt;\/a&gt;&lt;span&gt;. Retrieved from https:\/\/circabc.europa.eu\/ui\/explore.&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;&lt;span&gt;&lt;a id=\&quot;appendix\&quot;&gt;&lt;\/a&gt;Appendix 1 \u2013 Data quality declaration for the quarterly greenhouse gas emissions estimates&lt;\/span&gt;&lt;\/h2&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions data are timelier, but there may be a loss of accuracy from using less robust data sources (for example, using indirect indicators as opposed to actual activity data) or utilising models and assumptions. There is also a loss of detail (and potentially relevance) as quarterly estimates can only be robustly estimated for seven industries and households at present.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The following summarises the quality of the quarterly emissions series in relation to the six dimensions of data quality.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Accuracy&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;While estimating quarterly emissions may result in a trade-off between accuracy and timeliness, Stats NZ prioritises the use of direct indicators and minimises imputations (except where the approach is sound), and aggregates to reduce statistical noise. Accuracy of the indicators are checked for by assessing the correlation between the indicator and benchmark series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Relevance&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The quarterly emissions estimates cover all sources of economic activity and households but are only available for seven industries at present. The series includes emissions from residents operating overseas and excludes non-residents on the territory. This residency approach differs from the territory approach used in the Greenhouse Gas Inventory but enables emissions data to be related to GDP.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Interpretability&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions estimates have the same scope as the annual estimates so can be interpreted in the same way as emissions associated with economic activity by New Zealand residents.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;However, when interpreting the seasonally adjusted series it should be noted that regular seasonal patterns have been removed and the series reflects both trend and irregular components.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Coherence and consistency&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The quarterly estimates utilise the principles, concepts, and definitions as specified in the SEEA Central Framework. Industries are defined according to ANZSIC. The estimates are calibrated to published annual industry and household greenhouse gas emissions estimates.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Consistent data sources are used across time to enable time series consistency.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Timeliness&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Estimates are available with a lag of between four and five months which reflects the availability of input data and time required for processing, quality assurance, and dissemination. &lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Accessibility&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions data is presented in the same formats and using the same terminology as the annual industry and household estimates. The use of standard industrial classifications and statistical testing for seasonal adjustment also enhances accessibility of the data.&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;Text alternative&lt;\/h2&gt;&lt;p&gt;&lt;span&gt;&lt;a id=\&quot;text-alt\&quot;&gt;&lt;\/a&gt;&lt;strong&gt;Text alternative for figure 1, How the Greenhouse Gas Inventory sectors match industry and household emissions under the SEEA production-based approach, 2018&lt;\/strong&gt;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Image is of a Sankey chart, a type of flow chart where the width of an arrow is proportional to the flow quantity. This chart shows how emissions from the Greenhouse Gas Inventory sectors (left side of chart) align (flow) to industry emissions (right side) under the system of environmental-economic accounting (SEEA) production-based approach in 2018. The Greenhouse Gas Inventory sectors are listed on the left: agriculture, energy, industrial processes and product use, and waste. Residence adjustments are shown below the Greenhouse Gas Inventory sectors. Industries under SEEA approach are listed on the right: agriculture, forestry, and fishing; mining; manufacturing; electricity, gas, water, and waste services; construction; transport, postal, and warehousing; services excluding transport, postal, and warehousing.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;ISBN 978-1-99-003297-4&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;&lt;span&gt;Enquiries&lt;\/span&gt;&lt;\/h2&gt;&lt;p&gt;&lt;span&gt;Adam Tipper&lt;br&gt;&lt;a href=\&quot;tel:+6449314944\&quot;&gt;04 9314944&lt;\/a&gt;&lt;br&gt;&lt;a href=\&quot;mailto:info@stats.govt.nz?subject=Enquiries%20%E2%80%93%20Quarterly%20greenhouse%20gas%20emissions%20(industry%20and%20household)%3A%20Sources%20and%20methods\&quot;&gt;info@stats.govt.nz&lt;\/a&gt;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&quot;}],&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;PageBlockSortOrder&quot;:{&quot;83108&quot;:3},&quot;EnableTopDivider&quot;:{&quot;83108&quot;:&quot;No&quot;},&quot;PageBlockWidths&quot;:{&quot;83108&quot;:0},&quot;PageTerms&quot;:[{&quot;ID&quot;:1899,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/air\&quot;,\&quot;Title\&quot;:\&quot;Air\&quot;}&quot;},{&quot;ID&quot;:157,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/atmosphere-and-climate\&quot;,\&quot;Title\&quot;:\&quot;Atmosphere and climate\&quot;}&quot;},{&quot;ID&quot;:1572,&quot;ClassName&quot;:&quot;Stats\\CategoryTaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:null,\&quot;Title\&quot;:null}&quot;},{&quot;ID&quot;:141,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/economy\&quot;,\&quot;Title\&quot;:\&quot;Economy\&quot;}&quot;},{&quot;ID&quot;:130,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/environment\&quot;,\&quot;Title\&quot;:\&quot;Environment\&quot;}&quot;}],&quot;PagesRelated&quot;:[],&quot;Category&quot;:{&quot;ID&quot;:1572,&quot;DisplayName&quot;:&quot;Methods&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;methods\&quot;,\&quot;Title\&quot;:\&quot;Methods\&quot;}&quot;,&quot;FilterName&quot;:null},&quot;TermsReleases&quot;:[],&quot;TermsTopics&quot;:[{&quot;ID&quot;:1899,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Air&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/air\&quot;,\&quot;Title\&quot;:\&quot;Air\&quot;}&quot;,&quot;FilterName&quot;:null},{&quot;ID&quot;:157,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Atmosphere and climate&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/atmosphere-and-climate\&quot;,\&quot;Title\&quot;:\&quot;Atmosphere and climate\&quot;}&quot;,&quot;FilterName&quot;:null},{&quot;ID&quot;:141,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Economy&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/economy\&quot;,\&quot;Title\&quot;:\&quot;Economy\&quot;}&quot;,&quot;FilterName&quot;:null},{&quot;ID&quot;:130,&quot;ClassName&quot;:&quot;TaxonomyTerm&quot;,&quot;DisplayName&quot;:&quot;Environment&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;topics\\\/environment\&quot;,\&quot;Title\&quot;:\&quot;Environment\&quot;}&quot;,&quot;FilterName&quot;:null}]}"></div>

  <div id="footerLinks" data-value="{&quot;MenuGroups&quot;:[{&quot;ID&quot;:1,&quot;Title&quot;:&quot;Statistics by topic&quot;,&quot;Items&quot;:[{&quot;ID&quot;:1,&quot;Title&quot;:&quot;Population&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/topics\/population&quot;},{&quot;ID&quot;:2,&quot;Title&quot;:&quot;Business&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/topics\/business&quot;},{&quot;ID&quot;:3,&quot;Title&quot;:&quot;Labour market&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/topics\/labour-market&quot;},{&quot;ID&quot;:4,&quot;Title&quot;:&quot;Society&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/topics\/society&quot;},{&quot;ID&quot;:5,&quot;Title&quot;:&quot;Economy&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/topics\/economy&quot;},{&quot;ID&quot;:6,&quot;Title&quot;:&quot;Environment&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/topics\/environment&quot;}]},{&quot;ID&quot;:2,&quot;Title&quot;:&quot;Data tools&quot;,&quot;Items&quot;:[{&quot;ID&quot;:7,&quot;Title&quot;:&quot;Aotearoa Data Explorer&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/tools\/aotearoa-data-explorer\/&quot;},{&quot;ID&quot;:8,&quot;Title&quot;:&quot;Infoshare&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;http:\/\/infoshare.stats.govt.nz\/&quot;},{&quot;ID&quot;:11,&quot;Title&quot;:&quot;Geographic data service&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;https:\/\/www.stats.govt.nz\/tools\/geographic-data-service&quot;},{&quot;ID&quot;:24,&quot;Title&quot;:&quot;Place and ethnic group summaries&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;https:\/\/www.stats.govt.nz\/summaries\/&quot;}]},{&quot;ID&quot;:3,&quot;Title&quot;:&quot;Corporate&quot;,&quot;Items&quot;:[{&quot;ID&quot;:12,&quot;Title&quot;:&quot;About us&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/about-us\/&quot;},{&quot;ID&quot;:14,&quot;Title&quot;:&quot;Contact us&quot;,&quot;Target&quot;:0,&quot;Link&quot;:&quot;\/contact-us&quot;},{&quot;ID&q     <div id="pageViewData" data-value="{&quot;DateTaxonomyTerm&quot;:[],&quot;ID&quot;:&quot;74486&quot;,&quot;Title&quot;:&quot;Quarterly greenhouse gas emissions  (industry and household):  Sources and methods&quot;,&quot;ClassName&quot;:&quot;BlockPage&quot;,&quot;BackgroundColor&quot;:&quot;white&quot;,&quot;FeaturedMedia&quot;:[],&quot;FeaturedText&quot;:&quot;&lt;p&gt;Introduces the methodology and indicators used to produce New Zealand\u2019s quarterly greenhouse gas production-based emissions estimates, within the System of Environmental-Economic Accounting (SEEA) framework.&amp;nbsp;&lt;\/p&gt;&quot;,&quot;IsPublishing&quot;:false,&quot;MediaPosition&quot;:&quot;&quot;,&quot;PageLayout&quot;:&quot;info&quot;,&quot;PageLink&quot;:&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/&quot;,&quot;PageDate&quot;:&quot;2022-07-01 10:45:00&quot;,&quot;TagPosition&quot;:&quot;bottom&quot;,&quot;MetaDescription&quot;:&quot;Read about the methodology and indicators used to produce New Zealand\u2019s quarterly greenhouse gas production-based emissions estimates, within the System of Environmental-Economic Accounting (SEEA) framework. &quot;,&quot;PageBreadcrumbs&quot;:[{&quot;Title&quot;:&quot;Home&quot;,&quot;MenuTitle&quot;:&quot;Home&quot;,&quot;Link&quot;:&quot;\/&quot;},{&quot;Title&quot;:&quot;Methods&quot;,&quot;MenuTitle&quot;:&quot;Methods&quot;,&quot;Link&quot;:&quot;\/methods\/&quot;},{&quot;Title&quot;:&quot;Quarterly greenhouse gas emissions  (industry and household):  Sources and methods&quot;,&quot;MenuTitle&quot;:&quot;Quarterly greenhouse gas emissions  (industry and household):  Sources and methods&quot;,&quot;Link&quot;:&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/&quot;}],&quot;SiteBanner&quot;:{&quot;ID&quot;:47,&quot;Title&quot;:&quot;www3.stats.govt.nz planned maintenance&quot;,&quot;BannerHeading&quot;:&quot;Planned maintenance: Monday 9 March from 5pm - 6pm &quot;,&quot;BannerType&quot;:&quot;interesting-information&quot;,&quot;Description&quot;:&quot;&lt;p&gt;During this time, the small number of files and applications that are hosted on www3.stats.govt.nz may be temporarily unavailable. The Stats NZ website will remain accessible throughout this time.&lt;\/p&gt;&quot;,&quot;ActionText&quot;:&quot;Find out more&quot;,&quot;Action&quot;:null,&quot;ActionTarget&quot;:&quot;&quot;,&quot;AllPages&quot;:1,&quot;Expires&quot;:&quot;2026-03-09 17:48:00&quot;,&quot;LastEdited&quot;:&quot;2026-03-09 17:45:40&quot;},&quot;PageBlocks&quot;:[{&quot;ID&quot;:&quot;83108&quot;,&quot;Title&quot;:&quot;Quarterly greenhouse gas emissions (industry and household): Sources and methods \u2013 1&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;span class=\&quot;intro\&quot;&gt;&lt;em&gt;Quarterly greenhouse gas emissions (industry and household): Sources and methods&lt;\/em&gt; introduces the methodology and indicators used to produce New Zealand\u2019s quarterly greenhouse gas production-based emissions estimates, within the System of Environmental-Economic Accounting (SEEA) framework.&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;Contents&lt;\/h2&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#about\&quot;&gt;About the quarterly greenhouse gas emissions estimates&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#scope\&quot;&gt;Scope of quarterly greenhouse gas emissions&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#sources\&quot;&gt;Sources and methods&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#glossary\&quot;&gt;Glossary&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#references\&quot;&gt;References&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#appendix\&quot;&gt;Appendix 1&lt;\/a&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;h2&gt;&lt;span&gt;&lt;a id=\&quot;about\&quot;&gt;&lt;\/a&gt;About the quarterly greenhouse gas emissions estimates&lt;\/span&gt;&lt;\/h2&gt;&lt;p&gt;&lt;span&gt;In 2021, Stats NZ developed new experimental quarterly estimates of greenhouse gas (GHG) emissions, to provide more timely data on New Zealand\u2019s production-based emissions. This was done within the System of Environmental-Economic Accounting (SEEA) framework to track emissions in relation to economic activity.&lt;\/span&gt;&amp;nbsp;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;This report presents the methodology for constructing quarterly emissions estimates, introducing readers to aspects of statistical methodology usually seen in sub-annual macroeconomic statistics. &lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions data provides more timely information on New Zealand\u2019s greenhouse gas profile. Measuring GHG emissions on a quarterly basis, using an industry classification consistent with those used in producing gross domestic product (GDP), allows us to quickly identify what emissions path the economy is on, and whether emissions are decoupling from economic growth. Quarterly information also allows turning points to be identified with greater accuracy, which may be useful for decision-makers.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Initially released as an experimental series in 2021, the quarterly GHG emissions (industry and household) estimates were further developed, internationally peer reviewed, and improved over the course of a year, to become an official statistical series in July 2022.&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;SEEA suite of emissions statistics&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;The quarterly emissions statistics are part of the suite of SEEA emissions statistics produced by Stats NZ. The current suite includes (on an annual basis):&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;national estimates from production and consumption perspectives &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;regional production emissions&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;tourism emissions (both production and consumption).&lt;\/span&gt;&amp;nbsp;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;All SEEA emissions statistics have the same underlying measurement framework and are based on concepts and classifications consistent with economic statistics, allowing for joint presentation. The value of joint presentations (that is, displaying emissions data alongside economic data) is it allows for analysis of emissions intensity and decoupling indicators. &lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;&lt;span&gt;&lt;a id=\&quot;scope\&quot;&gt;&lt;\/a&gt;Scope of quarterly greenhouse gas emissions&lt;\/span&gt;&lt;\/h2&gt;&lt;p&gt;&lt;span&gt;In order to track emissions with gross domestic product (GDP), the same principles, concepts, and classifications as the annual &lt;a href=\&quot;https:\/\/www.stats.govt.nz\/methods\/environmental-economic-accounts-sources-and-methods\&quot;&gt;SEEA greenhouse gas emissions by industry and household&lt;\/a&gt; are applied. This defines the scope of the quarterly emissions series in terms of its perspective, coverage of emissions and population, and its compilation and presentation.&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Gross emissions&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;The annual greenhouse gas emissions by industry and household account records the gross emissions of greenhouse gases relating to the energy, industrial processes and product use (IPPU), agriculture, and waste sectors, but excludes the land use, land use change, and forestry (LULUCF) sector. The exclusion of LULUCF follows Eurostat (2015) guidance. More detail on how LULUCF is accounted for in different measurement frameworks is presented in Stats NZ (2020a). This focus on gross emissions allows for a better comparison between economic statistics and emissions.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Residency principle&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;The production boundary of quarterly emissions on a SEEA basis is that of economic residents (residency principle). This contrasts with the GHG Inventory and the Ministry of Business, Innovation and Employment\u2019s (MBIE) &lt;a href=\&quot;https:\/\/www.mbie.govt.nz\/building-and-energy\/energy-and-natural-resources\/energy-statistics-and-modelling\/energy-publications-and-technical-papers\/new-zealand-energy-quarterly\/\&quot;&gt;New Zealand energy quarterly&lt;\/a&gt;, which measures emissions on a territorial basis, or all the emissions that occur within New Zealand\u2019s exclusive economic zone (EEZ). The residency principle means that all emissions from New Zealand\u2019s residents are recorded, regardless of where the emission occurs. More discussion on the residency principle can be found in Stats NZ (2020a).&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The application of the residency principle means that emissions by economic residents abroad are included, while emissions from non-residents within New Zealand\u2019s territory are excluded. This is to enable comparisons with other economic statistics, such as GDP. This leads to an observable difference with the Inventory \u2014 with the SEEA annual production estimate being higher in total. The magnitude of this difference varies from year to year. For example, in 2007, the first year of the time series, the difference between the Inventory and the SEEA estimate was 3.6 percent. In 2020, this difference fell to 1.6 percent as emissions from economic residents abroad decreased due to COVID-19 border restrictions.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Industry classification&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;The use of an industry classification enables the aggregation of multiple emissions processes to a given economic unit in the population. For consistency with economic statistics, units for estimating emissions by industry are allocated using a standard industrial classification. For New Zealand, this is the &lt;a href=\&quot;http:\/\/aria.stats.govt.nz\/aria\/#ClassificationView:uri=http:\/\/stats.govt.nz\/cms\/ClassificationVersion\/CARS5587\&quot;&gt;Australian and New Zealand Standard Industrial Classification 2006 (ANZSIC06).&lt;\/a&gt; The ANZSIC06 classification groups producing units according to the predominant economic activity of the operator and assumes all units within an industry convert inputs to outputs in the same way.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The industry classification (which groups similar producing units) differs from the process classification used in the Greenhouse Gas Inventory and facilitates the integration of emissions data with other economic statistics. The industry approach aligns the physical processes that create emissions with the economic value created, as captured in GDP. For example, agricultural outputs utilise energy and agricultural processes to produce primary goods, the output of the agricultural industries. This relationship between processes and production can be seen in the Sankey chart below (figure 1) and is discussed further in &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#benchmarking\&quot;&gt;Benchmarking, interpolation, and extrapolation&lt;\/a&gt; on indicator types.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Figure 1&lt;\/strong&gt;&lt;\/p&gt;&lt;p&gt;&lt;img width=\&quot;2141\&quot; height=\&quot;1489\&quot; alt=\&quot;Sankey chart showing how emissions from the greenhouse gas inventory sectors align with industry emissions under the SEEA in 2018. See link to text alternative under image.t\&quot; src=\&quot;\/assets\/Methods\/Quarterly-greenhouse-gas-emissions-industry-and-household-Sources-and-methods\/Download-data\/sankey-chart-how-greenhouse-gas-inventory-sectors-match-industry-and-hh.PNG\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Link to text alternative for&amp;nbsp;&lt;\/span&gt;&lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#text-alt\&quot;&gt;&lt;span&gt;Text alternative for figure 1, How the Greenhouse Gas Inventory sectors match industry and household emissions under the SEEA production-based approach, 2018.&lt;\/span&gt;&lt;\/a&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Industry breakdown&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;As quarterly emissions are estimated using indicators (see &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#estimation\&quot;&gt;Estimation of quarterly emissions&lt;\/a&gt;), the level of industry detail will be much lower than the annual production emissions estimates, which are available for 116 industries. At this point in its development, quarterly greenhouse gas emissions (industry and households) are available for seven industry groups, which are aggregations of industries based on the ANZSIC06 classification.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The seven industry groups are:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;agriculture &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;mining &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;manufacturing&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;electricity, gas, water, and waste services &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;construction&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;transport, postal, and warehousing services &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;services excluding transport, postal, and warehousing. &lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;As with the annual production emissions estimates, there are also estimates for households\u2019 direct emissions. Further disaggregation will depend on available data sources, the methodology used to allocate to industries and, if undertaken, will begin with the highest-emitting industries.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Gas coverage&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;The scope of these estimates are all greenhouse gases as covered in the GHG Inventory and the SEEA annual estimates.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Greenhouse gases currently included are:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;carbon dioxide &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;methane &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;nitrous oxide&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;sulphur &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;hexafluoride &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;perfluorocarbons&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;hydrofluorocarbons.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;This initial development of quarterly emissions has focused on estimating total carbon dioxide equivalents (CO&lt;sub&gt;2&lt;\/sub&gt;-e) to derive a whole-of-economy estimate. All gases are converted into CO&lt;sub&gt;2&lt;\/sub&gt;-e using the global warming potentials from the Fourth Assessment Report (IPCC, 2007) based on a 100-year time frame.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Actual and seasonally adjusted estimates&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions by industry and household have been produced on an actual and seasonally adjusted basis.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Actual emissions refer to estimates that indicate the actual amount of emissions that occurred within a period, in this case a quarter. The data is useful for associating emissions with the economic activity that occurred over the same period.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Seasonally adjusted estimates remove the seasonal aspect of emissions, leaving the trend and irregular aspects of emissions. This makes any quarter-to-quarter comparisons more meaningful and removes the regular seasonal pattern from any assessment of decoupling.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Time series&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;The quarterly emissions series begins from the March 2014 quarter. Estimates are only available from 2014 onwards due to the availability of data sources for complete coverage.&lt;\/span&gt;&lt;\/p&gt;&lt;h2&gt;&lt;span&gt;&lt;a id=\&quot;sources\&quot;&gt;&lt;\/a&gt;Sources and methods&lt;\/span&gt;&lt;\/h2&gt;&lt;h3&gt;&lt;span&gt;Approach to compiling quarterly emissions estimates&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;Producing comprehensive and timely estimates of quarterly emissions can be challenging, given emissions data is compiled annually and often without recording quarterly movements. For this reason, indicators and statistical methods are used to best represent quarterly estimates of emissions in a similar process to that used to compile quarterly GDP, rather than through new data collection (for example, a survey). This section describes these methods and indicator selection in detail.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Most of the general principles outlined in &lt;em&gt;Quarterly national accounts manual: Concepts, data sources, and compilation&lt;\/em&gt; (Bloem, Dippelsman, &amp;amp; Maehle, 2001) apply equally to economic accounts and emissions estimates, and underpin the methodology discussed in this section. The following concepts and principles from the above manual have been applied in estimating quarterly greenhouse gas emissions (QGHG):&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;quarterly accounts should be made consistent with their annual equivalents, partly for the convenience of users and partly, and more fundamentally, because the benchmarking process incorporates the information content of the annual data into the quarterly estimates&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;quarterly accounts should be built on a foundation of timely and accurate quarterly source data that directly cover a high proportion of the totals&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;quarterly accounts data should be presented as a consistent time series&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;seasonally adjusted data, trend data, and unadjusted data all provide useful perspectives, but the unadjusted data should be the foundation&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;revisions are needed to allow timely release of data and to allow incorporation of new data \u2013 possible inconvenience of revisions can best be dealt with by openness about the process.&lt;\/span&gt;&amp;nbsp;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Annual estimates of greenhouse gas emissions (industry and households) are compiled using an inventory-first approach (Eurostat, 2015). This involves converting and aligning estimates of emissions from the processes recorded in the inventory into estimates by industry and households (the relationship between processes and production is discussed in Stats NZ (2020b). These annual estimates are used as a base, with indicators and other techniques used to create quarterly estimates.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Compiling QGHG estimates by accounting for processes by industry recognises that an industry\u2019s emissions profile can consist of multiple processes. This is important because not all processes will always change uniformly with economic activity, as practices and technologies change. This provides an emissions estimate that is independent of GDP, which allows for meaningful comparisons.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;&lt;a id=\&quot;estimation\&quot;&gt;&lt;\/a&gt;Estimation of quarterly emissions&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;There are three major transformation processes when converting annual industry and household emissions estimates into quarterly seasonally adjusted SEEA-based emissions estimates:&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;ol&gt;\n&lt;li&gt;&lt;span&gt;benchmarking indicators to annual estimates, interpolating, and extrapolating &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;converting process-based estimates into industry estimates (allocating to industry) &lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;seasonally adjusting the industry estimates. &lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ol&gt;&lt;h4&gt;&lt;span&gt;&lt;a id=\&quot;benchmarking\&quot;&gt;&lt;\/a&gt;Benchmarking, interpolation, and extrapolation&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;The benchmarking, interpolation, and extrapolation processes involves two important steps:&lt;\/span&gt;&lt;\/p&gt;&lt;ol&gt;\n&lt;li&gt;&lt;span&gt;choice of quarterly indicators&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;benchmarking the quarterly indicator series to annual emissions estimates.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ol&gt;&lt;p&gt;&lt;span&gt;The choice of indicator will depend on the nature of the emission process and the availability of data, whereas the benchmarking process involves statistical methods as developed for quarterly GDP. The different factors and types of indicators are discussed in the sections below, as is the process of benchmarking.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Types of indicators&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Indicators generally represent a simplification of a more complex phenomenon, by focusing on a dominant factor. For the purposes of explaining the nature of the indicators used for quarterly emissions, it is useful to differentiate between direct and indirect indicators (Eurostat, 2014). A direct indicator attempts to measure the actual phenomenon, whereas an indirect indicator uses a related phenomenon as a proxy.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The purpose of indicators is to provide a representation of movements in emissions over a quarter. As such, indicators do not need to be expressed in emissions units. The use of benchmarking (discussed in &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#quarterly\&quot;&gt;Quarterly breakdown of annual benchmarks&lt;\/a&gt;) implicitly converts movements in an indicator series into emissions units. The benchmarks capture the emissions factor (emissions per unit of activity) and level of activity in a given year, and the indicators provide the information on movements in the activity data within the year. Changes in emissions factors are therefore captured when the benchmarks are updated.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The choice of indicator type has implications for the quality of the quarterly series (see &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#substances\&quot;&gt;Substances, processes, and production&lt;\/a&gt;). In selecting the type of indicator, the conceptual accuracy of the indicator will need to take into consideration the nature of the emitting process (see &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#stocks\&quot;&gt;Stocks and flows&lt;\/a&gt;). Conceptual accuracy refers to the conceptual alignment between the indicator series and the emissions source.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;&lt;a id=\&quot;substances\&quot;&gt;&lt;\/a&gt;Substances, processes, and production&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;To help understand emissions, it is helpful to know the distinction between substances used, the processes that utilise the substances, and the production by economic units who control the emitting processes, to meet economic needs. In this context, substances can refer to the material (for example, petrol) that is utilised in a process. A process refers to the use\/transformation of the substance (for example, an internal combustion engine), and production may refer to economic activity, such as agricultural production, where multiple processes (biological, internal combustion, waste) are combined to produce an output (for example, milk). Understanding this distinction along with the nature of the emitting process (stock or flow based) can help inform how well an indicator will capture this phenomenon.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;&lt;a id=\&quot;stocks\&quot;&gt;&lt;\/a&gt;Stocks and flows&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Emissions processes generally result from the transformation of energy and matter. While all emissions are recorded as flows, the underlying process by which they are generated will have both stock and flow attributes. Identifying whether the emission is primarily driven by the stock or flow dimension ultimately informs the choice and adequacy of the quarterly indicator selected. Some emissions result from material and energy throughput (for example, energy use), whereas others can result from gradual breakdown of a stock of material over time (for example, waste) or depend primarily on the amount of stock used in production (for example, livestock).&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Direct indicators have higher conceptual accuracy, as the indicator can capture the dominant attribute in the emission process and therefore reflect actual emissions. Indirect indicators are likely to have a weaker conceptual alignment with the emissions process and therefore, under certain conditions, may deviate from actual emissions, despite having a strong statistical relationship. The level of alignment, and any weaknesses, are important for understanding the performance of the indicator.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Direct indicators&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Direct indicators are indicators that relate directly to the substance or process that is central to the emission. The indicator may be the use of a substance, such as coal, which has a known conversion rate into greenhouse gases. An indicator based on the process may capture a dimension of a process which transforms energy and matter, creating emissions, such as the number of animals by type and class, which on average will produce a certain amount of methane as a function of their metabolism.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Indicators based on either substances or processes are consistent with the principles of material flow accounting (European Commission and Eurostat, 2001), and are therefore considered to be more accurate and more likely to capture turning points.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Indirect indicators&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Indirect indicators (often termed proxy indicators) are used where data for direct measures are not available. Generally, indirect indicators will have a strong positive correlation with the phenomena they are attempting to capture but can also have a conceptual relationship based on an understanding of the nature of the activity or production processes. Indirect indicators can include the use of related substances, measures of economic activity (adjusted for inflation), population numbers, and upstream or downstream activity. The use of indirect indicators assumes that the relationship between the indicator and the emissions remains stable, and therefore is at risk of missing turning points when the relationship breaks down. The relationship may break down due to reasons such as changes in technology, changes of inputs to production, or changes in behaviour.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;For this reason, monitoring industry developments will be extremely important where proxies are used.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Estimation in the absence of indicators&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;To ensure complete coverage of industries and emissions sources, quarterly estimates are required when no indicator is available. This is similar to imputations, which are often used in official statistics in order to derive complete coverage. For emissions, quarterly estimates can be made in the absence of indicators using interpolation for benchmark years or forecasting for later quarters.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;This approach may be used in the following cases:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;there may be no known quarterly indicator that adequately represents the process conceptually&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;a quarterly indicator may be available but may not relate closely to annual benchmarks (see discussion on benchmark-to-indicator ratio in &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#benchmark-timeseries\&quot;&gt;Benchmarking time-series estimates&lt;\/a&gt; section)&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;the emissions source does not exhibit a seasonal pattern, in which case an interpolated series may approximate an actual and seasonally adjusted series&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;the benchmark series exhibits a stable trend and is not prone to economic shocks&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;the emissions process accounts for an insignificant proportion of an industry\u2019s total emissions (although care is required to ensure interpolation of multiple emissions sources does not account for a significant share of emissions).&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Estimation without indicators is used to provide complete coverage, but the contribution of this technique to the compilation process is expected to decline over time as further indicators are sought. However, this technique will continue to be used if it satisfies any of the exceptions listed above.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;&lt;a id=\&quot;benchmark-timeseries\&quot;&gt;&lt;\/a&gt;Benchmarking time-series estimates&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;The application of indicators, or estimation without an indicator, depends on whether the quarter being estimated is covered by the latest annual estimate (benchmark) or after it.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;&lt;a id=\&quot;quarterly\&quot;&gt;&lt;\/a&gt;Quarterly breakdown of annual benchmarks&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Where annual benchmarks exist, the primary purpose of the quarterly estimates is to breakdown annual estimates into quarters, to show the seasonal patterns and irregularities which exist. The annual benchmarks, which retain both an industry and process dimension, are sourced from data underlying the SEEA greenhouse gas emissions (industry and households) series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;For emissions estimated either with or without an indicator, the benchmarking process ensures that the sum of the quarters equals the annual estimates while retaining, to the greatest extent possible, the quarter-on-quarter movement suggested by the indicator.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;When an indicator is available, the proportional Denton method (a technique designed for macroeconomic statistics) is used. In this process, an estimate of the benchmark-to-indicator ratio is obtained, which provides an indication of the quality of the indicator. This ratio should ideally be stable over time as this would show a strong correlation between the annual benchmark and indicator series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;When an indicator is not available, quarterly estimates are formed by interpolating between benchmarks. For series exhibiting a relatively constant trend, the interpolation process will result in a primarily linear quarterly series. If the series does not show a constant trend, or fluctuates, the interpolation process results in smoothed but non-linear quarterly movements reflecting the changing nature of the benchmark data over time.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Extending beyond the annual benchmarks&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Estimates for quarters beyond the last available annual benchmark are obtained by using the movement on a quarter-on-quarter basis in the indicator, to extend the time series from the last benchmarked quarter (a process known as extrapolation). Extending the annual series into more recent quarter\u2019s results in improved timeliness of data. However, estimates for these quarters require additional analysis given the potential for loss of accuracy.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Provided the benchmark-to-indicator ratio is stable over time and has a strong conceptual relationship with the emissions process (capturing seasonal patterns, irregularities, and turning points), then the indicator will provide a robust estimate for the quarters beyond the last annual benchmarked year. However, as the benchmark-to-indicator ratio is based on historical data points, there is no guarantee that the indicator will perform well during times of significant change, such as during COVID-19, or following rapid technological change. The ability to integrate and compare emissions with economic data, under the SEEA, is advantageous in this case as a means of assessing whether the estimated quarters are to be expected. The incorporation of new benchmark values as they become available, may lead to revisions to previous quarters estimates across the time series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Where quarterly estimates are obtained by interpolation without an indicator, estimates for quarters after the last available benchmark are forecasted using exponential smoothing models. Exponential smoothing functions are used to smooth time series using exponentially decreasing weights over time, as opposed to moving averages which assigns weights equally. Estimates obtained from this approach weigh newer observations higher than older ones and account for the variability in the trend. See LaViola Jr (2003) for further detail.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;As with indicators, the use of forecasting will lead to revisions when future benchmarks are incorporated. The extent of the revision will depend on the deviation of the next benchmark value and the historical trend. For this reason, exponential smoothing functions are not robust to sudden economic shocks that may lead to sudden changes in emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;Converting process-based estimates into industry estimates&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;The Greenhouse Gas Inventory classifies emissions by process, and groups them by common reporting format (crf) class codes for United Nations Framework Convention on Climate Change (UNFCCC) reporting. For the annual benchmarks, industries are defined according to ANZSIC06 and compiled at the &lt;a href=\&quot;http:\/\/aria.stats.govt.nz\/aria\/#ClassificationView:uri=http:\/\/stats.govt.nz\/cms\/ClassificationVersion\/CARS5851\&quot;&gt;New Zealand Standard Industrial Output Classification (NZSIOC)&lt;\/a&gt; level.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Emissions are allocated to industry in two ways:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;one-to-one matches when the crf class aligns solely to an industry&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;one-to-many matches when the crf class is attributable to multiple industries and additional data or methods are used to split across industries.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Most crf classes can be allocated directly to an industry (that is, a one-to-one match) due to the level of detail in the GHG Inventory. To allocate a crf class to an industry, an assessment is made on which producers (firms) are engaged in the process-based emissions and where those firms were allocated to in the industry classification system. Additional information is used if crf classes need to be allocated to a finer industry level. Where a one-to-many approach is used, detailed economic information is often used. More information on the estimation of the annual greenhouse gas emissions (industry and households) approach can be found in &lt;a href=\&quot;https:\/\/www.stats.govt.nz\/methods\/environmental-economic-accounts-sources-and-methods\&quot;&gt;Environmental-economic accounts: Sources and methods (third edition)&lt;\/a&gt; (Stats NZ, 2020b).&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Due to costs and feasibility the same level of detail cannot be collected on a quarterly basis. However, these same two approaches are utilised, just at a more aggregated level. The choice of which one is used is dependent on the level of detail of the available quarterly indicators. As with the annual series, estimates are more robust where allocations can be made on a one-to-one basis, as one-to-many matches require additional information to allocate across industries.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Quality of industry emissions estimates&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;When these different allocation approaches are considered alongside the different indicator types, it is possible to construct a classification of approaches that give some insight into the quality of the resulting industry estimates. While there are many indicators used to estimate quarterly emissions, table 1 summarises and gives examples of the different combinations, and their significance in the quarterly emissions series. The extent to which these are used varies across sources and industries, as discussed in application of methods.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Table 1&lt;\/strong&gt;&lt;\/p&gt;&lt;table class=\&quot;stats-bordered\&quot; width=\&quot;100\&quot;&gt;&lt;caption&gt;&lt;strong&gt;Summary of techniques used to estimate quarterly industry emissions, 2018&lt;\/strong&gt;&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;218\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;&amp;nbsp;&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Technique&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;180\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Percent of emissions accounted for in 2018&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;236\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Example of where the technique was applied&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;218\&quot;&gt;\n&lt;p&gt;Direct indicator, applied directly to an industry&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;180\&quot;&gt;\n&lt;p&gt;52.7&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;236\&quot;&gt;\n&lt;p&gt;Jet kerosene emissions applied to the air transport industry&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;218\&quot;&gt;\n&lt;p&gt;Direct indicator, apportioned across industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;180\&quot;&gt;\n&lt;p&gt;8&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;236\&quot;&gt;\n&lt;p&gt;Coal use apportioned across mining and manufacturing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;218\&quot;&gt;\n&lt;p&gt;Indirect indicator, applied directly to an industry&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;180\&quot;&gt;\n&lt;p&gt;4.1&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;236\&quot;&gt;\n&lt;p&gt;Steel production, allocated to metal product manufacturing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;218\&quot;&gt;\n&lt;p&gt;Indirect indicator, benchmarked across industries by a control total&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;180\&quot;&gt;\n&lt;p&gt;17.8&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;236\&quot;&gt;\n&lt;p&gt;GDP for road transport by industry&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;218\&quot;&gt;\n&lt;p&gt;Estimation without an indicator, applied directly to industry&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;180\&quot;&gt;\n&lt;p&gt;17.4&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;236\&quot;&gt;\n&lt;p&gt;F-gases used in refrigeration and air conditioning&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;3\&quot; width=\&quot;634\&quot;&gt;\n&lt;p&gt;Source: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;A direct indicator that is applied directly to industry is the most robust indicator type, as it directly relates the emissions process to the economic unit. This approach enables any changes in emissions, due to shocks such as COVID-19, to be traced back to the economic unit, and provides more robust estimates at aggregated and disaggregated levels.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;When a direct indicator is apportioned across industries, the quality of the industry estimates is dependent on the proportions used to allocate across industries. The total movement across industries, however, is still considered robust.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;To allocate across multiple industries, we derived quarterly proportions based on interpolated annual series at the component industry level \u2014 which gives variable proportions across quarters in a year but assumes similar seasonal patterns across industries.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;An indirect indicator applied directly to an industry can provide robust quarterly estimates if the indicator is considered to have good conceptual and empirical properties. The ability to relate the indirect indicator to the industry allows for confrontation against other statistics for that industry (including other emissions sources), which provides information on the quality of the estimates.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;In the case of road transport at the industry level, indirect indicators were applied but needed to be benchmarked across industries by a control total based on a direct indicator (for example, fuel use). We applied the indirect indicator to the industry by source benchmark data using the proportional Denton method, and then formed quarterly proportions for allocating across relevant industries. This approach captures different seasonal patterns but assumes a constant relationship between the indicator variable and process. The process of balancing the industry road transport data against a direct indicator provided a constraint for the total industry movements and therefore relaxed the assumption of a constant relationship between the indicator and the process.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The techniques for both direct and indirect indicators that are allocated across industries were applied at the lowest level of industry detail available but aggregated for publication to a level that minimised the distortions and uncertainties arising from the allocation process.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The accuracy of the indicators is assessed using Pearson correlation coefficients that show the correlation between movements in the benchmark series and movements in the quarterly series.&lt;\/span&gt;&lt;span style=\&quot;font-size: 1rem;\&quot;&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;Seasonal adjustment&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;When measuring emissions on a sub-annual timeframe, the presence of seasonal patterns needs to be assessed. For emissions, a seasonal pattern can result from real-world phenomena such as breeding seasons, use of fuels for heating during winter, and increased use of private vehicles for tourism purposes during summer.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;There are two motivations for producing seasonally adjusted estimates of GHG emissions. Firstly, by removing any regular seasonal pattern it is possible to make meaningful quarter-on-quarter comparisons. For example, if emissions increased by 10 percent in a quarter but 6 percent of this change was expected because of a regular seasonal pattern (for example, fuel for heating) then it is the 4 percent change that is of interest to show changes in technology, trend, or other irregular contributors.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Secondly, one of the main purposes for producing quarterly GHG emissions on a SEEA basis is to show how emissions are changing as GDP and other quarterly economic indicators change. As economic statistics are seasonally adjusted, emissions statistics also need to be seasonally adjusted so that comparisons can be made between the two.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Identifying and accounting for seasonality requires identifying the trend, seasonal, and irregular components of the time series.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;The trend reveals the smooth, relatively slow-changing features in a time series. They are usually estimated by applying repeated moving averages.&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;The seasonal component shows the seasonal patterns found in many sub-annual series. It is reasonably stable in terms of annual timing, direction, and magnitude and can be caused by natural factors, administrative measures, and fixed social traditions or behaviours.&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;The irregular component is the part of the observed value that is not included in the trend cycle or the seasonal effects. Its values are unpredictable regarding timing, impact, and duration. Irregular movements arise from a combination of factors such as sampling error, non-sampling error, unseasonable weather, natural disasters, and strikes. Random fluctuations are the main cause. The irregular component is estimated as a residual.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;The seasonal adjustment method used by Stats NZ for quarterly GHG emissions is the X-13 variant of the seasonal adjustment programme developed by the United States Census Bureau. This technique uses all observations in the time series to statistically determine the seasonal pattern.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;For more information regarding seasonal adjustment see Eurostat (2018).&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Points to consider when applying and interpreting seasonal adjustments:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;The quality of the seasonal pattern is generally considered to improve with the length of the times series. Adding new data points (quarters) can cause the statistically derived seasonal pattern to change and lead to revisions.&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;Stats NZ tends to use five years as a rough guide for the adequacy of a times series for deriving a robust seasonal pattern. The quarterly GHG emissions estimates have an adequate time series length of at least six full years.&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;As the irregular component of the times series is calculated residually, it will be impacted by the quality and changes to the seasonal component.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Fuel use for heating is an example of how irregular components are affected by the seasonal estimate. While most of the estimate of emissions from fuel use for heating will be seasonal, there may also be an irregular component due to temperature changes occurring outside of the regular seasonal pattern. As climate change increasingly impacts weather and climate, the seasonal component may become more variable over time. This means the seasonal component observed in the earlier part of the time series may be unrepresentative for more recent years. It is unclear what the impact will be, if any, and will be assessed over time.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The results of the seasonal adjustment can be found in &lt;a class=\&quot;ss-broken\&quot; href=\&quot;\/methods\/quarterly-greenhouse-gas-emissions-industry-and-household-sources-and-methods\/#seasonal-adj\&quot;&gt;Seasonal adjustment \u2013 industry and household&lt;\/a&gt;.&lt;\/span&gt;&lt;span style=\&quot;font-size: 1.8rem; font-weight: 600; letter-spacing: 0.01rem;\&quot;&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Sources of revisions&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions estimates are based on information available at the time of compilation. Revisions to the time series will be inevitable, due to the nature of benchmarked quarterly series.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Revisions to the \u2018actual\u2019 emissions time series may result from:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;revisions to the annual benchmarks&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;revisions to indicator series&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;changes to methodology&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;revisions to the data used or changes in the process for allocating emissions to industries.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Any revision to the actual emissions series will also result in revisions to the seasonally adjusted series. However, revisions caused by new data points in the time series can also lead to adjustments to the statistically derived seasonal pattern.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;span&gt;Application of methods&lt;\/span&gt;&lt;\/h3&gt;&lt;p&gt;&lt;span&gt;Quarterly emissions estimates are compiled from two perspectives: SEEA industry and inventory sector. This dual perspective enables a wider range of data sources and modelling options to be utilised.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Stats NZ (2020b) shows how sector-based emissions from the Greenhouse Gas Inventory are allocated to industry (where industry is defined by ANZSIC). Emissions in the inventory are classified by source category and grouped by crf codes for UNFCCC reporting. The crf processes are retained in the underlying calculations of the annual industry and household estimates, which provide further methodological options for quarterly measurement. A summary of how sectors are spread across the published level of the quarterly emissions series is presented in table 2.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Table 2&lt;\/strong&gt;&lt;\/p&gt;&lt;table class=\&quot;stats-bordered\&quot; width=\&quot;624\&quot;&gt;&lt;caption&gt;\n&lt;p&gt;&lt;strong&gt;How inventory sectors are split across published-level industries, 2018&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Published &lt;\/strong&gt;&lt;strong&gt;industry&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Inventory sector split&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Agriculture, forestry, and fishing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;The majority of emissions for the agriculture, forestry, and fishing industry are from the agriculture process inventory sector. The energy and waste sectors contributed small amounts to this industry (6 percent and 3 percent respectively). An insignificant contribution (less than 0.1 percent) came from the industrial processes and product use (IPPU) sector.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Mining&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;Almost all emissions from mining are from the energy inventory sector. An insignificant amount (less than 0.2 percent), came from the IPPU sector.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Manufacturing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;Emissions in the manufacturing industry: 66 percent came from the energy inventory sector, 33 percent from the IPPU sector, and 1 percent from the waste sector.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Electricity, gas, water, and waste services&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;Emissions in the electricity, gas, water, and waste services industry: 57 percent came from the energy inventory sector, 35 percent from the waste sector, and 8 percent from the IPPU sector.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Construction&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;Almost all emissions from construction are from the energy inventory sector. An insignificant amount (less than 0.7 percent), came from the IPPU sector.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Transport, postal, and warehousing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;Transport, postal, and warehousing emissions are virtually all from the energy inventory sector, with IPPU inventory sector contributing just over 1 percent. Residency adjustments account for a large amount of emissions from this industry.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;104\&quot;&gt;\n&lt;p&gt;Services excluding transport, postal, and warehousing&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;520\&quot;&gt;\n&lt;p&gt;Services excluding transport, postal, and warehousing industry emissions are mainly from energy sources (79 percent), with the IPPU sector contributing 20 percent. The agriculture and waste inventory sectors contribute less than 0.1 percent each.&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot; width=\&quot;624\&quot;&gt;\n&lt;p&gt;Source: Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Annual emissions benchmarks are sourced from Stats NZ\u2019s GHG emissions by industry and household series. The underlying data contains information for 116 industries and households by Greenhouse Gas Inventory source category. Quarterly emissions data is compiled at a higher level, depending on the availability of indicators and their relevance to specific industries.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The following sections outline the sources and methods used by each main emissions source: energy, industrial processes and product use, agriculture, and waste.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;Energy&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;Energy emissions span all industries in the economy and households. In broad terms, energy emissions cover stationary combustion processes (for example, industrial heating processes, electricity generation, and mining) and mobile combustion processes (for example, transportation by road, air, rail, and water).&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;For consistency with the SEEA framework, emissions from energy used by non-residents on the domestic territory are excluded and by residents overseas included. This affects the compilation of emissions from mobile energy processes, including international shipping and aviation, and tourism. This leads to noticeable differences to quarterly energy emissions produced by MBIE.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Quarterly energy and emissions statistics provide a rich source of information for compiling quarterly emissions on an SEEA basis. MBIE\u2019s New Zealand Energy Quarterly provides oil, gas, and coal tables with information on energy use by high-level industry groups. Other sources include transport data, company data, electronic card transaction data, and quarterly GDP. The ability to incorporate multiple data sources is advantageous, given that energy sector emissions are the most prone to sudden changes in economic activity and the effects of such shocks may not be felt uniformly across industries. Estimation in the absence of an indicator is undertaken for just under 3 percent of energy-related emissions.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Stationary energy emissions&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Stationary sources include non-moving industrial sources such as power plants, refineries, manufacturing plants, and other sources such as heating.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;&lt;a href=\&quot;https:\/\/www.mbie.govt.nz\/building-and-energy\/energy-and-natural-resources\/energy-statistics-and-modelling\/energy-statistics\/new-zealand-energy-sector-greenhouse-gas-emissions\/\&quot;&gt;MBIE\u2019s New Zealand energy sector greenhouse gas emissions&lt;\/a&gt; statistics provide data on electricity generation and geothermal energy, which were applied directly to the electricity, gas, water, and waste services industry.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Quarterly coal, gas, and oil use estimates were used, where relevant, as indicators for stationary energy emissions for the following industries:&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;agriculture, forestry, and fishing&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;mining&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;manufacturing&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;construction&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;service industries excluding transport, postal, and warehousing&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;households.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;As coal, gas, and oil use is a direct indicator of activity data (that is, directly represents the underlying fuel used), and there is a close alignment between energy sector groupings and broad industry groups defined by ANZSIC06, these estimates have high conceptual alignment and were closely correlated as shown in the benchmark-to-indicator ratios (see &lt;a class=\&quot;ss-broken\&quot; href=\&quot;#_Benchmarking,_interpolation,_and\&quot;&gt;Benchmarking, interpolation, and extrapolation&lt;\/a&gt;). Industrial energy use covers the mining, manufacturing, and construction industries, so was allocated across relevant sub-industries using an interpolated series and aggregated to the respective higher-level manufacturing, mining, and construction industries, for quality purposes.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;For oil use, indicators were applied by fuel type (petrol, diesel, and other) to relevant industries. Emissions from oil refining were estimated using movements in indigenous oil production.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Coal production emissions, allocated to mining, were derived using quarterly coal production statistics by coal type and annual proportions and emissions factors from the Greenhouse Gas Inventory. This direct estimation approach was preferred, as it aligns with the estimates in the Greenhouse Gas Inventory and accounts for the changes in coal types that is not possible using an aggregated indicator of coal production. Data from the energy balance tables was used to extend the annual benchmark for manufacture of solid fuel and other energy industries before the series was estimated in the absence of an indicator.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Further direct indicators from the MBIE quarterly gas tables were used for measuring quarterly emissions from gas production and flaring. A suitable quarterly indicator for gas venting has not yet been identified. To minimise the impact of using exponential smoothing models, the annual benchmark was extended using an indicator of annual gross gas production and then the quarterly series was estimated in the absence of an indicator.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Further information on the sources and methods used for quarterly oil, gas, coal, and energy emissions statistics can be found in MBIE (2021).&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Mobile emissions&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Mobile emissions include road, rail, shipping, and air transportation. Mobile energy emissions are subject to adjustments for economic residency.&lt;\/span&gt;&lt;\/p&gt;&lt;h6&gt;&lt;span&gt;Road transport emissions&lt;\/span&gt;&lt;\/h6&gt;&lt;p&gt;&lt;span&gt;Road transport emissions are allocated to both households and industries and cover greenhouse gas emissions that occur because of car, motorcycle, heavy trucks and buses, and light-duty truck use. Carbon dioxide is the most prominent gas associated with road transport emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;As with the estimation of road transport emissions by industry and households at the annual level, quarterly road transport emissions are the most challenging to allocate to industry and households. Quarterly road transport emissions are allocated using multiple data sources that enable robust totals to be maintained while allowing for variation across industry and households, and vehicle type.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The process developed to calculate quarterly emissions from road transport is as follows:&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;a total quarterly road transport estimate was derived by using quarterly fuel use data for land transport, by fuel type&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;household and non-resident road transport was estimated using fuel spend card transaction&amp;nbsp;&lt;\/span&gt;data, adjusted for inflation, as an indicator&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;industry road transport was estimated using economic activity data (GDP) as an indicator&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;household, non-resident, and industry road transport emissions were then constrained to the total.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Although GDP was used in the road transport estimation process, this is mainly used to form relative industry movements rather than absolute movements. Its use assumes that the relative use of vehicles by industry, over quarters, is correlated with economic activity. Comparisons of emissions to GDP by industry are valid, as the movements in emissions and GDP are ultimately independent because of the final balancing process. In addition, the comparison is independent because of differences within industries in terms of the contribution to road transport emissions and GDP.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h6&gt;&lt;span&gt;Rail transport emissions&lt;\/span&gt;&lt;\/h6&gt;&lt;p&gt;&lt;span&gt;Quarterly rail emissions were estimated using freight-tonne kilometres travelled (produced by Te Manat\u016b Waka \u2014 Ministry of Transport as an indicator) and directly allocated to rail benchmarks in the transport, postal, and warehousing industry.&lt;\/span&gt;&lt;\/p&gt;&lt;h6&gt;&lt;span&gt;Shipping transport emissions&lt;\/span&gt;&lt;\/h6&gt;&lt;p&gt;&lt;span&gt;Quarterly shipping emissions were estimated using oil statistics data from MBIE and applied directly to domestic navigation benchmarks in the transport, postal, and warehousing industry.&lt;\/span&gt;&lt;\/p&gt;&lt;h6&gt;&lt;span&gt;Air transport emissions&lt;\/span&gt;&lt;\/h6&gt;&lt;p&gt;&lt;span&gt;Oil statistics produced by MBIE for jet kerosene were applied directly to the air transport industry. Quarterly aviation gas emissions were allocated across relevant industries based on the proportion derived from interpolated annual benchmarks. Additional information (provided directly) was used to adjust for emissions from resident economic operators.&lt;\/span&gt;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;Industrial processes and product use&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;Emissions from industrial processes and product use (IPPU) covers greenhouse gas emissions that result from industrial processes, from the use of greenhouse gases in products, and from non-energy uses of fossil fuels. Examples of processes include blast furnaces in the iron and steel industry, and manufacture of ammonia and other chemical products where fossil fuels are used as a feedstock. Product use refers to greenhouse gases used within products such as refrigerators, foams, or aerosol cans. In most cases there will be a significant lag between the manufacture of the product and the release of the gas. The lag can be as short as weeks, for example for aerosol cans, or as much as decades in the case of rigid foams (IPCC, 2006).&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;The IPPU sector accounts for a small part of New Zealand\u2019s gross emissions, contributing between 5 to 6 percent between 2007\u201318 (Stats NZ, 2020). New Zealand\u2019s Greenhouse Gas Inventory reports non-energy emissions from the:&lt;\/span&gt;&lt;span style=\&quot;font-size: 1rem;\&quot;&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;span&gt;calcination of limestone in cement production&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;calcination of limestone in burnt and slaked lime production&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;production of ammonia, which is further processed into urea production of methanol&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;production of hydrogen in oil refining and for making hydrogen peroxide&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;production of steel, from iron sand and from scrap steel&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;oxidation of anodes in aluminium smelting&lt;\/span&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;span&gt;use of soda ash and limestone in glass making.&lt;\/span&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;&lt;span&gt;Industrial processes are allocated to the relevant manufacturing industry. Industrial product use occurs across all industries and households. Emissions from industrial product use includes hydrofluorocarbons (HFCs) and perfluorocarbons (PFCs) used in refrigeration and air conditioning equipment (MfE, 2020), and a small contribution from sulphur hexafluoride (SF6). In terms of gas type, carbon dioxide is the dominant gas type emitted from IPPU sources, primarily from the manufacturing of metals and cement. Industrial processes accounted for approximately 70 percent of the IPPU series in 2014 but due to the increase in the emissions from F-gases (mainly in product use), this proportion decreased to around 60 percent in 2018 (the benchmark year). Note that approximate values are used here because the IPPU section of the inventory has not had two distinct chapters separating processes and product use since the 1996 guideline was in use. &lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Allocation of industrial process emissions&lt;\/span&gt;&amp;nbsp;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Industrial process emissions are allocated to industry through a combination of indirect indicators applied directly to industry and estimation in the absence of an indicator. As there are a relatively small number of industrial processes in the inventory and the main sources of these are often produced by single economic units, it is possible to apply indicators at a low level of detail.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Presently, indicators used for quarterly industrial process emissions estimation are indirect in nature. Direct indicators that attempt to measure the actual movements in greenhouse gas emissions have not been identified. The indirect indicators used for quarterly emissions estimation include those that relate to inputs and outputs.&lt;\/span&gt;&lt;span&gt;&amp;nbsp;&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Input indicators&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Indicators that relate to inputs for a specific plant indirectly reflect emissions. In the IPPU sector, many large plants in the manufacturing industries run 24\/7 operations and are dominated by a small number of units. In several cases, data that is available for the direct supply of a key feedstock or input to the production process, for example electricity or natural gas supply, is used to estimate emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Output indicators&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Output-based indicators, such as production volume, can be directly related to activity at the plant and therefore indirectly its emissions. In these cases, the implicit assumption is that there is a constant emissions intensity over the quarters in a year. However, the regular introduction of new benchmarks will mean that these emissions intensities are eventually updated.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;In theory, the same input or output indicator used for industrial processes may be appropriate to use for that unit\u2019s energy emissions. However, this approach has not yet been adopted but may be considered if further industry disaggregation is explored.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;In identifying indicators for industrial processes, financial data from Stats NZ\u2019s quarterly collections was explored but not used. Financial data should be avoided, as when expressed in current prices it may be influenced by local or world prices or other factors rather than production. If financial data is expressed in constant prices, any insights into decoupling quarter-on-quarter will be weakened as there will be less independence from measures of economic activity.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;For industrial processes, an indicator was not found for 1 percent of the total, an amount that equates to approximately 5 kilotonnes of CO&lt;sub&gt;2&lt;\/sub&gt;-e emissions. Interpolation was used to rate forward the existing estimates and these processes will be added to a list of potential improvements for subsequent releases of quarterly emissions.&lt;\/span&gt;&amp;nbsp;&lt;\/p&gt;&lt;h5&gt;&lt;span&gt;Allocation of emissions from product use&lt;\/span&gt;&lt;\/h5&gt;&lt;p&gt;&lt;span&gt;Emissions from industrial product use are primarily air conditioning and refrigeration product use and are generally allocated across all industries and households. Product use emissions arise during the manufacturing process from stocks, or during its disposal. Indicators can therefore be difficult to identify when estimating quarterly movements. Hence, product use emissions were estimated without indicators. See table 3 for an indicator breakdown for the IPPU sector.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Table 3&lt;\/strong&gt;&lt;\/p&gt;&lt;table class=\&quot;stats-bordered\&quot; style=\&quot;width: 100;\&quot;&gt;&lt;caption&gt;\n&lt;p&gt;&lt;span&gt;Indicator breakdown for the industrial processes and product use sector&lt;\/span&gt;&lt;\/p&gt;\n&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;2\&quot;&gt;&lt;strong&gt;Common reporting format (crf) class codes and descriptors&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;&lt;strong&gt;&amp;nbsp;Indicator&lt;\/strong&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;2.A.1 - 2.A.4&lt;\/td&gt;\n&lt;td&gt;Cement, lime, glass, and other process uses of carbonates&lt;\/td&gt;\n&lt;td&gt;Primarily cement production volume&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;2.B.1 - 2.B.10&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;Ammonia, carbide, petroleum, and petrochemicals&lt;\/td&gt;\n&lt;td&gt;Refinery production data from MBIE&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;2.C.1a - 2.C.7&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;Aluminium, lead, and steel&lt;\/td&gt;\n&lt;td&gt;\n&lt;p&gt;Primarily steel production and electricity supply to Tiwai.&lt;\/p&gt;\nStatistical interpolation for others&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;2.D.1 - 2.D.3&lt;\/td&gt;\n&lt;td&gt;&amp;nbsp;Lubricant use, paraffin wax use and urea catalyst in road transport&lt;\/td&gt;\n&lt;td&gt;Statistical interpolation&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;2.F.1.a- 2.F.4.b&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;Commercial, domestic, industrial and transport refrigeration, mobile and stationary air conditioning, closed cells, fire protection, and metered dose inhaler&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;Statistical interpolation&amp;nbsp;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;2.G.1 - 2.G.3a&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;Electrical equipment, medical applications, and medical and other product use&amp;nbsp;&lt;\/td&gt;\n&lt;td&gt;Statistical interpolation&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;3\&quot;&gt;Source: Stats NZ&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;h4&gt;&lt;span&gt;Agriculture&lt;\/span&gt;&lt;\/h4&gt;&lt;p&gt;&lt;span&gt;The agriculture sector is the largest emitting inventory sector and is predominantly made up of enteric methane and emissions from agricultural soils. &lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;Gross emissions from the agriculture sector, as reported by the Greenhouse Gas Inventory, are allocated almost entirely to the agriculture, forestry, and fishing industry. Emissions from the agriculture sector account for most of those from this industry (91 percent), with emissions from energy, and industrial product use and waste sources accounting for a further 9 percent of emissions.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;span&gt;At this stage of development, methods have been developed to estimate quarterly emission numbers for the largest sources of agricultural emissions, namely methane from livestock enteric fermentation and manure, nitrous oxide from manure and nitrogen fertiliser, and carbon dioxide from soil applications (see table 4 for a summary of sources\/indicators used). At the total level, all annual agricultural emissions are benchmarked to align with actual (to latest available benchmark year) and projected (post-latest available benchmark year) annual agricultural emissions inventory totals.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;&lt;strong&gt;Table 4&lt;\/strong&gt;&lt;\/p&gt;&lt;table class=\&quot;stats-bordered\&quot; width=\&quot;100\&quot;&gt;&lt;caption&gt;\n&lt;p&gt;&lt;strong&gt;Data sources\/indicators for quarterly agricultural greenhouse gas emissions (as at December 2021)&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/caption&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;133\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Emission&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Indicator for estimation&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Frequency&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Source&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;Data availability&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td rowspan=\&quot;5\&quot; width=\&quot;133\&quot;&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p&gt;Methane (CH&lt;sub&gt;4&lt;\/sub&gt;) \u2013 enteric fermentation and manure management&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Methane research series (for selected livestock categories)&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;monthly&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;MPI&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;113\&quot;&gt;\n&lt;p&gt;2009 to 2016 (updated intermittently)&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;246\&quot;&gt;\n&lt;p&gt;Agricultural emissions inventory projections for MfE&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td style=\&quot;text-align: center;\&quot; width=\&quot;76\&quot;&gt;\n&lt;p&gt;annual&lt;\/p&gt;\n&lt;\/td&gt;\n&

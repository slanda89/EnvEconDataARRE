 2019 (data to 2017)&lt;\/em&gt; presents the relationships between the environment and the economy, and the stocks, and changes in stocks, of New Zealand&#039;s natural resources.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;Download the PDF below, or read the content online.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28398&quot;,&quot;Title&quot;:&quot;Download report&quot;,&quot;ClassName&quot;:&quot;DocumentBlock&quot;,&quot;ShowBlockTitle&quot;:true,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;BlockDocuments&quot;:[{&quot;ID&quot;:&quot;32124&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;environmental-economic-accounts-2019-data-to-2017-updated-1-july-2019.pdf&quot;,&quot;FileName&quot;:&quot;environmental-economic-accounts-2019-data-to-2017-updated-1-july-2019.pdf&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) updated 1 July 2019&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:26559,&quot;OwnerID&quot;:37,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Environmental-economic-accounts-2019\/Download-data\/environmental-economic-accounts-2019-data-to-2017-updated-1-july-2019.pdf&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;pdf&quot;,&quot;DocumentFileType&quot;:&quot;Adobe Acrobat PDF file&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483475&quot;,&quot;DocumentSize&quot;:&quot;2.2 MB&quot;,&quot;DocumentPreviewImage&quot;:false}],&quot;Heading&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}},&quot;Presentation&quot;:null},{&quot;ID&quot;:&quot;28368&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 contents&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h3&gt;Contents&lt;\/h3&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#summary\&quot;&gt;Executive summary&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#purpose\&quot;&gt;Purpose and background&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#climatechange\&quot;&gt;Climate change and the transition to a low-emissions economy&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#pressures\&quot;&gt;Pressures&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#impacts\&quot;&gt;Impacts&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#responses\&quot;&gt;Responses&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#future\&quot;&gt;Future updates&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#references\&quot;&gt;References&lt;\/a&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;ID&quot;:&quot;28179&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) - 1&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;&lt;a name=\&quot;summary\&quot;&gt;&lt;\/a&gt;Executive summary&lt;\/h2&gt;\n&lt;p&gt;&lt;span class=\&quot;u-font-size-base\&quot;&gt;&lt;em&gt;Environmental-economic accounts: 2019 (data to 2017)&lt;\/em&gt; presents the relationships between the environment and the economy, and the stocks, and changes in stocks, of New Zealand&#039;s natural resources.&lt;\/span&gt;&lt;\/p&gt;\n&lt;p&gt;This edition of the accounts focuses on climate change and the transition to a low-emissions economy: the pressures of emissions on the atmosphere, the likely impacts of climate change on natural resources, and the extent of economic responses to reduce emissions.&lt;\/p&gt;\n&lt;h2&gt;Climate change&lt;\/h2&gt;\n&lt;p&gt;Climate change is one of the most important environmental challenges globally, with enough evidence showing greenhouse gas emissions from human activities are causing this (Intergovernmental Panel on Climate Change (IPCC), 2013).&lt;\/p&gt;\n&lt;p&gt;Concentrations of carbon dioxide in the atmosphere are at their highest in 400,000 years. This is expected to affect the availability and demand for natural resources, and increase the rate of loss of biodiversity and ecosystems that provide services essential for life (Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services (IPBES), 2019).&lt;\/p&gt;\n&lt;p&gt;Countries are seeking to reduce greenhouse gases in response to the Paris Agreement of December 2015. To do this they need robust data on the sources of emissions that contribute to climate change, and information on the impacts of climate change on the environment.&lt;\/p&gt;\n&lt;p&gt;The aim of the Paris Agreement is to hold the increase in the global average temperature to well below 2 degrees Celsius above pre-industrial levels and pursue efforts to limit the temperature increase to 1.5 degree Celsius above pre-industrial levels, recognising that this would significantly reduce the risks and impacts of climate change.&lt;\/p&gt;\n&lt;p&gt;Greenhouse gas emissions stem from all parts of the economy as well as direct activities by households. The Climate Change Response (Zero Carbon) Amendment Bill will introduce new targets to reduce all greenhouse gases (except biogenic methane) to net zero by 2050 but levels of gross emissions are unchanged in the last decade and the rate of new planting in forestry has slowed. Moving to a low-emissions economy will require a combination of reduced emissions from industry and households, and land use changes.&lt;\/p&gt;\n&lt;h2&gt;Environmental-economic accounts&lt;\/h2&gt;\n&lt;p&gt;The environmental-economic accounting approach can inform discussions around climate change by linking environmental, economic, and social data. It brings together economic and environmental information, enabling us to talk about the environment in the same language as economics. This is particularly important as New Zealand transitions to a low-emissions economy. Information from the accounts can show trade-offs from the transition, adaptive actions, and impacts on the economy and environment.&lt;\/p&gt;\n&lt;p&gt;We combined the latest estimates from the environmental-economic accounts to provide information on drivers, pressures, impacts, and responses, which complement information on the state of the atmosphere and climate provided by the &lt;a href=\&quot;topics\/atmosphere-and-climate\&quot;&gt;Environmental reporting series&lt;\/a&gt;. We provide estimates on greenhouse gases by industry and households, timber stocks and changes in stocks, carbon sequestration, and environmental taxes. Climate change will affect New Zealand\u2019s natural resources, so we show how the benefits we get from natural resources will be recorded in the environmental-economic accounts. We discuss critical data gaps that may affect the environment-economy linkages in relation to climate change.&lt;\/p&gt;\n&lt;h2&gt;New Zealand\u2019s greenhouse gas emissions&lt;\/h2&gt;\n&lt;p&gt;Most Annex I countries reduced their greenhouse gas emissions from 2008-15. New Zealand\u2019s emissions decreased 0.8 percent over the 2008-15 period, but this is among the smaller decreases observed.&lt;\/p&gt;\n&lt;p&gt;The structure of New Zealand\u2019s economy and its dependency on the primary sector for exports affect its emissions intensity, which was 11th highest among 31 countries in 2015. New Zealand\u2019s carbon dioxide intensity ranked 21st highest among 31 countries. The difference between these reflects the significant contribution of methane to New Zealand\u2019s emissions profile.&lt;\/p&gt;\n&lt;h2&gt;Household emissions&lt;\/h2&gt;\n&lt;p&gt;Emissions from households rose 19.3 percent from 2007\u201317 mainly due to road transport. Compared with industry emissions, household emissions increased at a faster rate as reflected in its contribution to total emissions, which rose from 9 percent to 11 percent over the period. This increase was faster than the increase in the number of households (up 9.7 percent over the period), which implies that households have been less efficient at managing direct emissions since 2007.&lt;\/p&gt;\n&lt;p&gt;New Zealand is 1 of 10 (out of 38) countries that has seen production of emissions by households increase since 2008\u201315. This report identifies that the contribution of households to emissions can be more fully understood by measuring emissions from a consumption perspective.&lt;\/p&gt;\n&lt;h2&gt;Tourism emissions&lt;\/h2&gt;\n&lt;p&gt;Emissions from road transport have also been increasing due to the higher number of tourists using road transport. Road transport emissions from international tourists in New Zealand rose 19.3 percent over 2007\u201317, amounting to 7.8 percent of total road transport emissions in 2017. Tourists use mainly diesel for their fuel. Diesel has a higher emissions factor than petrol, and a higher relative contribution to emissions per dollar spent. Total emissions from international tourists increased 20.0 percent over the period. The emissions intensity of tourism (emissions in relation to tourists\u2019 average length of stay) also increased over the period.&lt;\/p&gt;\n&lt;h2&gt;Industry emissions&lt;\/h2&gt;\n&lt;h3&gt;Main contributors to 2017 emissions&lt;\/h3&gt;\n&lt;p&gt;In 2017, the main industry contributors to total emissions were sheep, beef cattle, and grain farming; dairy cattle farming; electricity and gas supply; and transport (figure 1). Emissions from industry accounted for 89 percent of total emissions in 2017, with households accounting for a further 11 percent.&lt;\/p&gt;\n&lt;p&gt;&lt;img width=\&quot;794\&quot; height=\&quot;882\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Environmental-economic-accounts-2019\/Download-data\/Figure-1.PNG\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-data-to-2017#fig1\&quot;&gt;Text alternative for figure 1&lt;\/a&gt;&lt;\/p&gt;\n&lt;h2&gt;Change in emissions over 2007\u201317&lt;\/h2&gt;\n&lt;p&gt;Total industry emissions decreased 2.9 percent from 2007\u201317, driven mainly by the electricity, gas, water, and waste services industry (figure 2). This decrease was achieved while the industry\u2019s economic activity continued to grow, and was partly attributable to increased use of renewable energy sources.&lt;\/p&gt;\n&lt;h3&gt;Figure 2&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27540&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Change in CO2-e emissions, by industry and households, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:&quot;Industry&quot;,&quot;yAxisTitle&quot;:&quot;Kilotonnes&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7821,&quot;Title&quot;:&quot;Change in CO2-e emissions, by &quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;bar&quot;,&quot;GraphCsvData&quot;:&quot;Industry,Households,Manufacturing,\&quot;Services excluding transport, postal, and warehousing\&quot;,Construction,Forestry and logging,\&quot;Transport, postal, and warehousing\&quot;,\&quot;Fishing, aquaculture and agricultural support services\&quot;,Agriculture,Mining,\&quot;Electricity, gas, water, and waste services\&quot;,Total\r\nChange in emissions,1473,1192,460,272,203,46,-238,-239,-497,-3844,-744\r\n&quot;}],&quot;GraphType&quot;:&quot;bar&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Change in CO2-e emissions, by industry and households, 2007\u201317&quot;,&quot;showLegend&quot;:false,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28239&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 2&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Mining and agriculture also contributed to the reduced industry emissions from 2007\u201317. However, much of these reductions were offset by increases from households and manufacturing, as well as services, construction, forestry, and transport.&lt;\/p&gt;&lt;p&gt;From 2007\u201317, total industry emissions decreased 2.9 percent (or 2,217 kilotonnes), with decreases coming from:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;electricity and gas supply \u2013 down 41.7 percent (3,359 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;sheep, beef cattle, and grain farming \u2013 down 11.7 percent (2,969 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;poultry, deer, and other livestock farming \u2013 down 43.6 percent (727 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;mining \u2013 down 24.6 percent (497 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;water, sewerage, drainage, and waste services \u2013 down 20.9 percent (485 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;non-metallic mineral product manufacturing \u2013 down 28.5 percent (456 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;rail, water, air, and other transport - down 8.8 percent (437 kilotonnes)&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;However, emissions increased for:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;dairy cattle farming\u2013 up 27.7 percent (3,636 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;petroleum, chemical, polymer, and rubber product manufacturing \u2013 up 63.1 percent (1,069 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;food, beverage, and tobacco product manufacturing \u2013 up 44.8 percent (984 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;road transport \u2013 up 16.5 percent (548 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;services excluding transport, postal, and warehousing \u2013 up 36.0 percent (460 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;construction \u2013 up 65.9 percent (272 kilotonnes)&lt;\/li&gt;\n&lt;li&gt;forestry and logging \u2013 up 54.1 percent (203 kilotonnes).&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;Table 1 summarises the contributions of broad industry groups and households to emissions in 2017, the change in emissions from 2007\u201317, and average growth rates for key gases.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28178&quot;,&quot;Title&quot;:&quot;EEA 2019 - Table 1&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;strong&gt; Table 1&lt;\/strong&gt;&lt;\/p&gt;&lt;table border=\&quot;1\&quot; cellspacing=\&quot;0\&quot; cellpadding=\&quot;0\&quot; style=\&quot;width: 100%;\&quot;&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;623\&quot; nowrap colspan=\&quot;6\&quot;&gt;\n&lt;p class=\&quot;Tabletitle1\&quot;&gt;&lt;strong&gt;Contribution, change, and annual growth of emissions by broad industry group and households, 2007-17&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap rowspan=\&quot;4\&quot;&gt;\n&lt;p&gt;&lt;b&gt;Industry (ANZSIC06) and households&lt;\/b&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;2017&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;305\&quot; colspan=\&quot;4\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;2007\u201317&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;84\&quot; rowspan=\&quot;2\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;Contribution to total CO&lt;sub&gt;2&lt;\/sub&gt;-e&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; rowspan=\&quot;2\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;&amp;nbsp;Change in CO&lt;sub&gt;2&lt;\/sub&gt;-e&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;227\&quot; colspan=\&quot;3\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;Key gases&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;76\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;CO&lt;sub&gt;2&lt;\/sub&gt;-e&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;CO&lt;sub&gt;2&lt;\/sub&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;Methane&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;84\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;% of total&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;Kilotonnes&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;227\&quot; nowrap colspan=\&quot;3\&quot;&gt;\n&lt;p align=\&quot;center\&quot;&gt;Average annual % change&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap&gt;\n&lt;p&gt;Primary industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;52.4&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-771&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-1.5&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap&gt;\n&lt;p&gt;Goods-producing industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;21.7&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-2,380&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-1.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-1.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-1.7&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap&gt;\n&lt;p&gt;Service industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;12.4&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;506&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;0.5&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;0.4&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-5.5&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap&gt;\n&lt;p&gt;Total all industries&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;89.0&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-2,217&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.3&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.8&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap&gt;\n&lt;p&gt;Households&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;11.0&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;1,473&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;1.8&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;1.8&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;0.1&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;234\&quot; nowrap&gt;\n&lt;p&gt;&lt;b&gt;Total&lt;\/b&gt;&amp;nbsp;&lt;b&gt;&lt;\/b&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;84\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;100.0&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-744&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.1&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; nowrap&gt;\n&lt;p align=\&quot;center\&quot;&gt;-0.2&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;623\&quot; nowrap colspan=\&quot;6\&quot;&gt;\n&lt;p&gt;&lt;b&gt;Note&lt;\/b&gt;: CO&lt;sub&gt;2-e &lt;\/sub&gt;\u2013 carbon dioxide equivalent&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;623\&quot; nowrap colspan=\&quot;6\&quot;&gt;\n&lt;p&gt;&lt;b&gt;Source: &lt;\/b&gt;Stats NZ&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&quot;},{&quot;ID&quot;:&quot;28245&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 3&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Agricultural emissions&lt;\/h2&gt;\n&lt;p&gt;This report contains new estimates of emissions from the agricultural industries. Industries within agriculture include: horticulture and fruit growing; sheep, beef cattle, and grain farming; dairy cattle farming; and poultry, deer, and other livestock farming.&lt;\/p&gt;\n&lt;p&gt;Sheep, beef cattle, and grain farming accounted for over half of emissions from the agriculture industry and 27.1 percent of total emissions in 2017, making it New Zealand\u2019s largest-emitting industry. The decline in emissions from the sheep, beef cattle, and grain farming industry was the second largest of all industries from 2007\u201317. While sheep and beef numbers, and their emissions, declined, increased dairy activity offset these reductions. Dairy cattle farming was the only agriculture industry to record an increase in emissions from 2007\u201317, up 2.5 percent a year, and had the largest increase in kilotonnes of all industries. Dairy cattle farming accounted for 20.3 percent of total emissions, similar to the proportion of emissions from the manufacturing, and electricity and gas supply industries combined.&lt;\/p&gt;\n&lt;h2&gt;Emissions and economic activity&lt;\/h2&gt;\n&lt;p&gt;From 2007-17, agriculture emissions decreased at a rate of 0.1 percent a year (although no significant trend could be observed) while its contribution to GDP (in real terms) grew at a rate of 1.8 percent a year.&lt;\/p&gt;\n&lt;p&gt;Other industries to show a reduction in emissions relative to their contribution to GDP included the transport, postal, and warehousing industry (emissions up 0.1 percent a year, but contribution to GDP grew 3.0 percent a year) and mining (where emissions fell 2.8 percent a year but contribution to GDP fell 0.8 percent a year). However, emissions increased at a faster rate than the contribution to GDP (in real terms) for:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;forestry and logging&lt;\/li&gt;\n&lt;li&gt;construction&lt;\/li&gt;\n&lt;li&gt;manufacturing&lt;\/li&gt;\n&lt;li&gt;services excluding transport, postal, and warehousing.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;Manufacturing\u2019s emissions increased 1.2 percent a year and was the main emitter of carbon dioxide in 2017. Within manufacturing, some industries contributions to both GDP and emissions decreased, others showed absolute decoupling (contribution to GDP increased while emissions decreased), while others showed emissions increasing faster than GDP.&lt;\/p&gt;\n&lt;h2&gt;Net emissions&lt;\/h2&gt;\n&lt;p&gt;From 1990\u20132017, New Zealand\u2019s gross emissions as measured in the Greenhouse Gas Inventory (Ministry for the Environment (MfE), 2019) increased 23.1 percent.&lt;\/p&gt;\n&lt;p&gt;Net emissions (which accounts for the land use, land-use change, and forestry sector) increased 64.9 percent over the same period, mainly due to increases in both harvesting from plantation forests and in gross emissions.&lt;\/p&gt;\n&lt;p&gt;Understanding the extent and capacity for forestry to offset gross emissions is essential for tracking progress towards net emissions targets. Carbon sequestration in cultivated forests declined over the last decade (down 19 percent from 2007\u201317) largely due to increased rates of harvesting, along with reduced rates of planting, and deforestation. This report discusses how the use of timber products in the economy, as well as the rates of timber harvest, is important for tracking progress towards a low-emissions economy.&lt;\/p&gt;\n&lt;h2&gt;Responding to climate change&lt;\/h2&gt;\n&lt;p&gt;The &lt;a href=\&quot;https:\/\/www.epa.govt.nz\/industry-areas\/emissions-trading-scheme\/\&quot;&gt;Emissions Trading Scheme&lt;\/a&gt; is New Zealand\u2019s main policy response for reducing greenhouse gases. The scheme places a price on greenhouse gases to encourage emitters to implement emissions-reducing technologies. Understanding the distribution of permits across industries is an area for future focus. However, environmental taxes on energy and transport have been increasing and higher-emitting industries on average pay higher environmental taxes. The extent to which subsidies are used in New Zealand remains an area for future development. Assessing the range of taxes, subsidies, and permits by industry, along with emissions, will provide a means to track our responses to climate change and how we are progressing towards a low-emissions economy.&lt;\/p&gt;\n&lt;h2&gt;&lt;a name=\&quot;purpose\&quot;&gt;&lt;\/a&gt;Purpose and background&lt;\/h2&gt;\n&lt;p&gt;&lt;em&gt;Environmental-economic accounts: 2019 (data to 2017)&lt;\/em&gt; provides a record of New Zealand\u2019s stocks and flows of natural capital (environmental assets), the flows of pollutants from the economy to the environment, and the economic activities undertaken to protect the environment.&lt;\/p&gt;\n&lt;p&gt;This report focuses on climate change and New Zealand\u2019s transition to a low-emissions economy. This thematic approach shows how environmental-economic accounts can be integrated and used to inform this issue.&lt;\/p&gt;\n&lt;p&gt;We compiled the information using the System of Environmental-Economic Accounting (SEEA) framework, which the United Nations adopted in 2012 as the international standard for measuring the interactions between the environment and the economy.&lt;\/p&gt;\n&lt;h2&gt;Background to environmental accounting&lt;\/h2&gt;\n&lt;p&gt;Stats NZ produces the following environmental-economic accounts using the SEEA framework:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;physical stocks of land cover, timber, and water&lt;\/li&gt;\n&lt;li&gt;monetary stocks of timber, fish, and renewable energy resources&lt;\/li&gt;\n&lt;li&gt;annual resource rents for fish, timber, minerals, and renewable energy&lt;\/li&gt;\n&lt;li&gt;physical flows of greenhouse gases by industry and households&lt;\/li&gt;\n&lt;li&gt;environmental protection expenditure by central and local government, and environmental taxes.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;We also produce estimates of the marine economy in terms of gross domestic product (GDP) and persons employed.&lt;\/p&gt;\n&lt;p&gt;Most of these accounts are updated annually. We update tables every February to take advantage of data available in late November, and publish more tables in June each year using data available in April. Source data for the land and water accounts is not available annually, so we update these accounts approximately every three to five years or as data becomes available and funding allows.&lt;\/p&gt;\n&lt;p&gt;&lt;em&gt;Environmental-economic accounts: 2018&lt;\/em&gt; was the first in a new series of SEEA accounts in New Zealand. The report included discussion and results for all the tables released to February 2018.&lt;\/p&gt;\n&lt;p&gt;SEEA is an internationally accepted statistical standard that specifies how environmental and economic information can be integrated coherently. It uses the concepts, definitions, and classifications consistent with those in the System of National Accounts (SNA), which Stats NZ uses to produce economic statistics such as GDP. The SEEA framework allows us to make direct comparisons between environmental and economic information, so that we have a clearer understanding of environmental-economic trade-offs and a more complete picture of our country\u2019s economic and environmental performance.&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;methods\/environmental-economic-accounts-sources-and-methods\&quot;&gt;Environmental-economic accounts: sources and methods&lt;\/a&gt; has further information on the definitions, concepts, sources, and methods we used to compile the accounts. There are numerous gaps in our data which we intend to fill over time. We encourage you to provide feedback and suggestions for future developments to &lt;a href=\&quot;mailto:environmental.accounts@stats.govt.nz\&quot;&gt;environmental.accounts@stats.govt.nz&lt;\/a&gt;.&lt;\/p&gt;\n&lt;h2&gt;Developments since Environmental-economic accounts: 2018&lt;\/h2&gt;\n&lt;p&gt;We made the following improvements to how we measure greenhouse gases by industry and households (referred to in the 2018 report as the air emissions account):&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;additional industry disaggregation for:\n&lt;ul&gt;\n&lt;li&gt;agriculture \u2013 horticulture and fruit growing; sheep, beef cattle, and grain farming; dairy cattle farming; poultry, deer, and other livestock farming&lt;\/li&gt;\n&lt;li&gt;electricity, gas, water, and waste services \u2013 electricity and gas supply; water, sewerage, drainage, and waste services&lt;\/li&gt;\n&lt;li&gt;transport, postal, and warehousing \u2013 road transport; rail, water, air, and other transport; postal, courier transport support and warehouse services&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;\/li&gt;\n&lt;li&gt;additional detail for households \u2013 transport; heating\/cooling; other&lt;\/li&gt;\n&lt;li&gt;additional gases \u2013 hydrofluorocarbons, perfluorocarbons, sulphur hexafluoride&lt;\/li&gt;\n&lt;li&gt;adjustments for economic residence:\n&lt;ul&gt;\n&lt;li&gt;estimates of direct emissions from road transport by international tourists&lt;\/li&gt;\n&lt;li&gt;emissions by New Zealand residents overseas.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;We produced an experimental carbon stock in the timber account. We also incorporated improved measures of indigenous timber stocks using data from the Land Use and Carbon Analysis System.&lt;\/p&gt;\n&lt;p&gt;We improved the presentation of environmental taxes by showing the share of environmental taxes in relation to tax type.&lt;\/p&gt;\n&lt;p&gt;We are now reporting on the number of wage and salary earners rather than filled jobs in the marine economy. The reference period for the marine economy is the year ended March, and job counts tend to correspond to short reference periods such as quarterly and monthly.&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-data-to-2017#revisions\&quot;&gt;Revisions to previously published accounts&lt;\/a&gt; has more information on changes to input data sources.&lt;\/p&gt;\n&lt;h2&gt;&lt;a name=\&quot;climatechange\&quot;&gt;&lt;\/a&gt;Climate change and the transition to a low-emissions economy&lt;\/h2&gt;\n&lt;p&gt;Climate change is one of the most important environmental challenges globally, with enough evidence showing greenhouse gas emissions from human activities are causing this (IPCC, 2013).&lt;\/p&gt;\n&lt;p&gt;Levels of atmospheric carbon dioxide measured at Baring Head near Wellington (internationally recognised site for global climate change and atmospheric impact studies) increased 23 percent from 326 to 401 parts per million between 1972 and 2016 (MfE &amp;amp; Stats NZ, 2017). This level now exceeds the symbolic threshold of 400 parts per million (NASA, 2017b), the highest level in our atmosphere in at least the last 800,00 years (IPCC, 2013). The value of 400 parts per million is required to limit global temperature increases and other climate change impacts (MfE &amp;amp; Stats NZ, 2017).&lt;\/p&gt;\n&lt;p&gt;Many significant changes in New Zealand\u2019s climate have already been observed across the country, but regional variations can also be seen, particularly for rain and snow fall. Changes include alterations to temperature, precipitation patterns, sea-level rise, glacier ice storage, wind and sunshine, and ocean acidification (MfE &amp;amp; Stats NZ, 2019).&lt;\/p&gt;\n&lt;p&gt;New Zealand\u2019s annual average temperature increased 1 degree Celsius between 1909 and 2016. Four of the last six years were among the warmest on record (NIWA, 2018). The average annual temperature has not been this warm in the past 10,000 years, which is likely to be near or already outside the range that humans and current ecosystems have experienced (MfE, 1997).&lt;\/p&gt;\n&lt;p&gt;Climate change is already affecting New Zealand, and the effects will intensify with time. For some impacts, such as extreme rainfall events, changes to the baseline have not yet been detected. Other impacts, such as rising sea levels, are already significantly different from pre-industrial conditions.&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;https:\/\/www.mfe.govt.nz\/publications\/environmental-reporting\/environment-aotearoa-2019\&quot;&gt;Environment Aotearoa 2019&lt;\/a&gt; reports on some of the key impacts:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;changes in the availability and demand for water resources&lt;\/li&gt;\n&lt;li&gt;increased risk of extreme fire conditions&lt;\/li&gt;\n&lt;li&gt;effects on marine ecosystems and fish stocks&lt;\/li&gt;\n&lt;li&gt;risks to infrastructure from increased extreme weather events&lt;\/li&gt;\n&lt;li&gt;economic impacts on agriculture, horticulture, and tourism.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;h2&gt;Transition to a low-emissions economy&lt;\/h2&gt;\n&lt;p&gt;The Climate Change Response (Zero Carbon) Amendment Bill provides a framework by which New Zealand can develop and implement clear and stable climate change policies. This response contributes to the global effort under the Paris Agreement, which seeks to hold the increase in the global average temperature to well below 2 degrees Celsius above pre-industrial levels and pursue efforts to limit the temperature increase to 1.5 degree Celsius above pre-industrial levels, recognising that this would significantly reduce the risks and impacts of climate change.&lt;\/p&gt;\n&lt;p&gt;The Bill has four key elements:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Set a new greenhouse gas emissions reduction target, to:\n&lt;ul&gt;\n&lt;li&gt;reduce all greenhouse gases (except biogenic methane) to net zero by 2050&lt;\/li&gt;\n&lt;li&gt;reduce emissions of biogenic methane to at least 24\u201347 percent below 2017 levels by 2050, including to 10 percent below 2017 levels by 2030.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;\/li&gt;\n&lt;li&gt;Establish a series of emissions budgets to act as stepping stones towards the long-term target.&lt;\/li&gt;\n&lt;li&gt;Require the Government to develop and implement policies for climate change adaptation and mitigation.&lt;\/li&gt;\n&lt;li&gt;Establish a new, independent Climate Change Commission to provide expert advice and monitoring, to help keep successive governments on track to meeting long-term goals.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;h2&gt;Environmental-economic accounting and climate change&lt;\/h2&gt;\n&lt;p&gt;Countries are seeking to reduce their greenhouse gas emissions in response to the Paris Agreement of December 2015. To do this, they need robust data on the sources of emissions that are putting pressure on our environment, and on the impacts of and responses to climate change.&lt;\/p&gt;\n&lt;p&gt;The 24th Meeting of the Conference of Parties in 2018 outlined the need for strengthening statistical systems to support policy related to climate change. These systems include those for measuring emissions in greenhouse gas inventories, adaptation, and financial transactions.&lt;\/p&gt;\n&lt;p&gt;The environmental-economic accounting approach is one such statistical system that can inform discussions around climate change, particularly by linking economic and social data. It brings together economic and environmental information, and permits us to talk about the environment in the same language as economics. It can complement other environmental statistics, particularly those relating to the state of the atmosphere and climate as produced by the Environmental reporting series.&lt;\/p&gt;\n&lt;h2&gt;Driver-pressure-state-impact-response framework&lt;\/h2&gt;\n&lt;p&gt;There is high demand for good statistics that can support the measurement and analysis of the drivers of the social and economic consequences of climate change, and the related mitigation and adaptation measures (UN, 2008, as cited in Schenau, 2009).&lt;\/p&gt;\n&lt;p&gt;Figure 3 shows which accounts from the environmental-economic accounting framework provide information on the drivers, pressures, impacts, and responses that can complement information on the state of atmosphere and climate (eg concentrations of emissions, temperature, and weather events) available through environmental reporting (MfE &amp;amp; Stats NZ, 2017).&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Figure 3&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;&lt;img width=\&quot;1280\&quot; height=\&quot;720\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Environmental-economic-accounts-2019\/Download-data\/fig3-DPSIR.png\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-data-to-2017#fig3\&quot;&gt;Text alternative for figure 3&lt;\/a&gt;&lt;\/p&gt;\n&lt;p&gt;Pressures on the atmosphere and climate stem from greenhouse gas emissions, which are driven by economic activity, population changes, and land use choices (figure 3). The resulting concentrations of atmospheric pollutants determine changes in climate, which may in turn affect economic activity through drought, changes in growing conditions, and availability of natural resources. Societal responses can be measured in the SEEA by assessing the extent and distribution of environmental taxes, emissions permits, and fossil fuel subsidies.&lt;\/p&gt;\n&lt;p&gt;The following Stats NZ accounts enable connections between pressure, impact, and response to be drawn.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;greenhouse gases by industry and households&lt;\/li&gt;\n&lt;li&gt;timber physical asset and carbon accounts&lt;\/li&gt;\n&lt;li&gt;environmental taxes.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;h2&gt;Greenhouse gases by industry and households&lt;\/h2&gt;\n&lt;p&gt;Estimates of greenhouse gas emissions by industry and households use data from MfE\u2019s Greenhouse Gas Inventory to show which industries are contributing to emissions, as well as the direct contribution of households. It also separates the contribution of non-residents and identifies the impact of New Zealand\u2019s activities overseas.&lt;\/p&gt;\n&lt;h2&gt;Timber physical asset and carbon accounts&lt;\/h2&gt;\n&lt;p&gt;The timber physical stock account presents information on the timber stocks available and not available for wood supply, with monetary values of the stock available for exotic stocks. The timber accounts relate closely to carbon stock accounts and the ecosystem services of carbon sequestration and storage. Changes in timber stocks, from additions and removals, affect carbon sequestration and therefore, the net flow of greenhouse gases to the atmosphere.&lt;\/p&gt;\n&lt;p&gt;The accounts can be used to understand the drivers or impacts of climate change: availability and harvest of timber stocks can inform on pressures of atmospheric state, while losses of timber due to increased number of fires from climate change will also be recorded in the timber stock account.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28254&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 4&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;div style=\&quot;background-color: #f6f6f6; padding: 30px;\&quot;&gt;\n&lt;h2&gt;Measuring emissions: production and consumption perspectives&lt;\/h2&gt;\n&lt;p&gt;Three main approaches are used to measure greenhouse gases at the national level:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;territorial production approach&lt;\/li&gt;\n&lt;li&gt;production approach&lt;\/li&gt;\n&lt;li&gt;consumption approach.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;The territorial approach is required for reporting under the United Nations Framework Convention on Climate Change (UNFCCC) framework, and measures all human-caused emissions that occur within a territory. The production approach, based on the SEEA framework, aligns the measurement of emissions with economic production by attributing emissions to the resident economic unit, including activity that takes place overseas, at the point of emission. This allows for the comparisons of industry output and emissions. The consumption approach associates a \u2018carbon footprint\u2019 to the consumption of final goods and services, such as household consumption, government expenditure, and investment in physical assets. This is done by measuring the emissions \u2018embodied\u2019 in a good or service throughout the entire supply chain required to get that good to its final use.&lt;\/p&gt;\n&lt;p&gt;Figure 4 shows how consumption-based emissions can be accounted for after factoring the role of emissions embodied in exports and imports to emissions produced and consumed domestically.&lt;\/p&gt;\n&lt;\/div&gt;&quot;},{&quot;ID&quot;:&quot;28260&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 5&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h3&gt;Figure 4&lt;\/h3&gt;\n&lt;p&gt;&lt;img width=\&quot;1198\&quot; height=\&quot;693\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Environmental-economic-accounts-2019\/Download-data\/fig-4-consumption-emissions.png\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-data-to-2017#fig4\&quot;&gt;Text alternative for figure 4&lt;\/a&gt;&lt;\/p&gt;\n&lt;h2&gt;Environmental taxes&lt;\/h2&gt;\n&lt;p&gt;Environmental taxes record the tax payments made by industry and households to government whose tax base is a physical unit (or proxy of a physical unit) of something that has a proven, specific negative impact on the environment, and is identified in the System of National Accounts as a tax. Examples include fuel taxes, waste levies, and taxes on the extraction of raw materials. These taxes are often interpreted as a societal response to environmental damage. Adjustments to behaviour from taxation in turn affect drivers, pressures, and states.&lt;\/p&gt;\n&lt;h2&gt;Other accounts&lt;\/h2&gt;\n&lt;p&gt;Other accounts provide relevant information for climate change and the transition to a low-emissions economy (table 2). Asset accounts for timber, water, and fish will enable the impacts of climate change on natural resources to be tracked over time (eg forest fires or changes in water availability). Climate change may affect the extent or condition of ecosystems that provide ecosystem services. Some accounts have yet to be fully developed. This report outlines how existing accounts can be combined with the following accounts to form a richer understanding of the transition to the low emissions economy in an SEEA framework:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;energy physical flows&lt;\/li&gt;\n&lt;li&gt;timber physical flows&lt;\/li&gt;\n&lt;li&gt;emissions permits&lt;\/li&gt;\n&lt;li&gt;subsidies&lt;\/li&gt;\n&lt;li&gt;ecosystem accounts.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;The SEEA approach also allows for close comparisons with drivers of emissions, such as economic and population growth, given the use of similar concepts and principles (such as domestic production). It can also enable analytical indicators such as emissions intensity to be derived and other information such as consumption-based emissions.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28181&quot;,&quot;Title&quot;:&quot;EEA 2019 - Table 2&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;strong&gt; Table 2&lt;\/strong&gt;&lt;\/p&gt;&lt;table border=\&quot;0\&quot; cellspacing=\&quot;0\&quot; cellpadding=\&quot;0\&quot; style=\&quot;width: 100%;\&quot;&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;648\&quot; colspan=\&quot;6\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot;&gt;&lt;strong&gt;SEEA accounts relevant for climate change in New Zealand, 2019&lt;\/strong&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;78\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtabletext-leftaligned\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;227\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtabletext-leftaligned\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;76\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot; align=\&quot;center\&quot;&gt;Available&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;104\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot; align=\&quot;center\&quot;&gt;Under development&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;85\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot; align=\&quot;center\&quot;&gt;Not available&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;79\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot; align=\&quot;center\&quot;&gt;Relevance&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;78\&quot; valign=\&quot;top\&quot;&

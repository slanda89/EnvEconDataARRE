h SEEA definitions these data would be adjusted to account for imports and exports and alignment to ANZSIC (UN, 2016). For example, fuel use by residents not on the territory (eg international flights departing overseas) would be included in the SEEA energy accounts but not in the energy balance tables. These adjustments would enable alignment to the GHG by industry and household account and wider economic statistics.&lt;\/p&gt;\n&lt;p&gt;The general structure of energy physical flow accounts is shown in &lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#appendixa2\&quot;&gt;appendix&amp;nbsp;table A1&lt;\/a&gt;. These accounts can also be compiled in monetary terms, which may show the significance of energy costs in relation to other expenditures, and therefore whether an industry has the capacity or constraints to reduce emissions.&lt;\/p&gt;\n&lt;p&gt;Energy accounts could also be used to derive indicators, such as carbon dioxide productivity, or enable further decompositions that illustrate the drivers of emissions intensity to be developed (such as the role of energy intensity and fuel mix).&lt;\/p&gt;\n&lt;\/div&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;h2&gt;Electricity and gas supply&lt;\/h2&gt;&lt;p&gt;Emissions from the electricity and gas supply industry showed a significant downward trend from 2007\u201317, decreasing 5.3 percent a year (figure 21), and showing the greatest reduction in emissions. This was largely driven by the increasing proportion of electricity generated using renewable resources such as hydro, geothermal, and wind.&lt;\/p&gt;&lt;p&gt;Hydro generation has remained relatively steady at around 55 percent of total electricity generation, but total generation from renewables increased from 68 percent to 86 percent over the period. This increase was driven mainly by increases in geothermal generation.&lt;\/p&gt;&lt;h3&gt;Figure 21&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27717&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Electricity and gas supply, CO2-e emissions and percent of electricity generation by renewables, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Kilotonnes&quot;,&quot;yAxisDualRightTitle&quot;:&quot;Percent&quot;,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7893,&quot;Title&quot;:&quot;Renewable energy share&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;column&quot;,&quot;GraphCsvData&quot;:&quot;Description,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nRenewable energy share,68,65,67,73,76,75,73,77,79,82,86\r\n&quot;},{&quot;ID&quot;:7896,&quot;Title&quot;:&quot;Electricity and gas supply&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Description,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nElectricity and gas supply,8055,9409,7280,6543,6028,7434,6213,5347,5181,4176,4696\r\n&quot;}],&quot;GraphType&quot;:&quot;dualAxis&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Electricity and gas supply, CO2-e emissions and percent of electricity generation by renewables, 2007\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ; Ministry of Business, Innovation, and Employment&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28311&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 21&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Emissions from electricity and gas supply are new to this release. In &lt;em&gt;Environmental-economic accounts: 2018&lt;\/em&gt;, emissions were only available for the electricity, gas, water, and waste services industry. Electricity and gas supply emissions account for 5.7 percent of total emissions, while emissions from water, sewerage, drainage, and waste services account for 2.2 percent. Most of the decrease in emissions from the electricity, gas, water, and waste services industry came from electricity and gas supply. However, water, sewerage and drainage service emissions decreased at a rate of 2.3 percent a year from 2007\u201317.&lt;\/p&gt;&lt;p&gt;Increased emissions in electricity and gas supply in 2008 and 2012 may correspond with dry years, which led to the increased use of generation from non-renewable sources. The water physical stock account shows decreases in precipitation in the June years 2008 and 2012. Generation from hydro was at the low end of seasonal expectations for the June 2008 and 2012 quarters, while generation from coal and gas increased.&lt;\/p&gt;&lt;p&gt;Increased use of renewable energy sources contributed to the decline in emissions in the electricity and gas supply industry, but total energy emissions (SEEA basis) has remained constant since 2007, given increasing energy use and emissions in other industries (figure 22). Data from the energy balance tables (MBIE, 2018) shows the share of electricity to total energy produced for consumption remained at about 25 percent over time. Electrification of energy for activities such as transport, use&amp;nbsp;of renewable energy sources, and improved energy efficiency of appliances and other products may affect the energy emissions profile in time.&amp;nbsp;&lt;\/p&gt;&lt;h3&gt;Figure 22&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27635&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Emissions from energy sources, carbon dioxide, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Kilotonnes&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7853,&quot;Title&quot;:&quot;Emissions from energy sources, carbon dioxide, 200&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;year,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nElectricity and gas supply,7698,9045,6914,6189,5661,7055,5842,4949,4774,3777,4294\r\nOther industries and households,26491,26491,25392,25944,25802,26157,26681,27668,28037,27950,29254\r\nTotal,34189,35535,32306,32132,31463,33212,32523,32617,32812,31727,33548\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Emissions from energy sources, carbon dioxide, 2007\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:null,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28314&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 22&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Household emissions&lt;\/h2&gt;&lt;p&gt;Emissions by New Zealand\u2019s households increased 19.3 percent from 2007\u201317, contributing 11 percent to total emissions in 2017 (figure 23). This led to household\u2019s contribution increasing from 9 to 11 percent of total emissions. Direct emissions by households include:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;road transport&lt;\/li&gt;\n&lt;li&gt;heating and cooling \u2013 include direct fuels burnt (eg wood for heating, and refrigerants for cooling)&lt;\/li&gt;\n&lt;li&gt;other sources \u2013 primarily household use of septic tanks.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;Carbon dioxide is the predominant gas emitted by households, mainly from road transport. However, in addition to methane and nitrous oxide, households also emit hydrofluorocarbons from mobile air conditioning, metered dose inhalers and refrigerants.&lt;\/p&gt;&lt;p&gt;Road transport accounts for most direct emissions by households, accounting for 89.1 percent in 2017. Use of fuels for heating and refrigerants for cooling accounted for a further 7.7 percent, and other sources 3.2 percent. Household emissions (up 19.3 percent from 2007\u201317) increased at a faster rate than the number of households, particularly from 2012 (up 9.7 percent from 2007\u201317). This implies households are less efficient at managing direct emissions.&lt;\/p&gt;&lt;p&gt;The census night count of occupied dwellings increased 0.9 percent a year from 2006\u201313, and 1.6 percent a year from 2001\u201306 (Stats NZ, 2013a). Population projections show household numbers are expected to continue growing 0.9 percent a year between 2018 and 2038 in line with changes in living arrangements.&lt;\/p&gt;&lt;p&gt;The census definition of a household is either one person who usually lives alone, or two or more people who usually live together and share facilities (such as for eating or cooking) in a private dwelling. In 2013, the average household size in New Zealand was 2.7 people per household, the same as in 2006. In 2013, most households consisted of one or two people, with households with one or two usual residents making up over half of New Zealand households. This showed little change since 2001 (Stats NZ, 2013b).&lt;\/p&gt;&lt;h3&gt;Figure 23&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27638&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Direct CO2-e emissions from households and number of households, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Index&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7856,&quot;Title&quot;:&quot;Direct CO2-e emissions from ho&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,        2007,        2008,        2009,        2010,        2011,        2012,        2013,        2014,        2015,        2016,        2017\r\nHouseholds,1000,1012,1020,1027,1034,1041,1049,1059,1070,1083,1097\r\nCarbon dioxide equivalents,1000,1033,1046,1057,1061,1052,1082,1102,1135,1159,1193\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Direct CO2-e emissions from households and number of households, 2007\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28317&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 23&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Households use vehicles mainly for domestic use (eg commuting), but the share of emissions attributable to tourism within New Zealand has increased in recent years. Figure 24 shows how household use of vehicles for domestic tourism purposes reached 1,240 kilotonnes in 2017 and accounted for 15.6 percent of total household road transport emissions.&lt;\/p&gt;&lt;h3&gt;Figure 24&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27641&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Household road transport emissions, for domestic and tourist purposes, CO2-e, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Kilotonnes&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7859,&quot;Title&quot;:&quot;Household road transport emissions, for domestic a&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nTourism,903,837,739,906,949,845,859,905,1008,1203,1240\r\nDomestic,5592,5958,6069,6071,6042,6070,6289,6379,6491,6485,6687\r\nTotal,6495,6794,6808,6976,6991,6915,7148,7285,7499,7688,7927\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Household road transport emissions, for domestic and tourist purposes, CO2-e, 2007\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28320&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 24&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Direct emissions by households capture those directly attributable to households from production. This does not capture indirect emissions associated via the purchase of goods, either produced domestically or internationally, or using energy via the grid. Previous estimates of New Zealand&#039;s consumption measure have focused on household consumption, breaking it down into income groups (Kerr &amp;amp; Allan, 2014). This can provide insight into the behaviour of different income groups, the effect that emissions pricing may have on different households, and their ability to change behaviour (eg affordability of electric vehicles).&lt;\/p&gt;&lt;h2&gt;International comparisons&lt;\/h2&gt;&lt;p&gt;For the 38 countries for which comparable data were available for 2008\u201315, growth in emissions by New Zealand households were among the highest (up 9.2 percent). This was surpassed only by Russian Federation, Czechia, Latvia, Australia, Estonia, Bulgaria, and Romania (figure 25). On average, households contributed 16.2 percent to total emissions in 2015.&lt;\/p&gt;&lt;h3&gt;Figure 25&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27644&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Percent change in household emissions by country, CO2-e, 2008\u201315&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:&quot;Country&quot;,&quot;yAxisTitle&quot;:&quot;Percent change&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7862,&quot;Title&quot;:&quot;Percent change in household emissions by country, &quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;column&quot;,&quot;GraphCsvData&quot;:&quot;Country,Greece,Lithuania,Ukraine,Malta,Portugal,Finland,Ireland,South Korea,Denmark,Italy,Slovenia,Netherlands,United Kingdom,Hungary,Croatia,Sweden,Spain,Japan,France,Germany,Switzerland,Luxembourg,Belgium,Norway,Austria,United States,Cyprus,Turkey,Slovakia,Poland,New Zealand,Romania,Bulgaria,Estonia,Australia,Latvia,Czechia,Russian Federation\r\nChange in emissions 2008-15,-0.303889284,-0.271146718,-0.251628261,-0.216420739,-0.181634012,-0.177334156,-0.170888315,-0.163927667,-0.148639392,-0.138324913,-0.12012447,-0.117018068,-0.113158899,-0.108664183,-0.09923841,-0.099236508,-0.093903638,-0.086130931,-0.083931996,-0.076020303,-0.073092157,-0.068189648,-0.061649161,-0.04758386,-0.039840461,-0.034049894,-0.031708315,-0.019199732,0.0069166023,0.0140178754,0.091561731,0.1046253438,0.1191221222,0.1226542288,0.1240497671,0.1513138133,0.1546136115,0.2707901015\r\n&quot;}],&quot;GraphType&quot;:&quot;columnStacked&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Percent change in household emissions by country, CO2-e, 2008\u201315&quot;,&quot;showLegend&quot;:false,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28323&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 25&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Tourism emissions&lt;\/h2&gt;&lt;p&gt;The SEEA approach identifies and allocates emissions according to the residence of the business or household, and so accounts for the following emissions.&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;Emissions on domestic territory by non-residents, such as international tourists hiring campervans, are excluded. These emissions are implicitly included in the Greenhouse Gas Inventory in the energy sector.&lt;\/li&gt;\n&lt;li&gt;Emissions by residents not on the territory, such as international air and shipping transport by New Zealand companies. These are outside the scope of the Greenhouse Gas Inventory.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;Tourism, which entails activity across many service industries (particularly rental and hiring services, transport, accommodation, and arts and recreation), makes a significant contribution to GDP. Tourism generated a direct contribution of $15.9 billion to GDP in the year ended March 2018, or 6.1 percent of GDP (Stats NZ, 2018). Total tourism expenditure amounted to $39.1 billion, of which $16.2 billion was from international tourism expenditure. International demand for retail sales of&amp;nbsp;fuel and other automotive products totalled $680 million in 2018. Petrol, diesel, and other fuels purchased by international tourists accounted for 6.3 percent of total supply in 2018.&lt;\/p&gt;&lt;p&gt;Tourism emissions, primarily from fuels used for road transport, amounted to 1,153 kilotonnes of carbon dioxide equivalents in 2017, up 20.0 percent since 2007. These emissions equated to 1.4 percent of the Greenhouse Gas Inventory total gross emissions. Emissions from fuel used for road transport amounted to 7.8 percent of total road transport emissions. Fuel expenditure by tourists is mainly on diesel, which has a higher emissions factor than petrol. This means the relative contribution of tourism emissions from road transport per dollar spent is higher.&lt;\/p&gt;&lt;p&gt;Information on emissions from international tourists reflects growth in the average number of visitors in New Zealand since 2007 (figure 26). The average number of visitors in New Zealand per day increased 38.3 percent from 2007\u201317, to an average of 188,168 in 2017. Average length of stay decreased, but this does not seem to be affecting emissions, suggesting more intensive use of road transport per day.&lt;\/p&gt;&lt;h3&gt;Figure 26&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27647&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 CO2-e emissions from international tourists, average number of visitors per day and days of stay in New Zealand, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Index&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7865,&quot;Title&quot;:&quot;CO2-e emissions from international tourists, avera&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nAverage number of visitors,1000,1031,1001,1016,1032,988,1024,1127,1212,1331,1383\r\nAverage days of stay,1000,1034,1014,995,984,943,950,978,966,943,913\r\nInternational tourist emissions,1000,872,928,942,805,792,822,977,1096,1140,1200\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;CO2-e emissions from international tourists, average number of visitors per day and days of stay in New Zealand, 2007\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28326&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 26&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Factors that may contribute to emissions from tourists include:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;preferences and reasons for travel&lt;\/li&gt;\n&lt;li&gt;availability of substitutes (eg electric vehicles or other transport modes).&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;Estimates of the average number of visitors to New Zealand include those entering via cruises who are less likely to hire vehicles. About 8 percent of visitors arrived in New Zealand via cruise ships. Emissions from cruise ships are not accounted for in the greenhouse gases by industry and households account as the cruise operators are not New Zealand resident companies. New Zealanders\u2019 emissions overseas are also not accounted for, due to the absence of information on overseas fuel use. This may represent a growing data gap, as New Zealand residents\u2019 departures increased steadily from 2007\u201317.&lt;\/p&gt;&lt;p&gt;Direct emissions from tourism also arise from New Zealand households\u2019 use of vehicles within the country. Figure 27 shows New Zealand household emissions using road transport for tourism follow those from international tourists.&lt;\/p&gt;&lt;h3&gt;Figure 27&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27650&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Emissions from households and international visitors using road transport for tourism, CO2-e, 2007\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Kilotonnes&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7868,&quot;Title&quot;:&quot;Emissions from households and international visito&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nHouseholds,903,837,739,906,949,845,859,905,1008,1203,1240\r\nInternational tourists,944,821,875,889,759,746,774,919,1031,1072,1128\r\nTotal,1847,1658,1614,1794,1707,1592,1633,1825,2039,2275,2368\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Emissions from households and international visitors using road transport for tourism, CO2-e, 2007\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO2-e = carbon dioxide equivalent&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28329&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 27&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;The emissions reflect those directly attributable to international and domestic tourists who use road transport. They do not include indirect emissions associated with travel (such as through accommodation), or other energy use, or other modes of travel (such as water or rail).&lt;\/p&gt;&lt;p&gt;Emissions from accommodation and food services; transport, postal, and warehousing; and recreation services could, with development, be allocated to tourism. Estimating consumption-based emissions may further identify the role of tourism on emissions, particularly by assessing the contribution of tourism to the emissions from accommodation and food services; transport, postal, and warehousing; and recreation services industries.&lt;\/p&gt;&lt;p&gt;Emissions by tourism related to other transport forms are likely to be significant. The rail, water, air and other transport industry accounted for 5.5 percent of total carbon dioxide equivalent emissions in 2017. The consumption-based approach would consider emissions from the perspective of residence of the passenger, rather than the operator, which will be particularly significant for aviation.&lt;\/p&gt;&lt;p&gt;The United Nations World Tourism Organisation (nd) provides some guidance on how energy, water, waste, and greenhouse gas accounts for tourism may be compiled. A tourism account for greenhouse gas emissions would include the total emissions of those industries that have a high contribution to tourism, along with a breakdown of the emissions specifically allocated to tourism within those industries. Industries related to tourist activity include the accommodation and food services; transport, postal and warehousing; and arts and recreation. An example of the information which may be shown in a full greenhouse gas tourism account is shown in &lt;a href=\&quot;http:\/\/www.stats.govt.nz\/information-releases\/environmental-economic-accounts-2019-data-to-2017#appendixa2\&quot;&gt;appendix&amp;nbsp;table A2&lt;\/a&gt;.&lt;\/p&gt;&lt;h2&gt;&lt;a name=\&quot;carbon\&quot;&gt;&lt;\/a&gt;Carbon sequestration and the role of forestry&lt;\/h2&gt;&lt;p&gt;The previous section discussed the pressures placed by industries and households in producing emissions. These emissions can be offset through carbon sequestration, the process by which carbon dioxide is removed from the atmosphere. Forests play a key role in sequestering carbon in New Zealand, particularly fast-growing cultivated forests, planted with the primary purpose of provisioning timber.&lt;\/p&gt;&lt;p&gt;In 2017, the forestry and logging industry accounting for 0.6 percent of GDP in 2017. Forestry activity, however, spans both the forestry and agriculture industries. The agricultural production survey shows 89.8 percent of agricultural land defined as plantations of exotic trees intended for harvest was operated by units classified to the forestry industry in the year ended June 2017. The balance was spread across the sheep, beef cattle, and grain farming, and dairy cattle industries. Of agricultural land under harvested exotic forest area awaiting restocking, 83.4 percent of respondents were in forestry and the balance again spread across the sheep, beef cattle, and grain farming, and dairy cattle industries.&lt;\/p&gt;&lt;p&gt;Furthermore, using harvested wood products (HWP) also plays an important role in determining the rate at which carbon captured in timber is returned to the atmosphere. The role of HWP in carbon sequestration is important to consider, given that patterns in wood consumption are influenced by the demand from industries and final users.&lt;\/p&gt;&lt;p&gt;This section discusses the extent and trend of carbon sequestration in forests and the role of timber resource use on carbon sequestration. We use the accounting approach to environmental assets to show the change in timber stocks due to additions (eg natural growth), removals (eg harvesting), and the net effect of other changes (eg forest fires). Recording both the additions and reductions that contribute to a net change in the stock is important to understand what may be driving this change, and where meaningful interventions could be made. The amount of carbon stored in forests can be presented in a similar format and compared to data from the timber stock account. This approach also allows information on carbon sequestration (either from forests or the harvested wood product pool) to be integrated with information on timber stocks and flows.&lt;\/p&gt;&lt;h2&gt;Carbon sequestration in forests&lt;\/h2&gt;&lt;p&gt;Net emissions of greenhouse gases account for the emissions and removals from land use, land-use change, and forestry (LULUCF). Emissions in the LULUCF sector are caused mainly by the harvesting of timber, deforestation, the decomposition of organic matter, and losses from the pool of HWP. Removals occur primarily from carbon sequestration due to plant growth and increases in the size of the HWP carbon pool.&lt;\/p&gt;&lt;p&gt;The LULUCF sector offset nearly one-third of New Zealand\u2019s gross emissions in 2017, as measured in the Greenhouse Gas Inventory (MfE, 2019). However, the net carbon dioxide equivalent sequestered by the LULUCF sector decreased 23.1 percent from 1990\u20132017, from 31,162 kilotonnes in 1990 to 23,958 kilotonnes in 2017. This decrease was largely driven by an increase in timber harvesting, deforestation, and a reduced rate of tree planting. This contributed to an increase in net emissions by 64.9 percent over the period, in contrast to a 23.1 percent increase in gross emissions. Of the emissions sequestered from LULUCF in 2017, 79 percent (18,905 kilotonnes of carbon dioxide equivalent) was from forest land. Given the significance of LULUCF in New Zealand\u2019s emissions profile, understanding the extent and capacity for forestry to offset gross emissions is essential for tracking progress towards net emissions targets.&lt;\/p&gt;&lt;div style=\&quot;background-color: #f6f6f6; padding: 30px;\&quot;&gt;\n&lt;h2&gt;From tonnes of carbon dioxide equivalents to tonnes of carbon&lt;\/h2&gt;\n&lt;p&gt;The mass of carbon in the atmosphere is measured in tonnes of carbon dioxide. However, when carbon is sequestered it is stored in a solid or liquid form, and its mass is measured in tons of carbon.&lt;\/p&gt;\n&lt;p&gt;The conversion of carbon to carbon dioxide is based on relative atomic weights. One tonne of carbon is equal to 3.67 tonnes of carbon dioxide.&lt;\/p&gt;\n&lt;\/div&gt;&lt;p&gt;&amp;nbsp;&lt;\/p&gt;&lt;p&gt;While a large amount of carbon is stored in natural old-growth (primary) forests (2.6 million kilotonnes in 2017), little additional carbon is being sequestered as forests have reached a steady state (ie there is no growth in the carbon pool). The sequestration that does occur in natural forests is largely from biomass growth in regenerating forests (figure 28). In contrast, while cultivated forests have much lower carbon stock values (502,893 kilotonnes in 2017), they sequester a large amount of carbon each year.&lt;\/p&gt;&lt;p&gt;These plantation forests are largely made up of fast-growing exotic trees, which capture a lot of carbon in their biomass. In 2017, cultivated forests sequestered a net of 3,591 kilotonnes of carbon, while natural forests sequestered 1,565 kilotonnes of carbon. The sequestration in cultivated forests has generally been declining since 1995, largely due to an increase in deforestation and the harvesting of timber.&lt;\/p&gt;&lt;h3&gt;Figure 28&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27729&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Change in forest carbon stocks (carbon sequestration), 1995\u20132017&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Carbon sequestered (kt C)&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7905,&quot;Title&quot;:&quot;Change in forest carbon stocks (carbon sequestrati&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nCultivated timber - biomass,6331.5,6096,6225.8,6714.8,6812.6,6416,6216.4,5350,5789,6028.1,5856.4,5303.1,4830.5,6948.4,6386.9,6115.7,4576.3,4138.3,3133.3,3908.4,4198.3,3855,3749.5\r\nCultivated timber - soil,-504,-521.6,-529.7,-531.1,-524.5,-517.1,-507.4,-489,-467.9,-440.2,-413.9,-391.7,-375.5,-365.6,-354.9,-351.5,-353.4,-336.6,-307.7,-258.6,-223.6,-184.9,-158.7\r\nNatural forest - biomass,1501,1510.7,1495.7,1492.2,1491.3,1489.3,1501.9,1490.2,1489.8,1491,1505.5,1496.7,1499.9,1654.5,1427.7,1502.1,1612.5,1605,1534.9,1641.5,1593.7,1646,1587.1\r\nNatural forest - soil,-14.7,-14.7,-14.7,-15.2,-15.6,-16.5,-17.3,-18.1,-19.1,-20.4,-22,-23.7,-25.8,-25.7,-25.6,-25.4,-25.1,-24.9,-24.2,-23.7,-22.9,-22.5,-22\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Change in forest carbon stocks (carbon sequestration), 1995\u20132017&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;Carbon sequestration includes emissions from deforestation (land-use change).&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28340&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 28&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Timber harvesting and carbon sequestration&lt;\/h2&gt;&lt;p&gt;The large contribution to carbon sequestration from cultivated forests occurs primarily because carbon sequestered in biomass exceeds carbon emissions from soil and harvesting for timber resources. The annual growth in timber volume rose steadily from 1995, reaching 38.7 million cubic metres in 2017. The total volume of timber removed from cultivated forests each year increased steadily from 2005\u201312, after which it levelled out. In 2017, the recoverable volume of harvested timber reached its highest level, at 26.5 million cubic metres. This difference between growth and harvesting allowed for the standing stock of cultivated timber to more than double from 1995\u20132017, increasing from 232.6 million cubic metres to 486.8 million cubic metres.&lt;\/p&gt;&lt;p&gt;From 2007\u201317, the volume of timber harvested each year increased at a faster rate than the yearly increases in timber growth. The increase in harvesting has also contributed to a decrease in the carbon sequestered in planted forest stands. The net carbon sequestered per hectare by planted forests each year decreased 19.1 percent from 2007\u201317.&lt;\/p&gt;&lt;h2&gt;Rate of planting, forest age class, and harvesting rates&lt;\/h2&gt;&lt;p&gt;The rate of harvesting in cultivated forests depends largely on the timing of planting and subsequent age class of forests. A large amount of new tree planting took place in the 1990s. This allowed for a steady increase in the volume of cultivated timber available for (future) harvesting over this time.&lt;\/p&gt;&lt;p&gt;The rate of new planting decreased significantly after the boom in the early 1990s, reaching a low of 1,900 new hectares planted in 2009 (figure 29). Additionally, the area of forest harvested exceeded the area re-stocked every year from 1995-2017 (apart from in 2005), as forest land was replaced for other land uses (eg farming). This has resulted in a general decrease in the total area of cultivated forests, from 1.82 million hectares in 2002 to 1.72 million hectares in 2017.&lt;\/p&gt;&lt;p&gt;Radiata pine accounted for 90 percent of cultivated forest area in 2017. Radiata pine stands take about 28 years to reach their harvestable age. Due to the high rate of planting that began in the early 1990s, a lot of these planted trees are expected to reach their harvesting age soon, in what has been termed as \u2018the wall of wood\u2019. As these forest stands reach their age of harvesting, the rate of harvesting is expected to increase.&lt;\/p&gt;&lt;h3&gt;Figure 29&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27741&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Area of cultivated forests \u2013 new planting, harvesting, and restocking of timber, 1995\u20132017&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Area (Ha)&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7914,&quot;Title&quot;:&quot;Area of cultivated forests \u2013 new planting, harvest&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nNew planting,98188,73859,83596,63652,51201,39988,33630,30100,22124,19864,10595,6013,2600,2419,1900,4300,6000,11700,11665,3159,2375,2891,2270\r\nRestocking,24999,26335,28214,29750,29931,29725,35671,35803,39576,38234,39609,34564,34399,34687,31408,32478,35211,44388,39978,40867,39823,39948,40580\r\nHarvesting,29301,31240,32146,31580,34076,37214,40710,47055,42836,38546,38846,41946,41817,41632,43059,43379,44297,48734,47027,46854,45791,48681,47620\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Area of cultivated forests \u2013 new planting, harvesting, and restocking of timber, 1995\u20132017&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:null,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28343&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) 29&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;The decrease in the rate of new planting since the 1990s has resulted in an uneven distribution in the age class of planted forests. The distribution of forest area by age class for 2018 is shown in figure 30. The large area of trees in the 21\u201325 age class will soon reach harvesting age. The decrease in forest area stands aged 26 years and over was due to harvesting.&amp;nbsp;&lt;\/p&gt;&lt;h3&gt;Figure 30&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27744&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Area of cultivated forest by age class, radiata pine and all other species, 2018&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:&quot;Age class (years)&quot;,&quot;yAxisTitle&quot;:&quot;Area (Ha)&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7917,&quot;Title&quot;:&quot;Area of cultivated forest by age class, radiata pi&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;column&quot;,&quot;GraphCsvData&quot;:&quot;Age class (years),1-5,6-10,11-15,16-20,21-25,26-30,31-35,36-40,41-50,51-60,61-80\r\nOther species,12155.3,16997.8,21451.6,44665,34351.9,11259.6,12873.2,9736,5947.5,2523,1530\r\nRadiata pine,206910.5,208408.5,190003.7,293798.7,435417.8,130160.2,55570.8,20163.4,9838.4,1174.8,538\r\n&quot;}],&quot;GraphType&quot;:&quot;columnStacked&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Area of cultivated forest by age class, radiata pine and all other species, 2018&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;Data is republished from the NEFD, as at 30 April 2018 (MPI 2019).&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28346&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 30&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;strong&gt;1 July 2019&lt;\/strong&gt;: The version of figure 30 published on 27 June 2019 had incorrect x-axis labels (showing age class (years)). The first three columns from the left were labeled 1-May, 6-Oct, and Nov-15. We&#039;ve corrected these to 1-5, 6-10, and 11-15, respectively.&lt;\/p&gt;&lt;h2&gt;Potential implications for carbon sequestration in forests&lt;\/h2&gt;&lt;p&gt;If the rate of harvesting increases as more planted forest stands reach maturity, the amount of carbon sequestered in planted forests will likely decrease. The rate of harvesting of timber when it reaches a suitable age will likely depend on a number of factors. These include the necessary infrastructure required to access mature forest sites and the current price of timber. Other factors, such as the price of dairy products, may also influence if harvested timber land will be restocked, or converted to other more economically desirable land uses. Additionally, the price of New Zealand units of carbon sequestered under the Emissions Trading Scheme and initiatives such as the One Billion Trees Fund may also influence afforestation and harvesting rates.&lt;\/p&gt;&lt;h2&gt;Use of timber resources in the economy&lt;\/h2&gt;&lt;p&gt;Understanding the final use of timber products, as well as the rates of timber harvest, will be important for tracking progress towards a low-emissions economy. SEEA\u2019s physical flow account for timber products records the supply and use of timber products within the economy (eg from the forestry and agriculture industries to wood and paper products, printing, construction, and furniture manufacturing) and the role of imports and exports. This can be a useful tool to understand how timber products are being used, and the implications this use may have for long-term carbon sequestration as the amount of sequestration from harvested wood products depends on its final product use. The physical flow account for timber products is currently an area for future development.&lt;\/p&gt;&lt;p&gt;When timber is harvested, the carbon it has sequestered is not immediately released back to the atmosphere. While there are some losses, most of the carbon remains in the wood, entering the carbon pool of harvested wood products (HWP). The HWP carbon pool includes wood from domestic production and wood for export. As the harvesting of timber increases, the net sequestration in forests will tend to decrease. The carbon stored in harvested timber then enters the carbon pool of HWP, which will then tend to increase (figure 31). The HWP pool makes a large contribution to the removals of carbon dioxide from the LULUCF sector, accounting for a net removal -6,518.5 kilotonnes carbon dioxide equivalents in 2017.&lt;\/p&gt;&lt;p&gt;The sequestration of carbon in the HWP pool will depend on the rate of harvest and the estimated lifespan of a given timber product before it is discarded. The type of product harvested timber is converted to, and the efficiency in which this is done, can have an important influence on the net carbon sequestration from HWP.&lt;\/p&gt;&lt;h3&gt;Figure 31&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27747&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Carbon sequestration in cultivated forests and harvested wood products, 1995\u20132017&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Carbon sequestered (kt C)&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7920,&quot;Title&quot;:&quot;Carbon sequestration in cultivated forests and har&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nCultivated forests,5827.5,5574.4,5696.1,6183.7,6288.1,5898.9,5709,4861,5321.1,5587.9,5442.5,4911.4,4455,6582.8,6031.9,5764.2,4223,3801.7,2825.7,3649.8,3974.7,3670.1,3590.8\r\nHarvested wood products,1273.7,1237.3,1289.1,908.9,1280.9,1435.3,1627.1,1822.9,1667.4,1369.5,1259.3,1241.4,1265.2,1150.4,1360.5,1751.9,1922,2064.4,2353,2212.6,1766.3,1891.9,1777.8\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Carbon sequestration in cultivated forests and harvested wood products, 1995\u20132017&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;Sequestration in cultivated forests includes emissions from soil and deforestation.&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28349&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 31&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;div style=\&quot;background-color: #f6f6f6; padding: 30px;\&quot;&gt;\n&lt;h2&gt;Carbon sequestration in harvested wood products&lt;\/h2&gt;\n&lt;p&gt;The net change in the carbon pool of harvested wood products is the difference between gains (from the immediate harvesting of timber which adds more timber to the pool of harvested wood products) and losses (from the decay of timber products) (figure 32).&lt;\/p&gt;\n&lt;p&gt;Losses are determined by the life cycle of timber products. While the timber is in use, its carbon remains locked up. However, once the wood product is no longer in use it will often end up in landfills or be burned, causing the carbon to be released back to the atmosphere (although some timber products are recycled).&lt;\/p&gt;\n&lt;p&gt;The life cycle of a given timber product is determined by an estimated half-life. This represents the rate of \u2018&lt;strong&gt;decay&lt;\/strong&gt;\u2019 at which half the carbon sequestered in a timber product is assumed to be lost.&lt;\/p&gt;\n&lt;p&gt;Different types of timber products have different half-lives. For example, sawnwood assumes a half-life of 35 years while paper and paperboard products have a half-life of two years (IPCC, 2014).&lt;\/p&gt;\n&lt;p&gt;Data on harvested wood products is taken from the New Zealand Greenhouse Gas Inventory (MfE, 2019). The approach and calculations we used are consistent with their reporting.&lt;\/p&gt;\n&lt;\/div&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;h4&gt;Figure 32&lt;\/h4&gt;\n&lt;p&gt;&lt;img width=\&quot;732\&quot; height=\&quot;470\&quot; alt=\&quot;\&quot; src=\&quot;\/assets\/Uploads\/Environmental-economic-accounts-2019\/Download-data\/Figure-32.PNG\&quot; loading=\&quot;lazy\&quot; class=\&quot;leftAlone ss-htmleditorfield-file image\&quot;&gt;\n\n&lt;\/p&gt;\n&lt;p&gt;&lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-data-to-2017#fig32\&quot;&gt;Text alternative for figure 32&lt;\/a&gt;&lt;\/p&gt;\n&lt;h2&gt;&lt;a name=\&quot;impacts\&quot;&gt;&lt;\/a&gt;Impacts&lt;\/h2&gt;\n&lt;p&gt;Present levels of carbon dioxide and other greenhouse gases from human activities have already led to climate change, and further increases will lead to further global warming. The environmental-economic accounting approach highlights the impact of climate change on environmental assets, such as timber, water, and fish. Environmental and policy responses to climate change may also lead to changes in ecosystems, land use, and energy sources.&lt;\/p&gt;\n&lt;p&gt;Understanding the impacts of climate change on GDP will also be of interest. National and regional economic accounts are needed for this, but attributing changes in GDP to climate changes requires additional modelling. Frame et al (2018) discuss some examples of how the financial costs of climate change may be related through attributing climate-related events to economic activity.&lt;\/p&gt;\n&lt;p&gt;This section outlines how asset accounts for those produced under the SEEA can be useful for monitoring the impact of climate change on environmental assets.&lt;\/p&gt;\n&lt;h2&gt;Fire and timber stocks&lt;\/h2&gt;\n&lt;p&gt;Fire risks in different parts of the country are likely to increase in the future. The risk for areas already subject to severe fire risk are expected to remain the same. In contrast, areas not currently perceived as high risk may become at risk (such as coastal Otago, the Manawat\u016b area, in and around Wellington, and Whanganui). This may not necessarily result in more fires, but in an increased number of fire-risk days in a season and to the length of that season (Scion &amp;amp; NIWA, 2011).&lt;\/p&gt;\n&lt;p&gt;Fire affects both commercial exotic forestry and native trees on protected land, affecting the stock of wood available for supply or other ecosystem services from forest land. We report on the number of hectares of forest affected by fires annually for cultivated and natural forests. In some cases, wood may be recoverable after a fire if it is able to be promptly harvested. Estimates of the resulting timber loss is not available from the current timber monetary stock account, as estimates for the amount which can be recovered following fire cannot be determined yet.&lt;\/p&gt;\n&lt;p&gt;In 2017, fires affected just an estimated 359 hectares of the total 1.72 million hectares of cultivated forests, which had a total timber stock value of $23.1 billion.&lt;\/p&gt;\n&lt;p&gt;Given the extent of fires and timber that may be recovered, the impact of fire may be more significant for losses of ecosystem services. Losses of carbon in timber from fire can also result in a loss of ecosystem services of carbon sequestration and storage, as well as other regulating or cultural ecosystem services.&lt;\/p&gt;\n&lt;div style=\&quot;background-color: #f6f6f6; padding: 30px;\&quot;&gt;\n&lt;h2&gt;Assessing the impacts of climate change through ecosystem accounts&lt;\/h2&gt;\n&lt;p&gt;Climate change impacts on New Zealand may be observable in future asset accounts but may also be captured in future developments of ecosystem accounts.&lt;\/p&gt;\n&lt;p&gt;Ecosystem accounts include the extent, condition, and services of ecosystems at a defined spatial scale. Ecosystem services reflect the contribution of ecosystems to the benefit of people, and therefore the impact of environmental assets on wellbeing.&lt;br&gt;Ecosystem service flows are classified into three broad categories:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;provisioning services (eg material and energy provided by ecosystems, such as timber, fish, or plants),&lt;\/li&gt;\n&lt;li&gt;regulating services (capacity of ecosystems to control climatic, hydrological, and bio-chemical cycles)&lt;\/li&gt;\n&lt;li&gt;cultural services (eg recreation).&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;The benefits received from ecosystem services may include goods and services produced within the economy and recorded in the system of national accounts (eg timber harvest or fish caught).&lt;\/p&gt;\n&lt;p&gt;Alternatively, they may include non-market benefits which are not covered in the national accounts (eg clean air and carbon sequestration). Both these types of benefits contribute to individual and societal wellbeing.&lt;\/p&gt;\n&lt;p&gt;In the context of climate change, here are how the ecosystem accounts can be useful.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Assess the impact on ecosystem extent, condition, and services in a spatially explicit manner. This allows focus to be given to specific regions which may differ in their climate change impacts (eg changes in rainfall patterns), or to certain ecosystems that may be more susceptible to climate change impacts.&lt;\/li&gt;\n&lt;li&gt;Assess the change in services provided by ecosystems following land use change decisions to mitigate or adapt to climate change (eg forested land).&lt;\/li&gt;\n&lt;li&gt;Assess where climate change impacts occur (eg drought), along with responses intended to mitigate these (eg afforestation), in relation to where people live and the economic activity they depend on.&lt;\/li&gt;\n&lt;li&gt;Enabling decision-making to optimise the range of ecosystem services for a given land use. For example, afforestation with the primary purpose to sequester more carbon may also provide a suite of additional ecosystem services.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;Asset accounts for biodiversity (one of four thematic accounts described in the SEEA experimental ecosystem accounting framework, the others being land, water, and carbon), along with biodiversity indicators within the condition account, may also show the impact of climate change on species sensitive to changes in temperature or other climate conditions.&lt;\/p&gt;\n&lt;p&gt;Bond and Vardon\u2019s (2018) \u2018butterfly accounts\u2019 summarise the number and status of butterflies found in Australia Capital Territory (ACT) and their conservation status. They show how biodiversity accounts can provide indicators of climate change impacts. Between 1978 and 2018, nine species were added to the list of butterflies found in the ACT and to the categories of range extensions and taxonomic change. Most species added came from range extensions, reflecting the changing Canberra landscape where the creation of parks and reserves have increased floristic diversity. Another change in range noted may be driven by climate change with species formerly considered vagrant and migrant, such as the flame sedge-skipper, which established resident populations due to changed weather conditions, specifically milder winters.&lt;\/p&gt;\n&lt;p&gt;In categorising species into generalists or specialists, accounting surrogates for environmental condition emerged. In this context, generalists were defined as having a widespread distribution, several breeding and foraging habitats and\/or several plant species for their larval food plant preferences. Specialists have localised or restricted distribution, one or two breeding and foraging habitats, and only one or two plant species suitable for their larval food plant preferences.&lt;\/p&gt;\n&lt;p&gt;Using this approach, it was suggested that generalists were sufficiently widespread to be useful indicators of climate change, while nominated specialists could be used to track environmental condition for any given habitat.&lt;\/p&gt;\n&lt;\/div&gt;\n&lt;p&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;h2&gt;Land cover, land use, and management&lt;\/h2&gt;\n&lt;p&gt;Climate-related impacts on fire, precipitation, temperature, air circulation, wind speeds, and storms will alter the makeup of the land cover of New Zealand and affect the type of land use best suited to an area.&lt;\/p&gt;\n&lt;p&gt;The land cover account (released in 2018) showed that 2.3 percent of New Zealand\u2019s land cover changed classes from 1996 to 2012. Tree-covered areas increased 199,547 hectares (2.2 percent), grassland cover decreased 214,581 hectares (1.6 percent), and artificial surfaces increased 24,220 hectares (10.9 percent). Some of this change was due to economic considerations and some to population growth and demographic patterns, but future account updates are likely to show increased effects of land cover change due to climate change. Additionally, flood risk and magnitude may increase in some areas and pest species, particularly plant pests, may increase their range and impact.&lt;\/p&gt;\n&lt;p&gt;The environmental protection expenditure (EPE) account may show changes in final consumption expenditure and investment due to climate change in these categories: flood, river, land and soil management, and pest management.&lt;\/p&gt;\n&lt;p&gt;Further information that specifically relates to climate change adaptation or mitigation may be able to be presented in the EPE account in the future and show its effects on regional and national expenditure.&lt;\/p&gt;\n&lt;h2&gt;Water resources&lt;\/h2&gt;\n&lt;p&gt;Climate change may also affect the availability of water resources, and in turn the availability of water for economic production or households.&lt;\/p&gt;\n&lt;p&gt;NIWA\u2019s (nd) climate change scenarios for New Zealand, with the latest based on the IPCC 5th Assessment report, shows mean precipitation (rain, hail, sleet, and snow) change is projected to vary around the country and by season with annual patterns of increases in the west and south of New Zealand and decreases in the north and east. We also expect over time to show the eventuality of these changes in the water physical stock account, which is available regionally based on growing seasons (ie years ended June 30). Consideration of the development of a quarterly presentation of this account will help with understanding and even forecasting the effects of altered precipitation on the economy.&lt;\/p&gt;\n&lt;p&gt;Currently, hydro generation accounts for around 60 percent of electricity generation. In 2017, returns to electricity operators from the use of all renewables (resource rent or the income over extraction costs) was $795 million, $569 million of which was from hydroelectricity. Changing hydrological conditions may affect both returns to electricity operators as well as emissions from the electricity and gas supply industry.&lt;\/p&gt;\n&lt;h2&gt;Ocean acidification and fishing&lt;\/h2&gt;\n&lt;p&gt;Our oceans have become more acidic by absorbing and storing the high levels of atmospheric carbon dioxide. Ocean acidification may cause widespread harm to New Zealand\u2019s marine ecosystems, particularly to marine organisms with carbonate shells like p\u0101ua, mussels, and oysters (MfE &amp;amp; Stats NZ, 2016). These organisms include plankton, which form the base of the marine food chain, and other species harvested for customary, commercial, or recreational purposes.&lt;\/p&gt;\n&lt;p&gt;Such changes in the marine environment may impact on the fishing industry and others that use the marine environment. The fishing industry is relatively small in terms of its contribution to the economy, but exports and the associated asset value of commercial species are significant. Many fish species in New Zealand\u2019s waters are also important for customary users and recreational pursuits.&lt;\/p&gt;\n&lt;p&gt;In 2017, the fisheries and aquaculture industry contributed $1.1 billion (0.4 percent) to GDP. Also, in 2017, 14,712 wage and salary earners were employed in the combined fishing and aquaculture and seafood processing industries.&lt;\/p&gt;\n&lt;p&gt;In 2018, seafood exports contributed $2.0 billion in export earnings to the New Zealand economy, a 48 percent increase from $1.4 billion in 2003. In the September 2018 year, the calculated asset value of New Zealand\u2019s commercial fish resource was $8.8 billion.&lt;\/p&gt;\n&lt;p&gt;Ongoing production of the fish monetary stock account will be important to monitor climate impacts on the commercial fish resource. In the shorter-term, competition for the available catch may drive up access prices, so it will be important to supplement the monetary stock account with a counterpart physical stock account.&lt;\/p&gt;\n&lt;h2&gt;&lt;a name=\&quot;responses\&quot;&gt;&lt;\/a&gt;Responses&lt;\/h2&gt;\n&lt;p&gt;The environmental accounting framework can be used to show economic and societal responses to climate change. It is designed to measure environment-economy interactions across countries, recording responses on the extent to which the main mechanism (eg fiscal instrument) is being used, not country-specific policies.&lt;\/p&gt;\n&lt;p&gt;The effectiveness of these responses cannot be directly ascertained via the accounts but may be considered alongside other relevant information. Relevant accounts for understanding responses to climate change include environmental taxes, emissions permits, and fossil fuel subsidies. These accounts consider response in the sense of climate change mitigation. Adaptation may, in time, be reflected in environmental expenditure accounts.&lt;\/p&gt;\n&lt;h2&gt;Greenhouse gas emissions and environmental taxes&lt;\/h2&gt;\n&lt;p&gt;Environmental taxes reflect efforts by governments, on behalf of society, to influence the behaviour of producers and consumers with respect to the environment. There is considerable interest in the use and effectiveness of these taxes as they show a direct response of countries to manage environmental change through economic instruments, meeting dual targets of environmental and economic management.&lt;\/p&gt;\n&lt;p&gt;Environmental taxes are taxes with a base that is a physical unit (or a proxy of a physical unit) of something that has a proven, specific negative impact on the environment. These tax bases are:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;energy taxes on energy production and on energy products used for both transport and stationary purposes&lt;\/li&gt;\n&lt;li&gt;transport taxes related to the ownership and use of motor vehicles and on other transport&lt;\/li&gt;\n&lt;li&gt;pollution taxes on the management of waste&lt;\/li&gt;\n&lt;li&gt;resource taxes on raw materials or extraction of minerals, oil, and gas.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;Environmental taxes are often thought of as Pigouvian taxes, which are defined as those directed toward negative externalities. Under the SEEA approach, a tax may be defined as environmental even if it is not directed at reducing negative externalities. An environmental tax may also include those which are used to raise revenue for other (non-environmental) purposes if the tax base is something that has a negative impact on the environment.&lt;\/p&gt;\n&lt;p&gt;The precise motivation for tax collection may be difficult to ascertain. For this reason, the SEEA focuses on the underlying tax base (United Nations, 2014). In New Zealand the tax system is not generally used to modify behaviour, except for alcohol and tobacco excise taxes which aim to discourage drinking and smoking (Tax Working Group, 2019). Road user charges are defined as an environmental tax even though the revenue is hypothecated (allocated) for road maintenance.&lt;\/p&gt;\n&lt;p&gt;In 2017, the total amount of environmental taxes (energy, transport, resource (including harvesting of biological resources and extraction of raw materials), and pollution taxes) was $4.8 billion, nearly three times that for 1999 ($1.6 billion). This was 5.5 percent of all revenue from taxes and social contributions received by general government, up from 4.6 percent in 1999. Resource taxes declined from 8 percent of total environmental taxes in 1999 to 1 percent in 2017. In 2017, most environmental taxes were energy taxes (48 percent) and transport taxes (50 percent). Combined pollution and resources taxes made up only 2 percent of the total.&lt;\/p&gt;\n&lt;p&gt;Figure 33 compares environmental taxes (energy- and transport-related) to carbon dioxide emissions from energy sources. We chose the taxes and gases to make the closest alignment between taxes and emissions. Emissions of methane, nitrous oxide, and fluorinated gas are also excluded.&lt;\/p&gt;\n&lt;p&gt;In 2018, Stats NZ updated the treatment of ETS transactions to be more aligned with international national accounts standards for the treatment of carbon credits. Specifically, the tax level is set to zero when the government allocates credits to emitters under the ETS but does not require payment; this treatment is replicated in the environmental taxes account. For this reason, ETS taxes do not appear in the environmental tax account table (see &lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-tables\&quot;&gt;Environmental-economic accounts: 2019 \u2013 tables&lt;\/a&gt;). Pollution taxes, such as the waste disposal levy, are excluded as these may be more related to methane.&lt;\/p&gt;\n&lt;p&gt;In general, industries with higher carbon dioxide emissions pay higher energy and transport taxes, except in the following cases.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Agricultural carbon dioxide emissions are greater than its tax contribution \u2013 mobile (off road) emissions that use diesel are not subject to road user charges.&lt;\/li&gt;\n&lt;li&gt;The direct tax burden is highest for manufacturing, which has the second-highest energy emissions. However, the petroleum, chemical, polymer, and rubber product manufacturing industry pays excise taxes on behalf of consumers. As this tax is passed on at the pump, households and other industries may ultimately pay some of this tax.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;h3&gt;Figure 33&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27653&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 Environmental taxes and carbon dioxide emissions from energy sources&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:&quot;Industry&quot;,&quot;yAxisTitle&quot;:&quot;Percent&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7871,&quot;Title&quot;:&quot;Environmental taxes and carbon dioxide emissions f&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;bar&quot;,&quot;GraphCsvData&quot;:&quot;Industry,\&quot;Agriculture, forestry, and fishing\&quot;,Construction,\&quot;Electricity, gas, water, and waste services\&quot;,Households,Manufacturing,Mining,\&quot;Services excluding transport, postal, and warehousing\&quot;,\&quot;Transport, postal, and warehousing\&quot;\r\nContribution to transport and energy taxes,0.514460813,5.803356935,3.128433401,13.64236536,30.09930069,0.702499174,11.63990162,18.06786801\r\nContribution to carbon dioxide emissions from energy sources,5.6804377,1.730244455,12.6443045,26.37046944,22.1393131,3.666994784,3.890102993,23.83135345\r\n&quot;}],&quot;GraphType&quot;:&quot;bar&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Environmental taxes and carbon dioxide emissions from energy sources&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;Emissions are for year to December 2016, taxes for year to March 2017.&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28352&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 32&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Emissions permits&lt;\/h2&gt;&lt;p&gt;The Emissions Trading Scheme (ETS) is New Zealand\u2019s main scheme for reducing greenhouse gas emissions. ETS puts a price on GHG emissions to create a financial incentive for businesses that emit GHGs to invest in technologies and practices that reduce emissions.&lt;br&gt;ETS also encourages forest planting by allowing eligible foresters to earn New Zealand Units (NZUs) as trees grow and absorb carbon dioxide. ETS requires all sectors of the economy to report on their emissions, and, except for biological emissions from agriculture, to purchase and surrender emissions units to the Government for those emissions. Just over half of New Zealand\u2019s GHGs are covered by ETS\u2019 surrender obligations. An emission unit represents one metric tonne of carbon dioxide, or the carbon dioxide equivalent of any other GHG.&lt;\/p&gt;&lt;p&gt;Presentation of the allocation of emissions permits across the economy is an area for development in environmental-economic accounts. Permits of GHG can be presented as an asset account showing the opening and closing stock of permits and the various changes in the stock through new issues, purchases, sales, and surrenders, using the same industrial classification, or by institutional sector, as other environmental-economic accounts. Tables A3 and A4 in the &lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-data-to-2017#appendixa2\&quot;&gt;appendix&lt;\/a&gt;&amp;nbsp;presents data on permits in millions of tonnes of carbon dioxide equivalents.&lt;\/p&gt;&lt;p&gt;Emissions trading permits are recognised as tax revenue within the national accounts framework to the extent to which payment is received by government. In turn, the environmental tax account records taxes paid for tradable emissions permits and categorises these as energy taxes when the permits relate to emissions of carbon dioxide. An emissions permit account includes detail on transactions outside the definition of a tax and so can complement environmental tax account. The example tables in the appendix could also be expressed in currency units if possible.&lt;\/p&gt;&lt;h2&gt;Fossil fuel subsidies&lt;\/h2&gt;&lt;p&gt;Fossil fuel subsidies can be described as support measures to producers, distributors, or users (consumers) of fossil fuels that can, by reducing the cost of combustion of fossil fuels, create barriers to emissions reduction. These may be broader than the definition of subsidies recorded in the national accounts and prescribed by the SNA 2008 (eg tax credits or tax forgone (exemptions) may be within scope).&lt;\/p&gt;&lt;p&gt;Other definitions for subsidies may be suited for different purposes, such as trade negotiations (see &lt;a href=\&quot;https:\/\/www.wto.org\/english\/tratop_e\/scm_e\/subs_e.htm\&quot;&gt;Agreement on subsidies and countervailing measures&lt;\/a&gt;). However, definitions and estimates specific to energy or use of fossil fuels are also emerging (see &lt;a href=\&quot;https:\/\/templatearchive.com\/world-energy-outlook\/\&quot;&gt;IEA&lt;\/a&gt;, &lt;a href=\&quot;https:\/\/blogs.worldbank.org\/developmenttalk\/what-exactly-fossil-fuel-subsidy-review-valuation-approaches\&quot;&gt;World Bank&lt;\/a&gt;, &lt;a href=\&quot;https:\/\/blogs.imf.org\/2017\/11\/27\/chart-of-the-week-oil-prices-energy-subsidies\/\&quot;&gt;IMF&lt;\/a&gt; ). Global momentum to reform support to fossil fuels has led to changes in some countries with several countries, including New Zealand, voluntarily undergoing APEC or G20 peer reviews (see &lt;a href=\&quot;https:\/\/www.mbie.govt.nz\/building-and-energy\/energy-and-natural-resources\/international-engagement-on-energy\/apec-fossil-fuel-subsidy-reform-peer-review\/\&quot;&gt;APEC fossil fuel subsidy reform peer review&lt;\/a&gt;).&lt;\/p&gt;&lt;p&gt;The OECD produced an inventory of measures for recording the direct support to the production or consumption of fossil fuels in OECD countries (OECD, 2018). It reconciled and combined this information with national estimates of fossil fuel support produced by the International Energy Agency (IEA) for 76 economies that collectively contribute 94 percent of global carbon dioxide emissions. The estimates included support for both consumers and producers. Total estimates of support to fossil fuels range between US$373 billion and US$617 billion over the period 2010\u201315.&lt;\/p&gt;&lt;p&gt;In 2017, the estimated amount of support to fossil fuels in New Zealand was $56 million, down from $59 million in 2016 (figure 34). The estimates for New Zealand include motor spirits excise duty refund from 2008\u201317 and tax deductions for petroleum mining expenditures from 2008\u201312. The OECD estimates for motor spirits excise duty refunds appear broadly consistent with those used within Stats NZ\u2019s national accounts. Other forms of support applicable to New Zealand were non-resident drilling rig and seismic ship tax exemptions, reductions in royalty payments for petroleum, and exemptions of off-road vehicles from road user charges but data were not available for these items.&lt;\/p&gt;&lt;h3&gt;Figure 34&lt;\/h3&gt;&quot;},{&quot;ID&quot;:&quot;27753&quot;,&quot;Title&quot;:&quot;EEA 2019 \u2013 OECD estimate for fossil fuel support in New Zealand, 2008\u201317&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;NZ$&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:7926,&quot;Title&quot;:&quot;OECD estimate for fossil fuel support in New Zeala&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Year,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017\r\nMotor spirits excise duty refund,19305481,17473332,20664337,20003795,20551383,36251000,42324000,50752000,58676000,56243000\r\nTax deductions for petroleum-mining expenditures,200000,12000000,20000000,26000000,35000000,,,,,\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;OECD estimate for fossil fuel support in New Zealand, 2008\u201317&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;Tax deductions for petroleum-mining expenditures not available after 2012 (shown as NaN in the table). Data source: OECD&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;28359&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 33&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;A SEEA definition of support for fossil fuels that encompasses other forms of support while retaining consistency with the SNA is still an area for development. The SEEA approach may be able to identify the industries receiving the support as distinct from support to consumers. It is possible to extract information to produce this indicator, but given the possibilities to include various forms of support for fossil fuels and for including other greenhouse gases, agreement will be needed on what to include.&lt;\/p&gt;&lt;p&gt;This work, supported by Eurostat, will continue and if successful, development of an approach consistent with the SEEA central framework will be shown in a future revision of the SEEA central framework. Examination of this data will be useful for monitoring a country\u2019s own barrier to progress towards a carbon neutral economy and to report on sustainable development goals.&lt;\/p&gt;&lt;h2&gt;Combined presentation of accounts&lt;\/h2&gt;&lt;p&gt;Development of industry-level estimates of emissions permits, protection expenditure, and fossil fuel subsidies could be combined with environmental taxes to show the range of fiscal or other instruments used to manage emissions. These could be combined with emissions estimates and other accounts, such as energy, or economic data (such as output, capital stock, employment) to provide a complete picture of the transition to a low-emissions economy using environmental-economic accounting. A comparison of industry level environmental taxes compared with their total taxes on production has been completed and is shown here (see &lt;a href=\&quot;information-releases\/environmental-economic-accounts-2019-tables\&quot;&gt;Environmental-economic accounts: 2019 \u2013 tables&lt;\/a&gt;).&lt;\/p&gt;&lt;h2&gt;&lt;a name=\&quot;future\&quot;&gt;&lt;\/a&gt;Future updates&lt;\/h2&gt;&lt;p&gt;Here are the environmental-economic accounts available at June 2019 and next planned updates.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28190&quot;,&quot;Title&quot;:&quot;EEA 2019 - Table 5&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;strong&gt; Table 5&lt;\/strong&gt;&lt;\/p&gt;&lt;table border=\&quot;1\&quot; cellspacing=\&quot;0\&quot; cellpadding=\&quot;0\&quot;&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td colspan=\&quot;4\&quot; valign=\&quot;top\&quot;&gt;\n&lt;p&gt;&lt;b&gt;Environmental-economic accounts available at June 2019&lt;\/b&gt;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot;&gt;Name&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot;&gt;Time series&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td valign=\&quot;top\&quot;&gt;\n&lt;p class=\&quot;Wordtablecolumnheadings-leftaligned\&quot;&gt;Last updated&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td valig  values to infill price gaps that would otherwise occur for the most valuable species and eel species.&lt;\/p&gt;&lt;p&gt;Accounts for land cover and water physical stocks have not been updated. These are available from &lt;em&gt;Environmental-economic accounts: 2018.&lt;\/em&gt;&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28365&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 references&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;References&lt;\/h2&gt;&lt;p&gt;Barrett et al (2013). &lt;a href=\&quot;https:\/\/www.tandfonline.com\/doi\/full\/10.1080\/14693062.2013.788858\&quot;&gt;Consumption-based GHG emissions accounting: a UK case study&lt;\/a&gt;. Retrieved from www.tandfonline.com.&lt;\/p&gt;&lt;p&gt;Bond, S &amp;amp; Vardon, M (2018). &lt;a href=\&quot;https:\/\/seea.un.org\/sites\/seea.un.org\/files\/lg_24_d_16b.pdf\&quot;&gt;From moonlight jewels to common browns: Butterfly accounts for the Australian Capital Territory&lt;\/a&gt;. Retrieved from https:\/\/seea.un.org.&lt;\/p&gt;&lt;p&gt;Eurostat (2015) &lt;a href=\&quot;https:\/\/ec.europa.eu\/eurostat\/web\/products-manuals-and-guidelines\/-\/KS-GQ-15-009\&quot;&gt;Manual for air emissions accounts&lt;\/a&gt;. Retrieved from www.ec.europa.eu.&lt;\/p&gt;&lt;p&gt;Frame, D, Rosier, S, Carey-Smith, T, Harrington, L, Dean, S, &amp;amp; Noy, I (2018). &lt;a href=\&quot;https:\/\/treasury.govt.nz\/sites\/default\/files\/2018-08\/LSF-estimating-financial-cost-of-climate-change-in-nz.pdf\&quot;&gt;Estimating financial costs of climate change in New Zealand&lt;\/a&gt;. Retrieved from https:\/\/treasury.govt.nz.&lt;\/p&gt;&lt;p&gt;Intergovernmental Panel on Climate Change (IPCC) (2013). &lt;a href=\&quot;https:\/\/www.ipcc.ch\/site\/assets\/uploads\/2018\/02\/WG1AR5_SPM_FINAL.pdf\&quot;&gt;Summary for policymakers&lt;\/a&gt;. In: Climate Change 2013: The physical scie

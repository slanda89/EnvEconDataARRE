wrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;\u2026&lt;\/p&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;93\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;\u2026&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;61\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;\u2026&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;43\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;226\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p&gt;Closing stock of permits&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;88\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;109\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;\u2026&lt;\/p&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;td width=\&quot;93\&quot; nowrap valign=\&quot;bottom\&quot;&gt;&lt;\/td&gt;\n&lt;td width=\&quot;61\&quot; nowrap valign=\&quot;bottom\&quot;&gt;&lt;\/td&gt;\n&lt;td width=\&quot;43\&quot; nowrap valign=\&quot;bottom\&quot;&gt;\n&lt;p align=\&quot;right\&quot;&gt;&amp;nbsp;&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td width=\&quot;620\&quot; nowrap colspan=\&quot;6\&quot; valign=\&quot;bottom\&quot;&gt;\n&lt;p&gt;1. Ideally disaggregated to NZSIOC level 1 (16 industries).&lt;\/p&gt;\n&lt;p&gt;2. The New Zealand government does not hold permits as to do so would be considered a liability&lt;\/p&gt;\n&lt;p&gt;3. Non-profit institutions serving households (NPISH) and households may purchase units but will not have a registry account - information on these is not currently available from the EPA.&lt;\/p&gt;\n&lt;p&gt;4. Emissions may be reduced elsewhere to offset the obligation to surrender units.&lt;\/p&gt;\n&lt;p&gt;Symbol: \u2026 not applicable&lt;\/p&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&quot;},{&quot;ID&quot;:&quot;28401&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: 2019 (data to 2017) \u2013 text alternatives&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Text alternatives&lt;\/h2&gt;&lt;h3&gt;&lt;a name=\&quot;fig1\&quot;&gt;&lt;\/a&gt;Figure 1&lt;\/h3&gt;&lt;p&gt;Image shows a large square divided into smaller squares. Each square, representing an industry in New Zealand, is sized according to its percentage contribution to New Zealand\u2019s carbon dioxide equivalent emissions in 2017. The image shows that the largest contributor to emissions was the primary industries, followed by manufacturing, then households.&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig3\&quot;&gt;&lt;\/a&gt;Figure 3&lt;\/h3&gt;&lt;p&gt;Diagram shows how environmental-economic accounts can be used to understand climate change in a driver-pressure-state-impact-response (DPSIR) framework. &lt;br&gt;The text below and above figure 3 explains how the DPSIR framework can be used in the environmental-economic accounts to inform on climate change.&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig4\&quot;&gt;&lt;\/a&gt;Figure 4&lt;\/h3&gt;&lt;p&gt;Flow diagram shows the relationship between domestic production and consumption of emissions approaches.&lt;br&gt;Domestic production of emissions depends on inputs to production and imports of fuel and other substances that are burnt domestically.&lt;br&gt;Emissions from domestic production then go into emissions embodied in exports or emissions consumed domestically.&lt;br&gt;Domestic consumption of emissions comes from emissions consumed domestically or imports of goods with embodied emissions. Domestic consumption of emissions can be allocated to households, investment or government.&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig5\&quot;&gt;&lt;\/a&gt;Figure 5&lt;\/h3&gt;&lt;p&gt;Image is of a Sankey chart, a type of flow diagram where the width of an arrow is proportional to the flow quantity. This chart shows how emissions from the Greenhouse Gas Inventory sectors (left side of chart) align (flow) to industry emissions (right side) under the SEEA production-based approach in 2017. The Greenhouse Gas Inventory sectors are listed on the left: agriculture, energy, industrial processes and product use, and waste. Residence adjustments are shown below the Greenhouse Gas Inventory sectors. Industries under SEAA approach are listed on the right: agriculture; forestry and logging; fishing, aquaculture and agriculture, forestry and fishing support services; mining; food, beverage, and tobacco product manufacturing; textile, leather, clothing, and footwear manufacturing; wood and paper products manufacturing and printing; petroleum, chemical, polymer, and rubber product manufacturing; transport equipment, machinery and equipment manufacturing; furniture and other manufacturing; construction; services excluding transport, postal, and warehousing; electricity, gas, water, and waste services; households; non-metallic mineral product manufacturing; transport, postal, and warehousing; metal product manufacturing; unallocated \u2013 industry.&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig13\&quot;&gt;&lt;\/a&gt;Figure 13&lt;\/h3&gt;&lt;p&gt;&lt;span style=\&quot;font-size: 1rem;\&quot;&gt;Image is of a Sankey chart, a type of flow diagram where the width of an arrow is proportional to the flow quantity. The chart shows how industry emissions (left side of chart) align (flow) to greenhouse gases (right side) in 2017. Industries on the left side are: agriculture; forestry and logging; fishing, aquaculture and agriculture, forestry and fishing support services; mining; food, beverage, and tobacco product manufacturing; textile, leather, clothing, and footwear manufacturing; wood and paper products manufacturing and printing; petroleum, chemical, polymer, and rubber product manufacturing; transport equipment, machinery and equipment manufacturing; furniture and other manufacturing; construction; services excluding transport, postal, and warehousing; electricity, gas, water, and waste services; households; non-metallic mineral product manufacturing; transport, postal, and warehousing; metal product manufacturing; unallocated \u2013 industry. Greenhouse gases are: methane, nitrous oxide, carbon dioxide, hydrofluorocarbons, sulphur hexafluoride, and perfluorocarbons.&lt;\/span&gt;&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig15\&quot;&gt;&lt;\/a&gt;Figure 15&lt;\/h3&gt;&lt;p&gt;Bubble chart shows annual growth in contribution to GDP on the vertical axis and annual growth in carbon dioxide equivalent emissions on the horizontal axis.&lt;\/p&gt;&lt;p&gt;There are nine bubbles in the chart, each representing an industry. The size of a bubble reflects an industry\u2019s contribution to emissions in 2017.&lt;\/p&gt;&lt;p&gt;A black 45-degree line denotes that the contribution to GDP increased at the same rate as the contribution to emissions. &lt;br&gt;Carbon dioxide equivalent emissions increased at a faster rate than GDP for industries to the right of the line (forestry and logging; construction; services excluding transport, postal, and warehousing; and manufacturing). Emissions increased at a slower rate for those to the left (fishing, aquaculture and agriculture, forestry, and fishing support services; agriculture; transport, postal, and warehousing; electricity, gas, water, and waste services; and mining). Industries in the top-left quadrant are those that had absolute decoupling, ie, GDP increased while carbon dioxide equivalent emissions decreased (fishing, aquaculture, and agriculture, forestry, and fishing support services; electricity, gas, water, and waste services; and agriculture). Industries that had their GDP and emissions grow in the same direction, but with GDP growth relatively faster, show relative decoupling: positive growth for transport, postal, and warehousing, negative growth for mining.&lt;\/p&gt;&lt;p&gt;Forestry and logging; construction; services excluding transport, postal, and warehousing; and manufacturing are to the right of the 45-degree line as their emissions increased faster than their contribution to GDP.&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig19\&quot;&gt;&lt;\/a&gt;Figure 19&lt;\/h3&gt;&lt;p&gt;Bubble chart shows annual growth in contribution to GDP on the vertical axis and annual growth in carbon dioxide equivalent emissions on the horizontal axis for manufacturing industries.&lt;\/p&gt;&lt;p&gt;There are eight bubbles in the chart, each representing a manufacturing industry. The size of each bubble reflects an industry\u2019s contribution to emissions in 2017.&lt;\/p&gt;&lt;p&gt;A black 45-degree line denotes that the contribution to GDP has increased at the same rate as the contribution to emissions. &lt;br&gt;Carbon dioxide equivalent emissions increased at a faster rate than GDP for industries to the right of the line (petroleum, chemical, polymer, and rubber product manufacturing; wood and paper products manufacturing and printing; food, beverage, and tobacco product manufacturing; and metal product manufacturing), and at a slower rate for those to the left (transport equipment, machinery and equipment manufacturing; non-metallic mineral product manufacturing; furniture and other manufacturing; and textile, leather, clothing, and footwear manufacturing). Industries in the top-left quadrant are those that had absolute decoupling, ie, GDP increased while carbon dioxide equivalent emissions decreased (transport equipment, machinery, and equipment manufacturing; and f non-metallic mineral product manufacturing). Industries that had their GDP and emissions grow in the same direction, but with GDP growth relatively faster, show relative decoupling: negative growth for furniture and other manufacturing; textile, leather, clothing, and footwear manufacturing.&lt;\/p&gt;&lt;h3&gt;&lt;a name=\&quot;fig32\&quot;&gt;&lt;\/a&gt;Figure 32&lt;\/h3&gt;&lt;p&gt;An area-line dual axis graph shows that over the period 1995\u20132017, more carbon is entering the pool of harvested wood products from increases in harvesting. These gains are increasing faster than the decay of carbon in the pool of harvested wood products.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;11236&quot;,&quot;Title&quot;:&quot;Technical enquiries \u2013 Adam Tipper&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Technical enquiries&lt;\/h2&gt;&lt;p&gt;Adam Tipper&lt;br&gt;&lt;a href=\&quot;tel:+6449314944\&quot;&gt;04 931 4944&amp;nbsp;&lt;\/a&gt;&lt;br&gt;&lt;a href=\&quot;mailto:info@stats.govt.nz?subject=Food%20price%20index%20%E2%80%93%20media%20enquiries\&quot;&gt;info@stats.govt.nz&lt;\/a&gt;&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;28395&quot;,&quot;Title&quot;:&quot;ISSN Environmental-economic accounts&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;ISSN 2624-0777&lt;\/p&gt;&quot;}],&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;PageBlockSortOrder&quot;:{&quot;28371&quot;:1,&quot;28398&quot;:2,&quot;28368&quot;:3,&quot;28179&quot;:4,&quot;27540&quot;:5,&quot;28239&quot;:6,&quot;28178&quot;:7,&quot;28245&quot;:8,&quot;28254&quot;:9,&quot;28260&quot;:10,&quot;28181&quot;:11,&quot;28263&quot;:12,&quot;27543&quot;:13,&quot;28266&quot;:14,&quot;28184&quot;:15,&quot;28269&quot;:16,&quot;27546&quot;:17,&quot;28272&quot;:18,&quot;27549&quot;:19,&quot;28275&quot;:20,&quot;27554&quot;:21,&quot;28281&quot;:22,&quot;27593&quot;:23,&quot;28284&quot;:24,&quot;27750&quot;:25,&quot;28287&quot

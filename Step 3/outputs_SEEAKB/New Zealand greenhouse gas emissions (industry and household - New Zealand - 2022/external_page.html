kt) in the September 2021 quarter, compared with the June 2021 quarter.&quot;,&quot;PageBreadcrumbs&quot;:[{&quot;Title&quot;:&quot;Home&quot;,&quot;MenuTitle&quot;:&quot;Home&quot;,&quot;Link&quot;:&quot;\/&quot;},{&quot;Title&quot;:&quot;Experimental&quot;,&quot;MenuTitle&quot;:&quot;Experimental&quot;,&quot;Link&quot;:&quot;\/experimental\/&quot;},{&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter&quot;,&quot;MenuTitle&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter&quot;,&quot;Link&quot;:&quot;\/experimental\/greenhouse-gas-emissions-industry-and-household-september-2021-quarter\/&quot;}],&quot;SiteBanner&quot;:{&quot;ID&quot;:47,&quot;Title&quot;:&quot;www3.stats.govt.nz planned maintenance&quot;,&quot;BannerHeading&quot;:&quot;Planned maintenance: Monday 9 March from 5pm - 6pm &quot;,&quot;BannerType&quot;:&quot;interesting-information&quot;,&quot;Description&quot;:&quot;&lt;p&gt;During this time, the small number of files and applications that are hosted on www3.stats.govt.nz may be temporarily unavailable. The Stats NZ website will remain accessible throughout this time.&lt;\/p&gt;&quot;,&quot;ActionText&quot;:&quot;Find out more&quot;,&quot;Action&quot;:null,&quot;ActionTarget&quot;:&quot;&quot;,&quot;AllPages&quot;:1,&quot;Expires&quot;:&quot;2026-03-09 17:48:00&quot;,&quot;LastEdited&quot;:&quot;2026-03-09 17:45:40&quot;},&quot;PageBlocks&quot;:[{&quot;ID&quot;:&quot;53888&quot;,&quot;Title&quot;:&quot;Disclaimer \u2013 Greenhouse gas emissions September 2020 quarter&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;div style=\&quot;background-color: #f6f6f6; border-left: #ec6607 3px solid; padding: 30px;\&quot;&gt;\n&lt;p&gt;This is our experimental section. The data used here is provisional, therefore we advise caution when using the data.&lt;\/p&gt;\n&lt;p&gt;&lt;em&gt;Greenhouse gas emissions (industry and household): December 2021 quarter&lt;\/em&gt; was released as an official statistic for the first time on 20 July 2022. See &lt;a href=\&quot;https:\/\/www.stats.govt.nz\/publications?filters=Greenhouse%20gas%20emissions%2CInformation%20releases\&quot;&gt;Greenhouse gas releases&lt;\/a&gt; for the latest data.&lt;\/p&gt;\n&lt;\/div&gt;&quot;},{&quot;ID&quot;:&quot;69724&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter -- description&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;&lt;span class=\&quot;intro\&quot;&gt;Stats NZ has developed new experimental quarterly estimates of greenhouse gas (GHG) emissions, to provide more timely data on New Zealand\u2019s production-based emissions. This is done within the System of Environmental-Economic Accounting (SEEA) framework in order to track emissions in relation to economic activity.&lt;\/span&gt;&lt;\/p&gt;&lt;p&gt;This experimental release includes data from the March 2014 quarter, up to and including the September 2021 quarter. Quarterly emissions data allows for a more detailed understanding of the timing and impact of events such as COVID-19 lockdowns, which annual data can obscure.&lt;\/p&gt;&lt;p&gt;Estimates use New Zealand greenhouse gas inventory data as released in April 2021 (2019 data).&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;69727&quot;,&quot;Title&quot;:&quot;Download data&quot;,&quot;ClassName&quot;:&quot;DocumentBlock&quot;,&quot;ShowBlockTitle&quot;:true,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;BlockDocuments&quot;:[{&quot;ID&quot;:&quot;80719&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;Greenhouse-gas-emissions-industry-and-household-September-2021-quarter.xlsx&quot;,&quot;FileName&quot;:&quot;Greenhouse-gas-emissions-industry-and-household-September-2021-quarter.xlsx&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:81031,&quot;OwnerID&quot;:132,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Greenhouse-gas-emissions-industry-and-household\/Greenhouse-gas-emissions-industry-and-household-September-2021-quarter\/Download-data\/Greenhouse-gas-emissions-industry-and-household-September-2021-quarter.xlsx&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;xlsx&quot;,&quot;DocumentFileType&quot;:&quot;Excel spreadsheet&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483475&quot;,&quot;DocumentSize&quot;:&quot;70 KB&quot;,&quot;DocumentPreviewImage&quot;:false},{&quot;ID&quot;:&quot;80722&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;Greenhouse-gas-emissions-industry-and-household-September-2021-quarter-csv.csv&quot;,&quot;FileName&quot;:&quot;Greenhouse-gas-emissions-industry-and-household-September-2021-quarter-csv.csv&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter \u2013 CSV&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:81031,&quot;OwnerID&quot;:132,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Greenhouse-gas-emissions-industry-and-household\/Greenhouse-gas-emissions-industry-and-household-September-2021-quarter\/Download-data\/Greenhouse-gas-emissions-industry-and-household-September-2021-quarter-csv.csv&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;csv&quot;,&quot;DocumentFileType&quot;:&quot;Comma Separated Values&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483475&quot;,&quot;DocumentSize&quot;:&quot;88 KB&quot;,&quot;DocumentPreviewImage&quot;:false}],&quot;Heading&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}},&quot;Presentation&quot;:null},{&quot;ID&quot;:&quot;69730&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter -- key facts 1&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Key facts&lt;\/h2&gt;&lt;p&gt;The September 2021 quarter is compared with the June 2021 quarter using seasonally adjusted data. Note that seasonally adjusted emissions values are not additive.&lt;\/p&gt;&lt;p&gt;Total emissions were down 11 percent, 2,405 kilotonnes (kt) in the September 2021 quarter compared with the June 2021 quarter. This coincides with a 3.7 percent decrease in gross domestic product (GDP) over the same time period.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;69595&quot;,&quot;Title&quot;:&quot;GhGE I&amp;E Sep 21 qtr -- Percentage changes in total gross domestic product and CO\u2082-e emissions, seasonally adjusted, June 2014\u2013September 2021 quarters&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Percent&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:20527,&quot;Title&quot;:&quot;Percentage changes in total gross domestic product&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;column&quot;,&quot;GraphCsvData&quot;:&quot;Quarter,Jun-14,Sep-14,Dec-14,Mar-15,Jun-15,Sep-15,Dec-15,Mar-16,Jun-16,Sep-16,Dec-16,Mar-17,Jun-17,Sep-17,Dec-17,Mar-18,Jun-18,Sep-18,Dec-18,Mar-19,Jun-19,Sep-19,Dec-19,Mar-20,Jun-20,Sep-20,Dec-20,Mar-21,Jun-21,Sep-21\r\nEmissions,0.7,0.5,0.7,0.1,-1,-0.1,-0.2,-0.8,-0.7,0.3,-2.5,2,2.5,-0.2,0.3,-0.7,0.2,0,1.4,1.4,-0.3,0.2,-1,-1.8,-8.4,8.8,-1.8,1.1,4.7,-11.2\r\nGDP,0.5,1.3,1.6,0.3,0.7,1.1,1,1.2,0.9,0.9,0.3,1,1.1,1,0.8,0.7,1.1,0.4,1.2,0.4,0.6,1,0.3,-1.3,-10.3,13.9,-0.4,1.5,2.4,-3.7\r\n&quot;}],&quot;GraphType&quot;:&quot;column&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Percentage changes in total gross domestic product and CO\u2082-e emissions, seasonally adjusted, June 2014\u2013September 2021 quarters&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO\u2082-e \u2013 carbon dioxide equivalent.&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;69733&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter -- key facts 2&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;Electricity, gas, water, and waste services emissions fell 33 percent (969 kt).&lt;\/li&gt;\n&lt;li&gt;Total household emissions decreased by 12 percent (297 kt). Total household emissions are largely driven by household transport emissions, which were down 13 percent (300 kt). Household emissions from heating\/cooling were up 1.5 percent (3 kt), and emissions from other household sources were down 0.2 percent.&lt;\/li&gt;\n&lt;li&gt;Manufacturing fell by 10 percent (273 kt).&lt;\/li&gt;\n&lt;li&gt;Transport, postal, and warehousing emissions fell by 17 percent (156 kt).&lt;\/li&gt;\n&lt;li&gt;Agriculture, forestry, and fishing emissions fell by 1.3 percent (133 kt).&lt;\/li&gt;\n&lt;li&gt;Services excluding transport, postal, and warehousing emissions fell by 5.3 percent (45 kt).&lt;\/li&gt;\n&lt;li&gt;Construction emissions fell by 12 percent (39 kt).&lt;\/li&gt;\n&lt;li&gt;Mining emissions fell by 5.2 percent (18 kt).&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;ID&quot;:&quot;69607&quot;,&quot;Title&quot;:&quot;GhGE I&amp;E Sep 21 qtr -- Change in seasonally adjusted emissions (kilotonnes CO\u2082-e) by industry and household, June 2021\u2013September 2021 quarters&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:&quot;Industry and household&quot;,&quot;yAxisTitle&quot;:&quot;Kilotonnes (CO\u2082-e) &quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:20530,&quot;Title&quot;:&quot;Change in seasonally adjusted emissions (kilotonne&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;bar&quot;,&quot;GraphCsvData&quot;:&quot;Industry and household,Mining,Construction,\&quot;Services excluding transport, postal, and warehousing\&quot;,\&quot;Agriculture, forestry, fishing\&quot;,\&quot;Transport, postal, and warehousing\&quot;,Manufacturing,Households,\&quot;Electricity, gas, water, and waste services\&quot;\r\nKilotonnes CO2-e,-18,-39,-45,-133,-156,-273,-297,-969\r\n&quot;}],&quot;GraphType&quot;:&quot;bar&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Change in seasonally adjusted emissions (kilotonnes CO\u2082-e) by industry and household, June 2021\u2013September 2021 quarters&quot;,&quot;showLegend&quot;:false,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;CO\u2082-e \u2013 carbon dioxide equivalent.&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;69736&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter -- key facts 3&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;Quarterly greenhouse gas emissions estimates for industries and households are also available in graphical form on the&amp;nbsp;&lt;a href=\&quot;experimental\/covid-19-data-portal\&quot;&gt;COVID-19 data portal&lt;\/a&gt; under the \u2018Environmental\u2019 tab.&lt;\/p&gt;&lt;h3&gt;Industry and household greenhouse gas emissions by gas type&lt;\/h3&gt;&lt;p&gt;&lt;strong&gt;Note:&lt;\/strong&gt; Emissions from methane, nitrous oxide, and fluorinated gases are expressed in carbon dioxide equivalents (CO\u2082-e).&lt;\/p&gt;&lt;p&gt;On a seasonally adjusted basis, there has been little change in methane and nitrous oxide emissions throughout the 2014\u20122021 time series. Carbon dioxide emissions have been volatile over the time series and fell during the September 2021 quarter to near 2020 COVID-19 lockdown levels.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;69628&quot;,&quot;Title&quot;:&quot;GhGE I&amp;E Sep 21 qtr -- Total industry and household quarterly CO\u2082-e emissions, by gas type, March 2014\u2013September 2021&quot;,&quot;ClassName&quot;:&quot;GraphTableBlock&quot;,&quot;ShowBlockTitle&quot;:0,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;xAxisTitle&quot;:null,&quot;yAxisTitle&quot;:&quot;Kilotonnes (CO\u2082-e)&quot;,&quot;yAxisDualRightTitle&quot;:null,&quot;GraphMetadata&quot;:null,&quot;SeriesData&quot;:[{&quot;ID&quot;:20533,&quot;Title&quot;:&quot;Total industry and household quarterly CO\u2082-e emiss&quot;,&quot;ClassName&quot;:&quot;SeriesGroup&quot;,&quot;Type&quot;:&quot;line&quot;,&quot;GraphCsvData&quot;:&quot;Quarter,Mar-14,Jun-14,Sep-14,Dec-14,Mar-15,Jun-15,Sep-15,Dec-15,Mar-16,Jun-16,Sep-16,Dec-16,Mar-17,Jun-17,Sep-17,Dec-17,Mar-18,Jun-18,Sep-18,Dec-18,Mar-19,Jun-19,Sep-19,Dec-19,Mar-20,Jun-20,Sep-20,Dec-20,Mar-21,Jun-21,Sep-21\r\nCarbon dioxide,9129,9356,9501,9626,9738,9527,9553,9493,9342,9182,9334,8824,9177,9540,9724,9810,9482,9293,9649,9952,10202,9700,10192,10039,9677,7629,9665,9351,9657,9984,8325\r\nMethane,8926,8884,8863,8829,8784,8758,8730,8719,8671,8643,8630,8619,8624,8604,8593,8588,8661,8604,8595,8602,8654,8648,8632,8609,8561,8553,8524,8483,8431,8434,8397\r\nNitrous oxide,2052,2060,2067,2069,2048,2039,2037,2043,2046,2047,2049,2052,2052,2052,2055,2061,2081,2087,2089,2093,2094,2101,2098,2095,2097,2093,2097,2092,2074,2090,2073\r\nFluorinated gases,345,348,352,358,365,373,381,390,399,406,413,418,421,429,440,455,472,483,486,482,470,460,454,451,447,442,439,436,432,429,426\r\n&quot;}],&quot;GraphType&quot;:&quot;line&quot;,&quot;Presentation&quot;:&quot;graphTable&quot;,&quot;GraphHeading&quot;:&quot;Total industry and household quarterly CO\u2082-e emissions, by gas type, March 2014\u2013September 2021&quot;,&quot;showLegend&quot;:true,&quot;SourceCredit&quot;:&quot;Stats NZ&quot;,&quot;Footnote&quot;:&quot;Seasonally adjusted quarters. Methane, nitrous oxide, and fluorinated gases are expressed in CO\u2082-e. CO\u2082-e \u2013 carbon dioxide equivalent.&quot;,&quot;GeoLevelView&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}}},{&quot;ID&quot;:&quot;69739&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter -- key facts 4&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;From the June 2021 to the September 2021 quarter (seasonally adjusted):&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;carbon dioxide fell by 17 percent (1,660 kt)&lt;\/li&gt;\n&lt;li&gt;methane fell by 0.4 percent (38 kt)&lt;\/li&gt;\n&lt;li&gt;nitrous oxide fell by 0.8 percent (17 kt)&lt;\/li&gt;\n&lt;li&gt;fluorinated gases fell by 0.6 percent (3 kt).&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;Carbon dioxide and fluorinated gas emissions largely come from goods-producing industries (such as manufacturing, construction, and electricity, gas, water, and waste services).&lt;\/p&gt;&lt;p&gt;Methane and nitrous oxide emissions largely come from primary industries (such as agriculture and mining).&lt;\/p&gt;&lt;h2&gt;About the data&lt;\/h2&gt;&lt;p&gt;The experimental quarterly greenhouse gas emissions account uses annual estimates of emissions by industry and household (for up to the December 2019 year) and, using indicators, estimates more recent quarters, giving more timely emissions estimates.&lt;\/p&gt;&lt;p&gt;The annual greenhouse gas emissions by industry and household account uses the latest New Zealand\u2019s Greenhouse Gas Inventory and a range of economic data sources to measure industry and household emissions.&lt;\/p&gt;&lt;p&gt;&lt;a href=\&quot;methods\/greenhouse-gas-emissions-industry-and-household-september-2020-quarter-methodology-and-results\&quot;&gt;Greenhouse gas emissions (industry and household): September 2020 quarter&lt;\/a&gt; \u2013 &lt;a href=\&quot;methods\/greenhouse-gas-emissions-industry-and-household-september-2020-quarter-methodology-and-results\&quot;&gt;methodology and results&lt;\/a&gt;&amp;nbsp;has more information on the sources and methods used to create these estimates.&lt;\/p&gt;&lt;h2&gt;Scope&lt;\/h2&gt;&lt;p&gt;Stats NZ\u2019s emissions series are compiled using the UN System of Environmental-Economic Accounts (SEEA).&lt;\/p&gt;&lt;p&gt;The SEEA production-based emissions estimates are presented on an industry basis and utilise the residency principle to maintain comparability with economic statistics.&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;The industry approach takes the process-based classification used in the inventory and allocates the emissions to industry to reflect the concept of economic production. This results in multiple processes being allocated to an industry (for example, emissions from a manufacturing industry may include emissions from both industrial processes and energy use, including vehicle use and heat production).&lt;\/li&gt;\n&lt;li&gt;The residency principle means deducting emissions from non-residents operating on the domestic territory (for example, international tourists driving vehicles) and adding emissions from residents operating overseas (for example, international aviation or shipping). This adjustment leads to a difference in levels when compared with New Zealand\u2019s Greenhouse Gas Inventory.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;h2&gt;Industries&lt;\/h2&gt;&lt;p&gt;These experimental estimates are available for seven industry groups (which are aggregations of industries based on the &lt;a href=\&quot;http:\/\/aria.stats.govt.nz\/aria\/#ClassificationView:uri=http:\/\/stats.govt.nz\/cms\/ClassificationVersion\/CARS5587\&quot;&gt;Australian and New Zealand Standard Industrial Classification 2006&lt;\/a&gt;), along with household direct emissions. These industries are further aggregated into three broad industry groupings:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;primary industries&lt;\/li&gt;\n&lt;ul&gt;\n&lt;li&gt;agriculture, forestry, and fishing&lt;\/li&gt;\n&lt;li&gt;mining&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;li&gt;goods-producing industries&lt;\/li&gt;\n&lt;ul&gt;\n&lt;li&gt;manufacturing&lt;\/li&gt;\n&lt;li&gt;electricity, gas, water, and waste services&lt;\/li&gt;\n&lt;li&gt;construction&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;li&gt;service industries&lt;\/li&gt;\n&lt;ul&gt;\n&lt;li&gt;transport, postal, and warehousing&lt;\/li&gt;\n&lt;li&gt;services excluding transport, postal, and warehousing.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;\/ul&gt;&lt;h2&gt;Households&lt;\/h2&gt;&lt;p&gt;Household emissions are now available by the following activities:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;heating\/cooling&lt;\/li&gt;\n&lt;li&gt;transport&lt;\/li&gt;\n&lt;li&gt;other.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;h2&gt;Gas breakdown&lt;\/h2&gt;&lt;p&gt;A breakdown of industry emissions estimates by gas type is now included in the quarterly emissions series. The gas breakdown is currently only available for the broad industry groupings. Gas emissions are expressed in carbon dioxide equivalents (CO\u2082-e), which are the emissions of greenhouse gases weighted by their 100-year global warming potential (GWP). The GWPs are based on those from the &lt;a href=\&quot;https:\/\/www.ipcc.ch\/assessment-report\/ar4\/\&quot;&gt;Intergovernmental Panel on Climate Change, Fourth Assessment Report, 2007&lt;\/a&gt;. Gases in this breakdown include:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;carbon dioxide equivalents (CO\u2082-e)&lt;\/li&gt;\n&lt;li&gt;carbon dioxide (CO2)&lt;\/li&gt;\n&lt;li&gt;methane (CH4)&lt;\/li&gt;\n&lt;li&gt;nitrous oxide (N2O)&lt;\/li&gt;\n&lt;li&gt;fluorinated gases (F gases).&lt;\/li&gt;\n&lt;\/ul&gt;&lt;h2&gt;Seasonal adjustment&lt;\/h2&gt;&lt;p&gt;Data is available as actual and seasonally adjusted values.&lt;\/p&gt;&lt;p&gt;\u2018Actual\u2019 emissions data (sometimes referred to as \u2018unadjusted\u2019) has significant seasonality, so it is important to do any comparisons with the same period of the previous year (for example, the September 2021 quarter compared with the September 2020 quarter).&lt;\/p&gt;&lt;p&gt;Seasonally adjusted data is better suited for showing quarter-on-quarter movements (for example, the September 2021 quarter compared with the June 2021 quarter) as seasonality is removed.&lt;\/p&gt;&lt;h2&gt;Data sources&lt;\/h2&gt;&lt;p&gt;These estimates use the following key releases as input data:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&quot;information-releases\/greenhouse-gas-emissions-industry-and-household-year-ended-2019\&quot;&gt;Greenhouse gas emissions (industry and household): Year ended 2019&lt;\/a&gt;&amp;nbsp;(published 8 July 2021)&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;https:\/\/www.mbie.govt.nz\/building-and-energy\/energy-and-natural-resources\/energy-statistics-and-modelling\/energy-publications-and-technical-papers\/new-zealand-energy-quarterly\/\&quot;&gt;New Zealand Energy quarterly: September 2021 quarter&lt;\/a&gt;&amp;nbsp;(published 10 December 2021)&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;information-releases\/gross-domestic-product-september-2021-quarter\&quot;&gt;Gross domestic product: September 2021 quarter&lt;\/a&gt;&amp;nbsp;(published 16 December 2021).&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;Additional data sources including electricity use, card transaction data, prices, and transport statistics are also utilised to compile quarterly emissions statistics.&lt;\/p&gt;&lt;h2&gt;Revisions&lt;\/h2&gt;&lt;p&gt;This release accounts for revisions to quarterly indicators, including gross domestic product and energy data published by MBIE.&lt;\/p&gt;&lt;h2&gt;Additional information&lt;\/h2&gt;&lt;p&gt;The quarterly emissions series is part of a suite of emissions statistics produced by Stats NZ.&lt;br&gt; &lt;br&gt;See previous greenhouse gas emissions releases:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&quot;experimental\/greenhouse-gas-emissions-industry-and-household-june-2021-quarter\&quot;&gt;Greenhouse gas emissions (industry and household): June 2021 quarter&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;information-releases\/greenhouse-gas-emissions-industry-and-household-year-ended-2019\&quot;&gt;Greenhouse gas emissions (industry and household): Year ended 2019&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;information-releases\/greenhouse-gas-emissions-by-region-industry-and-household-year-ended-2019\&quot;&gt;Greenhouse gas emissions by region (industry and household): Year ended 2019&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;information-releases\/greenhouse-gas-emissions-consumption-based-year-ended-2019-provisional\&quot;&gt;Greenhouse gas emissions (consumption-based): Year ended 2019 (provisional)&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;&lt;a href=\&quot;methods\/approaches-to-measuring-new-zealands-greenhouse-gas-emissions\&quot;&gt;Approaches to measuring New Zealand\u2019s greenhouse gas emissions&lt;\/a&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;h2&gt;Send us your feedback&lt;\/h2&gt;&lt;p&gt;Stats NZ welcomes feedback on the methodology used to produce these new experimental estimates, as it is the intention to develop them into official statistics. If you would like to provide feedback, or have an enquiry, please contact&amp;nbsp;&lt;a href=\&quot;mailto:environmental.accounts@stats.govt.nz?subject=Experimental%20greenhouse%20gas%20emissions%20(industry%20and%20household)%20quarterly%20series\&quot;&gt;GHG quarterly feedback&lt;\/a&gt;.&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;62829&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household) media enquiries&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Media enquiries&lt;\/h2&gt;\n&lt;p&gt;Media team&lt;br&gt;&lt;a href=\&quot;mailto:media@stats.govt.nz?subject=Greenhouse%20gas%20emissions%20(industry%20and%20household)%20%E2%80%93%20media%20enquiries\&quot;&gt;media@stats.govt.nz&lt;\/a&gt;&lt;br&gt;&lt;a href=\&quot;tel:+64212859191\&quot;&gt;021 285 9191&lt;\/a&gt;&lt;br&gt;&lt;br&gt;&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;61554&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household) \u2013 technical enquiries&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Technical enquiries&lt;\/h2&gt;\n&lt;p&gt;Adam Tipper&lt;br&gt;&lt;a href=\&quot;mailto:info@stats.govt.nz?subject=Greenhouse%20gas%20emissions%20(industry%20and%20household)%20%E2%80%93%20technical%20enquiries\&quot;&gt;info@stats.govt.nz&lt;\/a&gt;&lt;br&gt;&lt;a href=\&quot;tel:+6449314944\&quot;&gt;04 931 4944&amp;nbsp;&lt;\/a&gt;&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;40663&quot;,&quot;Title&quot;:&quot;ISSN Greenhouse gas emissions (industry and household)&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;p&gt;ISSN 2703-5263&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;69742&quot;,&quot;Title&quot;:&quot;Greenhouse gas emissions (industry and household): September 2021 quarter -- next release date&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Next release&lt;\/h2&gt;&lt;p&gt;&lt;em&gt;Greenhouse gas emissions (industry and household): December 2021 quarter&lt;\/em&gt; is scheduled for release in July 2022.&lt;\/p&gt;&quot;}],&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;PageBlockSortOrder&quot;:{&quot;94633&quot;:1,&quot;69724&quot;:8,&quot;69727&quot;:9,&quot;69730&quot;:10,&quot;69595&quot;:11,&quot;69733&quot;:12,&quot;69607&quot;:13,&quot;69736&quot;:14,&quot;69628&quot;:15,&quot;69739&quot;:16,&quot;81573&quot;:17,&quot;81574&quot;:18,&quot;81575&quot;:19,&quot;69742&quot;:20},&quot;EnableTopDivider&quot;:{&quot;53888&quot;:&quot;No&quot;,&quot;69724&quot;:&quot;No&quot;,&quot;69727&quot;:&quot;No&quot;,&quot;69730&quot;:&quot;No&quot;,&quot;69595&quot;:&quot;No&quot;,&quot;69733&quot;:&quot;No&quot;,&quot;69607&quot;:&quot;No&quot;,&quot;69736&quot;:&quot;No&quot;,&quot;69628&quot;:&quot;No&quot;,&quot;69739&quot;:&quot;No&quot;,&quot;62829&quot;:&quot;No&quot;,&quot;61554&quot;:&quot;No&quot;,&quot;40663&quot;:&quot;No&quot;,&quot;69742&quot;:&quot;No&quot;},&quot;PageBlockWidths&quot;:{&quot;94633&quot;:0,&quot;69724&quot;:0,&quot;69727&quot;:0,&quot;69730&quot;:0,&quot;69595&quot;:0,&quot;69733&quot;:0,&quot;69607&quot;:0,&quot;69736&quot;:0,&quot;69628&quot;:0,&quot;69739&quot;:0,&quot;81573&quot;:0,&quot;81574&quot;:0,&quot;81575&quot;:0,&quot;69742&quot;:0},&quot;PageTerms&quot;:[{&quot;ID&quot;:403,&quot;ClassName&quot;:&quot;SilverStripe\\Taxonomy\\TaxonomyTerm&quot;,&quot;LinkData&quot;:&quot;{\&quot;LinkURL\&quot;:\&quot;\\\/topics\\\/agriculture\&quot;,\&quot;Title\&quot;:\&quot;Agricult

order-left: #ec6607 3px solid; padding: 30px;\&quot;&gt;\n&lt;p&gt;&lt;strong&gt;2 August 2022: &lt;\/strong&gt;We have replaced the \u2018Water physical stock account, year ended June 1995-2020 CSV\u2019 originally published with an updated file that shows a correction to the total outflows at North Island, South Island, and New Zealand levels.&lt;\/p&gt;\n&lt;\/div&gt;&quot;},{&quot;ID&quot;:&quot;59259&quot;,&quot;Title&quot;:&quot;Download data&quot;,&quot;ClassName&quot;:&quot;DocumentBlock&quot;,&quot;ShowBlockTitle&quot;:true,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;BlockDocuments&quot;:[{&quot;ID&quot;:&quot;68430&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;water-physical-stock-account-by-region-year-ended-June-1995-2020.xlsx&quot;,&quot;FileName&quot;:&quot;water-physical-stock-account-by-region-year-ended-June-1995-2020.xlsx&quot;,&quot;Title&quot;:&quot;Water physical stock account, by region, year ended June 1995\u20132020&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:68655,&quot;OwnerID&quot;:28,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Environmental-economic-accounts-water-physical-stocks-1995-2020\/Download-data\/water-physical-stock-account-by-region-year-ended-June-1995-2020.xlsx&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;xlsx&quot;,&quot;DocumentFileType&quot;:&quot;Excel spreadsheet&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483646&quot;,&quot;DocumentSize&quot;:&quot;151 KB&quot;,&quot;DocumentPreviewImage&quot;:false},{&quot;ID&quot;:&quot;68439&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;water-physical-stock-account-quarterly-1995-2020-CSV.csv&quot;,&quot;FileName&quot;:&quot;water-physical-stock-account-quarterly-1995-2020-CSV.csv&quot;,&quot;Title&quot;:&quot;Water physical stock account, quarterly, 1995\u20132020 CSV&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:68655,&quot;OwnerID&quot;:28,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Environmental-economic-accounts-water-physical-stocks-1995-2020\/Download-data\/water-physical-stock-account-quarterly-1995-2020-CSV.csv&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;csv&quot;,&quot;DocumentFileType&quot;:&quot;Comma Separated Values&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483646&quot;,&quot;DocumentSize&quot;:&quot;1.2 MB&quot;,&quot;DocumentPreviewImage&quot;:false},{&quot;ID&quot;:&quot;68433&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;water-physical-stock-account-year-ended-June-1995-2020.xlsx&quot;,&quot;FileName&quot;:&quot;water-physical-stock-account-year-ended-June-1995-2020.xlsx&quot;,&quot;Title&quot;:&quot;Water physical stock account, year ended June 1995\u20132020&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:68655,&quot;OwnerID&quot;:28,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Environmental-economic-accounts-water-physical-stocks-1995-2020\/Download-data\/water-physical-stock-account-year-ended-June-1995-2020.xlsx&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;xlsx&quot;,&quot;DocumentFileType&quot;:&quot;Excel spreadsheet&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483646&quot;,&quot;DocumentSize&quot;:&quot;171 KB&quot;,&quot;DocumentPreviewImage&quot;:false},{&quot;ID&quot;:&quot;89477&quot;,&quot;ClassName&quot;:&quot;SilverStripe\\Assets\\File&quot;,&quot;Name&quot;:&quot;water-physical-stock-account-year-ended-June-1995-2020-CSV-corrected.csv&quot;,&quot;FileName&quot;:&quot;water-physical-stock-account-year-ended-June-1995-2020-CSV-corrected.csv&quot;,&quot;Title&quot;:&quot;Water physical stock account, year ended June 1995\u20132020 CSV \u2013 corrected&quot;,&quot;ShowInSearch&quot;:1,&quot;ParentID&quot;:68655,&quot;OwnerID&quot;:53,&quot;DocumentLink&quot;:&quot;\/assets\/Uploads\/Environmental-economic-accounts-water-physical-stocks-1995-2020\/Download-data\/water-physical-stock-account-year-ended-June-1995-2020-CSV-corrected.csv&quot;,&quot;DocumentCategory&quot;:&quot;document&quot;,&quot;DocumentExtension&quot;:&quot;csv&quot;,&quot;DocumentFileType&quot;:&quot;Comma Separated Values&quot;,&quot;DocumentIcon&quot;:&quot;\/_resources\/vendor\/silverstripe\/framework\/client\/images\/app_icons\/document_92.png?m=1774483646&quot;,&quot;DocumentSize&quot;:&quot;510 KB&quot;,&quot;DocumentPreviewImage&quot;:false}],&quot;Heading&quot;:null,&quot;Action&quot;:{&quot;ActionText&quot;:null,&quot;ActionHref&quot;:{&quot;Url&quot;:&quot;&quot;,&quot;Target&quot;:&quot;_self&quot;}},&quot;Presentation&quot;:null},{&quot;ID&quot;:&quot;59235&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: Water physical stocks, year ended June 1995\u20132020 \u2013 key facts 1&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Key facts&lt;\/h2&gt;&lt;ul&gt;\n&lt;li&gt;Average annual rainfall for the most recent five-year period (year ended June 2016\u20132020) was 3.1 percent below the previous five-year average (2011\u20132015).&lt;\/li&gt;\n&lt;li&gt;In the five years to June 2020, the decrease in average rainfall was most apparent in the North Island. The average annual rainfall was 6.0 percent lower than for the previous five-year period compared with a decrease of 1.5 percent for the South Island.&lt;\/li&gt;\n&lt;li&gt;In the year ended June 2020, the West Coast region received 30 percent (151,465 million cubic metres) of New Zealand\u2019s precipitation. This was more than the entire North Island\u2019s precipitation volume.&lt;\/li&gt;\n&lt;li&gt;The North Island and South Island had noticeably different seasonal patterns in precipitation, with precipitation highest in the September quarter (July\u2013September) for the North Island and in the December quarter (October\u2013December) for the South Island.&lt;\/li&gt;\n&lt;li&gt;As at June 2019, the volume of ice in New Zealand was 35 percent (23,669 million cubic metres) lower than the estimate for the year ended June 1995. The rate of change in ice volume has been increasing since 2007.&lt;\/li&gt;\n&lt;li&gt;Almost 70 percent of New Zealand\u2019s groundwater volumes are in the Canterbury region. In the year ended June 2013, Canterbury recorded the largest annual increase in groundwater volumes since our timeseries began in 1995, reaching 519,487 million cubic metres.&lt;\/li&gt;\n&lt;li&gt;In the year ended June 2020, New Zealand\u2019s total ground water volumes decreased 0.3 percent from the previous year to 751,977 million cubic metres.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;h2&gt;About the water physical stock accounts 1995\u20132020&lt;\/h2&gt;&lt;p&gt;The water physical stock accounts present information on the hydrological cycle based on the System of Environmental-Economic Accounts (SEEA).&lt;\/p&gt;&lt;p&gt;The water physical stock accounts focus on water quantity and provide estimates of national and regional water flows (precipitation, evapotranspiration, and rivers) and change in storage (ice, snow, soil moisture, groundwater, lakes and reservoirs, and hydro-electric generation water use), from 1995 to 2020.&lt;\/p&gt;&lt;p&gt;The current release both extends the length of the time series and is the first to provide quarterly estimates.&lt;\/p&gt;&lt;p&gt;Quarterly estimates enable us to:&lt;\/p&gt;&lt;ul&gt;\n&lt;li&gt;analyse seasonal patterns, and any changes in seasonality&lt;\/li&gt;\n&lt;li&gt;analyse extreme events which may be obscured in annual data&lt;\/li&gt;\n&lt;li&gt;compare water statistics with other quarterly data, such as agricultural output or electricity generation&lt;\/li&gt;\n&lt;li&gt;recalculate annual estimates on a different year end basis (for example, year ended March) to enable alignment with other annual data (for example, national accounts).&lt;\/li&gt;\n&lt;\/ul&gt;&lt;p&gt;The annual estimates are based on a hydrological year (1 July to 30 June) and include information on most aspects of the hydrological cycle. The accounts do not currently include information on residential and industry water use.&lt;\/p&gt;&lt;p&gt;The quarterly estimates are currently less complete than the annual estimates, providing information on some aspects of the hydrological cycle.&lt;\/p&gt;&lt;p&gt;These estimates pull together data from the National Institute of Water and Atmosphere (NIWA) and the Institute of Geological and Nuclear Sciences Limited (GNS).&lt;\/p&gt;&quot;},{&quot;ID&quot;:&quot;59238&quot;,&quot;Title&quot;:&quot;Environmental-economic accounts: Water physical stocks, year ended June 1995\u20132020 \u2013 Definitions and metadata&quot;,&quot;ClassName&quot;:&quot;TextBlock&quot;,&quot;ShowBlockTitle&quot;:false,&quot;DefaultView&quot;:&quot;Grid&quot;,&quot;Content&quot;:&quot;&lt;h2&gt;Definitions and metadata&lt;\/h2&gt;&lt;p&gt;Data and advice for compiling these statistics was supplied by the National Institute of Water &amp;amp; Atmospheric Research Ltd, and the Institute of Geological &amp;amp; Nuclear Sciences Ltd.&lt;\/p&gt;&lt;p&gt;&lt;a href=\&quot;methods\/environmental-economic-accounts-sources-and-methods\&quot;&gt;Environmental-economic accounts: Sources and methods (third edition)&lt;\/a&gt;&amp;nbsp;presents the data sources and methods used for each of Stats NZ\u2019s environmental-economic accounts, including water physical stocks.&lt;\/p&gt;&lt;p&gt;Methods and revisions since the 2018 release are discussed in the following two reports prepared by other agencies and published on Stats NZ&#039;s website:&lt;\/p&g
